<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bychoi workspace - Viewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
    <!-- Flatpickr (Date Picker) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
</head>
<body>

    <header class="toolbar">
        <div class="brand">
            <button class="tool-btn toggle-sidebar-btn" id="btn-toggle-left" title="Toggle Metadata (L)">
                <span class="material-icons-outlined">vertical_split</span>
            </button>
            <div style="width: 1px; background: var(--border-color); margin: 6px 4px;"></div>
            <a href="index.html" class="tool-btn" id="btn-back" title="목록으로 돌아가기 (Esc)">
                <span class="material-icons-outlined">arrow_back</span>
            </a>
            <div style="width: 1px; background: var(--border-color); margin: 6px 4px;"></div>
            <img src="assets/logo.svg" class="brand-logo" alt="Logo">
            <span style="font-weight: 600; letter-spacing: 0.5px;" id="file-name-display">Loading...</span>
        </div>
        
        <div class="tools">
            <div class="tool-group">
                <button class="tool-btn active" id="btn-select" title="선택 도구 (V)"><span class="material-icons-outlined">near_me</span></button>
                <button class="tool-btn" id="btn-hand" title="이동 도구 (Space)"><span class="material-icons-outlined">pan_tool</span></button>
            </div>
            
            <div style="width: 1px; background: var(--border-color); margin: 6px 12px;"></div>
            
            <div class="tool-group">
                <button class="tool-btn device-btn" onclick="setDeviceViewport('mobile', 375, 812)" title="Mobile View"><span class="material-icons-outlined">smartphone</span></button>
                <button class="tool-btn device-btn" onclick="setDeviceViewport('tablet', 768, 1024)" title="Tablet View"><span class="material-icons-outlined">tablet_mac</span></button>
                <button class="tool-btn active device-btn" id="btn-desktop" onclick="setDeviceViewport('desktop', 1440, 900)" title="Desktop View"><span class="material-icons-outlined">desktop_windows</span></button>
            </div>
        </div>

        <div class="actions">
            <span class="zoom-level" id="zoom-txt">100%</span>
            <button class="tool-btn" onclick="centerView()" title="가운데 맞춤"><span class="material-icons-outlined">center_focus_strong</span></button>
            <div style="width: 1px; background: var(--border-color); margin: 6px 4px;"></div>
            <button class="tool-btn tool-btn-danger" id="btn-delete" title="파일 삭제"><span class="material-icons-outlined">close</span></button>
            <div style="width: 1px; background: var(--border-color); margin: 6px 4px;"></div>
            <button class="tool-btn toggle-sidebar-btn" id="btn-toggle-right" title="Toggle Description (R)">
                <span class="material-icons-outlined">notes</span>
            </button>
        </div>
    </header>

    <div id="workspace-view" style="display: flex; flex: 1; overflow: hidden;">
        <!-- Left Sidebar: Metadata -->
        <aside class="sidebar sidebar-left" id="sidebar-left" style="width: 280px; background: var(--panel-bg); display: flex; flex-direction: column;">
            <div class="panel-header">Metadata</div>
            <div id="metadata-panel" style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">
                <div class="empty-text" style="padding: 16px;">Loading metadata...</div>
            </div>
        </aside>

        <!-- Center: Canvas & Bottom Bar -->
        <div class="center-content">
            <main class="canvas" id="canvas">
                <div class="stage" id="stage">
                    <div class="artboard-wrapper">
                        <iframe id="main-iframe" class="artboard-iframe" sandbox="allow-scripts allow-same-origin allow-forms allow-modals"></iframe>
                        <div class="pins-layer" id="pins-layer"></div>
                        <div class="placeholder-card" id="placeholder">
                            <i class="material-icons-outlined">sync</i>
                            <h3 id="placeholder-text">GitHub에서 파일을 불러오는 중...</h3>
                        </div>
                    </div>
                </div>
            </main>

            <footer class="bottom-bar">
                <div class="bottom-item" id="bottom-filename">
                    <i class="material-icons-outlined">description</i>
                    <span>-</span>
                </div>
                <div class="bottom-item" id="bottom-size">
                    <i class="material-icons-outlined">data_usage</i>
                    <span>-</span>
                </div>
                <div class="bottom-item" id="bottom-updated">
                    <i class="material-icons-outlined">history</i>
                    <span>-</span>
                </div>
            </footer>
        </div>

        <!-- Right Sidebar: Description -->
        <aside class="sidebar sidebar-right" id="sidebar-right" style="width: 340px; background: var(--panel-bg); display: flex; flex-direction: column;">
            <div class="panel-header">Description</div>
            <div class="description-container" style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">
                <div id="description-list" style="flex: 1; overflow-y: auto; padding: 16px;">
                    <!-- Dynamic rows here -->
                </div>
                <div class="panel-footer" style="padding: 16px; border-top: 1px solid var(--border-color);">
                    <button id="btn-save-description" class="btn-primary" style="width: 100%;">수정 내용 저장</button>
                </div>
            </div>
        </aside>
    </div>

    <script src="assets/app.js"></script>
    <script>
        const state = {
            activeFile: null,
            tool: 'select',
            transform: { x: 0, y: 0, scale: 1 },
            isDragging: false,
            draggingPinIndex: null,
            startX: 0, startY: 0
        };

        const DOM = {
            iframe: document.getElementById('main-iframe'),
            placeholder: document.getElementById('placeholder'),
            placeholderTxt: document.getElementById('placeholder-text'),
            canvas: document.getElementById('canvas'),
            stage: document.getElementById('stage'),
            zoomTxt: document.getElementById('zoom-txt'),
            fileName: document.getElementById('file-name-display'),
            
            // Panels
            metadataPanel: document.getElementById('metadata-panel'),
            descriptionList: document.getElementById('description-list'),
            sidebarLeft: document.getElementById('sidebar-left'),
            sidebarRight: document.getElementById('sidebar-right'),
            
            // Bottom Bar
            bottomFilename: document.getElementById('bottom-filename').querySelector('span'),
            bottomSize: document.getElementById('bottom-size').querySelector('span'),
            bottomUpdated: document.getElementById('bottom-updated').querySelector('span'),
            pinsLayer: document.getElementById('pins-layer'),
            
            // Buttons
            btnSelect: document.getElementById('btn-select'),
            btnHand: document.getElementById('btn-hand'),
            btnDelete: document.getElementById('btn-delete'),
            btnToggleLeft: document.getElementById('btn-toggle-left'),
            btnToggleRight: document.getElementById('btn-toggle-right'),
            btnAddDescRow: document.getElementById('btn-add-desc-row'),
            btnSaveDescription: document.getElementById('btn-save-description')
        };

        // 1. Initial Load & URL Parsing
        async function init() {
            const params = new URLSearchParams(window.location.search);
            const fileName = params.get('file');

            if (!fileName) {
                DOM.placeholderTxt.innerText = "파일을 찾을 수 없습니다.";
                return;
            }

            DOM.fileName.innerText = fileName;
                const [content, metadata] = await Promise.all([
                    fetchFileContent(fileName),
                    fetchMetadata()
                ]);

            if (content) {
                const blob = new Blob([content], {type: 'text/html;charset=utf-8'});
                const url = URL.createObjectURL(blob);
                
                DOM.placeholder.style.display = 'none';
                DOM.iframe.src = url;
                DOM.iframe.style.display = 'block';

                let m = metadata.files[fileName] || {};
                
                // Set Toolbar Title (Title tag or Filename)
                DOM.fileName.innerText = m.title || fileName;
                
                // Data Migration: Normalize description to Array of Objects { text, x, y }
                if (!m.description) {
                    m.description = [];
                } else if (typeof m.description === 'string') {
                    m.description = m.description.trim() ? [{ text: m.description, x: 0, y: 0 }] : [];
                } else if (Array.isArray(m.description)) {
                    m.description = m.description.map(item => {
                        if (typeof item === 'string') return { text: item, x: 0, y: 0 };
                        return item;
                    });
                }

                state.activeFile = { 
                    name: fileName, 
                    size: (content.length / 1024).toFixed(1) + ' KB',
                    meta: m
                };
                updateProperties();
                setTimeout(() => centerView(), 100);
            } else {
                DOM.placeholderTxt.innerText = "파일 내용을 불러오지 못했습니다. GitHub 토큰을 확인하세요.";
            }
        }

        DOM.btnDelete.onclick = async () => {
            const fileName = state.activeFile?.name;
            if (!fileName) return;

            if (confirm(`'${fileName}' 파일을 정말 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`)) {
                // To delete, we need the SHA first
                DOM.placeholderTxt.innerText = "파일 정보를 가져오는 중...";
                DOM.placeholder.style.display = 'flex';
                DOM.iframe.style.display = 'none';

                try {
                    const url = `https://api.github.com/repos/${ghConfig.owner}/${ghConfig.repo}/contents/${fileName}`;
                    const res = await fetch(url, { headers: { 'Authorization': `token ${ghConfig.token}` }});
                    if (!res.ok) throw new Error('Failed to get file SHA');
                    
                    const data = await res.json();
                    const success = await deleteFileFromGitHub(fileName, data.sha, (msg, color) => {
                        DOM.placeholderTxt.innerText = msg;
                        DOM.placeholderTxt.style.color = color;
                    });

                    if (success) {
                        alert("성공적으로 삭제되었습니다.");
                        // GitHub API 반영 지연을 고려하여 1초 후 이동
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 1000);
                    } else {
                        DOM.placeholder.style.display = 'none';
                        DOM.iframe.style.display = 'block';
                    }
                } catch (err) {
                    console.error(err);
                    alert("삭제 중 오류가 발생했습니다.");
                    DOM.placeholder.style.display = 'none';
                    DOM.iframe.style.display = 'block';
                }
            }
        };

        function updateProperties() {
            if (!state.activeFile) return;
            const m = state.activeFile.meta || {};

            // 1. Left Sidebar: Metadata (Editable)
            DOM.metadataPanel.innerHTML = `
                <div class="panel-content-inner" style="flex: 1; overflow-y: auto; padding: 16px;">
                    <div class="form-group">
                        <label class="form-label">제목</label>
                        <input type="text" id="viewer-meta-title" class="form-input" value="${m.title || ''}" placeholder="제목 입력">
                    </div>
                    <div class="form-group">
                        <label class="form-label">담당자</label>
                        <input type="text" id="viewer-meta-assignee" class="form-input" value="${m.assignee || ''}" placeholder="담당자 입력">
                    </div>
                    <div class="form-group">
                        <label class="form-label">기간</label>
                        <input type="text" id="viewer-meta-period" class="form-input" value="${m.period || ''}" placeholder="기간 입력">
                    </div>
                    <div class="form-group">
                        <label class="form-label">JIRA 번호</label>
                        <input type="text" id="viewer-meta-jira" class="form-input" value="${m.jira || ''}" placeholder="JIRA 번호 입력">
                    </div>
                    <div class="form-group">
                        <label class="form-label">
                            FIGMA (디자인산출물)
                            ${m.figmaUrl ? `<a href="${m.figmaUrl}" target="_blank" style="margin-left:8px; font-size:12px; color:var(--accent);">[열기]</a>` : ''}
                        </label>
                        <input type="text" id="viewer-meta-figma" class="form-input" value="${m.figmaUrl || ''}" placeholder="피그마 링크 주소">
                    </div>
                    <div class="form-group">
                        <label class="form-label">
                            퍼블리싱 산출물
                            ${m.pubUrl ? `<a href="${m.pubUrl}" target="_blank" style="margin-left:8px; font-size:12px; color:var(--accent);">[열기]</a>` : ''}
                        </label>
                        <input type="text" id="viewer-meta-pub" class="form-input" value="${m.pubUrl || ''}" placeholder="퍼블리싱 링크 주소">
                    </div>
                </div>
                <div class="panel-footer" style="padding: 16px; border-top: 1px solid var(--border-color);">
                    <button id="btn-save-meta-viewer" class="btn-primary" style="width:100%;">메타데이터 저장</button>
                </div>
            `;

            // 2. Right Sidebar: Description (List)
            renderDescriptionList();

            // 3. Bottom Bar: Stats
            DOM.bottomFilename.innerText = state.activeFile.name;
            DOM.bottomSize.innerText = state.activeFile.size;
            DOM.bottomUpdated.innerText = m.updatedAt ? new Date(m.updatedAt).toLocaleString() : '-';

            // Re-bind events for the newly rendered buttons
            document.getElementById('btn-save-meta-viewer').onclick = saveMetadataViewer;

            // Initialize Flatpickr on Period Input
            const periodInput = document.getElementById('viewer-meta-period');
            flatpickr(periodInput, {
                mode: "range",
                locale: "ko",
                dateFormat: "Y.m.d",
                defaultDate: m.period ? m.period.split(' ~ ') : null,
                onChange: (selectedDates, dateStr, instance) => {
                    if (selectedDates.length === 2) {
                        const days = ['일', '월', '화', '수', '목', '금', '토'];
                        const format = (d) => {
                            const year = d.getFullYear();
                            const month = String(d.getMonth() + 1).padStart(2, '0');
                            const date = String(d.getDate()).padStart(2, '0');
                            const day = days[d.getDay()];
                            return `${year}.${month}.${date}(${day})`;
                        };
                        periodInput.value = `${format(selectedDates[0])} ~ ${format(selectedDates[1])}`;
                    }
                }
            });
        }

        function renderDescriptionList() {
            if (!state.activeFile) return;
            const list = state.activeFile.meta.description;
            DOM.descriptionList.innerHTML = '';
            DOM.pinsLayer.innerHTML = '';

            list.forEach((item, index) => {
                // 1. Create Sidebar Row
                const row = document.createElement('div');
                row.className = 'desc-row';
                row.draggable = true;
                row.dataset.index = index;
                row.innerHTML = `
                    <div class="desc-index">${index + 1}</div>
                    <textarea class="desc-input" placeholder="설명을 입력하세요...">${item.text || ''}</textarea>
                    <div class="desc-actions">
                        <button class="desc-btn desc-btn-del" data-index="${index}" title="삭제"><span class="material-icons-outlined">remove_circle_outline</span></button>
                    </div>
                `;

                // 2. Create Canvas Pin
                const pin = document.createElement('div');
                pin.className = 'pin-marker';
                pin.dataset.index = index;
                pin.innerText = index + 1;
                pin.style.left = (item.x || 0) + '%';
                pin.style.top = (item.y || 0) + '%';
                
                // Pin Interaction: Highlight Sync
                const highlight = (active) => {
                    pin.classList.toggle('highlight', active);
                    row.classList.toggle('highlight', active);
                };
                pin.onmouseenter = () => highlight(true);
                pin.onmouseleave = () => highlight(false);
                row.onmouseenter = () => highlight(true);
                row.onmouseleave = () => highlight(false);

                // Pin Dragging Start
                pin.onmousedown = (e) => {
                    e.stopPropagation();
                    e.preventDefault();
                    state.draggingPinIndex = index;
                    highlight(true);
                };

                // Row Text Input Persistence
                const input = row.querySelector('.desc-input');
                input.oninput = () => {
                    item.text = input.value;
                    autoResize(input);
                };
                
                // Auto resize on show
                const autoResize = (el) => {
                    el.style.height = 'auto';
                    el.style.height = el.scrollHeight + 'px';
                };

                // Drag & Drop for reordering
                row.ontoolstart = (e) => e.dataTransfer.setData('text/plain', index);
                row.ondragstart = (e) => e.dataTransfer.setData('text/plain', index);
                row.ondragend = () => document.querySelectorAll('.desc-row').forEach(r => r.classList.remove('drag-over'));
                row.ondragover = (e) => { e.preventDefault(); row.classList.add('drag-over'); };
                row.ondragleave = () => row.classList.remove('drag-over');
                row.ondrop = (e) => {
                    e.preventDefault();
                    const fromIndex = parseInt(e.dataTransfer.getData('text/plain'));
                    const toIndex = parseInt(row.dataset.index);
                    if (fromIndex !== toIndex) {
                        const [movedItem] = list.splice(fromIndex, 1);
                        list.splice(toIndex, 0, movedItem);
                        renderDescriptionList();
                    }
                };

                DOM.descriptionList.appendChild(row);
                DOM.pinsLayer.appendChild(pin);
                autoResize(input);
            });

            // Add Row Button
            const addBtn = document.createElement('button');
            addBtn.className = 'add-row-btn';
            addBtn.style.margin = '16px 0';
            addBtn.style.width = '100%';
            addBtn.innerHTML = '<span class="material-icons-outlined">add_circle_outline</span> 새 행 추가 (화면 클릭)';
            addBtn.onclick = () => {
                if (!state.activeFile) return;
                state.activeFile.meta.description = state.activeFile.meta.description || [];
                state.activeFile.meta.description.push({ text: '', x: 50, y: 50 });
                renderDescriptionList();
                setTimeout(() => {
                    const inputs = DOM.descriptionList.querySelectorAll('.desc-input');
                    inputs[inputs.length - 1]?.focus();
                }, 50);
            };
            DOM.descriptionList.appendChild(addBtn);
        }

        // --- Canvas Click to Place Pin ---
        DOM.pinsLayer.onclick = (e) => {
            if (!state.activeFile) return;
            if (state.tool !== 'select') return;
            // Only if clicking on the layer itself, not an existing pin
            if (e.target === DOM.pinsLayer) {
                const r = DOM.pinsLayer.getBoundingClientRect();
                const px = ((e.clientX - r.left) / r.width) * 100;
                const py = ((e.clientY - r.top) / r.height) * 100;
                
                state.activeFile.meta.description.push({ 
                    text: '', 
                    x: Math.max(0, Math.min(px, 100)), 
                    y: Math.max(0, Math.min(py, 100)) 
                });
                renderDescriptionList();
                
                // Focus the new input
                setTimeout(() => {
                    const inputs = DOM.descriptionList.querySelectorAll('.desc-input');
                    inputs[inputs.length - 1]?.focus();
                }, 50);
            }
        };


        DOM.descriptionList.onclick = (e) => {
            const btn = e.target.closest('.desc-btn-del');
            if (!btn) return;
            
            const index = parseInt(btn.dataset.index);
            const list = state.activeFile.meta.description;
            
            if (confirm('이 항목을 삭제하시겠습니까?')) {
                list.splice(index, 1);
                renderDescriptionList();
            }
        };

        // --- Save Handlers ---
        async function saveMetadataViewer() {
            if (!state.activeFile) return;
            const btn = document.getElementById('btn-save-meta-viewer');
            const data = {
                title: document.getElementById('viewer-meta-title').value.trim(),
                assignee: document.getElementById('viewer-meta-assignee').value.trim(),
                period: document.getElementById('viewer-meta-period').value.trim(),
                jira: document.getElementById('viewer-meta-jira').value.trim(),
                figmaUrl: document.getElementById('viewer-meta-figma').value.trim(),
                pubUrl: document.getElementById('viewer-meta-pub').value.trim()
            };

            const success = await updateFileMetadata(state.activeFile.name, data, (msg, color) => {
                btn.innerText = msg;
                if (color === '#4ade80') {
                    setTimeout(() => btn.innerText = '메타데이터 저장', 2000);
                } else if (color === '#ef4444') {
                    console.error("Metadata save failed:", msg);
                    setTimeout(() => btn.innerText = '메타데이터 저장 (재시도)', 3000);
                }
            });
            if (success) {
                // Keep local state in sync
                state.activeFile.meta = { ...state.activeFile.meta, ...data };
                // Update Toolbar Title immediately
                DOM.fileName.innerText = data.title || state.activeFile.name;
            }
        }

        DOM.btnSaveDescription.onclick = async () => {
            if (!state.activeFile) return;
            const list = state.activeFile.meta.description.filter(item => {
                const hasText = item.text && item.text.trim() !== '';
                const hasPos = item.x !== undefined && item.y !== undefined;
                return hasText || hasPos;
            });
            const success = await updateFileMetadata(state.activeFile.name, { description: list }, (msg, color) => {
                DOM.btnSaveDescription.innerText = msg;
                if (color === '#4ade80') {
                    setTimeout(() => DOM.btnSaveDescription.innerText = '수정 내용 저장', 2000);
                }
            });
            if (success) {
                state.activeFile.meta.description = list;
                renderDescriptionList();
            }
        };

        // 4. Panel Handlers
        function toggleSidebar(side) {
            if (side === 'left') {
                DOM.sidebarLeft.classList.toggle('collapsed');
                DOM.btnToggleLeft.classList.toggle('active');
            } else {
                DOM.sidebarRight.classList.toggle('collapsed');
                DOM.btnToggleRight.classList.toggle('active');
            }
            // Trigger resize/recenter after animation
            setTimeout(() => centerView(), 300);
        }

        DOM.btnToggleLeft.onclick = () => toggleSidebar('left');
        DOM.btnToggleRight.onclick = () => toggleSidebar('right');

        // 2. Viewport & Canvas Logic
        function setDeviceViewport(type, w, h) {
            document.querySelectorAll('.tools .device-btn').forEach(btn => btn.classList.remove('active'));
            if(type === 'mobile') document.querySelector('.tools .tool-btn[onclick*="mobile"]').classList.add('active');
            else if(type === 'tablet') document.querySelector('.tools .tool-btn[onclick*="tablet"]').classList.add('active');
            else document.getElementById('btn-desktop').classList.add('active');

            DOM.iframe.style.width = w + 'px';
            DOM.iframe.style.height = h + 'px';
            
            // Wait for DOM to commit style changes and then center
            setTimeout(() => {
                centerView();
            }, 100);
        }

        function centerView() {
            // Use style dimensions instead of offsetWidth to get the *intended* size immediately
            let iw = parseInt(DOM.iframe.style.width) || 1440;
            let ih = parseInt(DOM.iframe.style.height) || 900;
            const cw = DOM.canvas.clientWidth;
            const ch = DOM.canvas.clientHeight;
            
            // 1. Calculate scale for 95% view (minimized margins)
            let s = Math.min((cw * 0.95) / iw, (ch * 0.95) / ih, 1);
            
            // 2. Cap scale for a tiny bit of breathing room
            if (s > 0.98) s = 0.98;
            
            // 3. Coordinate calculation MUST use the final scale
            state.transform = {
                x: (cw - (iw * s)) / 2,
                y: (ch - (ih * s)) / 2,
                scale: s
            };
            updateTransform();
        }

        function updateTransform() {
            DOM.stage.style.transform = `translate(${state.transform.x}px, ${state.transform.y}px) scale(${state.transform.scale})`;
            DOM.zoomTxt.innerText = Math.round(state.transform.scale * 100) + '%';
        }

        // 3. Tools & Inputs
        function setTool(t) {
            state.tool = t;
            DOM.btnSelect.classList.toggle('active', t === 'select');
            DOM.btnHand.classList.toggle('active', t === 'hand');
            DOM.canvas.classList.toggle('hand-active', t === 'hand');
            DOM.iframe.style.pointerEvents = t === 'hand' ? 'none' : 'auto';
        }
        DOM.btnSelect.onclick = () => setTool('select');
        DOM.btnHand.onclick = () => setTool('hand');

        window.addEventListener('keydown', e => {
            // Ignore shortcuts when typing in inputs or textareas
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

            if(e.key === 'Escape') window.location.href = 'index.html';
            if(e.code === 'Space' && state.tool !== 'hand') {
                DOM.canvas.classList.add('hand-active');
                DOM.iframe.style.pointerEvents = 'none';
            }
            if(e.code === 'KeyV') setTool('select');
            if(e.code === 'KeyH') setTool('hand');
            if(e.code === 'KeyL') toggleSidebar('left');
            if(e.code === 'KeyR') toggleSidebar('right');
        });
        window.addEventListener('keyup', e => {
            if(e.code === 'Space' && state.tool !== 'hand') {
                DOM.canvas.classList.remove('hand-active');
                DOM.iframe.style.pointerEvents = 'auto';
            }
        });

        DOM.canvas.addEventListener('wheel', e => {
            e.preventDefault();
            const s = state.transform.scale;
            // 10% steps
            const delta = e.deltaY > 0 ? -0.1 : 0.1;
            const ns = Math.max(0.1, Math.min(s * (1 + delta), 20));
            const r = DOM.canvas.getBoundingClientRect();
            const mx = e.clientX - r.left;
            const my = e.clientY - r.top;
            
            state.transform.x = mx - (mx - state.transform.x) * (ns / s);
            state.transform.y = my - (my - state.transform.y) * (ns / s);
            state.transform.scale = ns;
            updateTransform();
        }, {passive: false});

        DOM.canvas.addEventListener('mousedown', e => {
            const isHand = state.tool === 'hand' || e.button === 1 || DOM.canvas.classList.contains('hand-active');
            if(isHand) {
                state.isDragging = true;
                state.startX = e.clientX - state.transform.x;
                state.startY = e.clientY - state.transform.y;
                e.preventDefault();
            }
        });

        window.addEventListener('mousemove', e => {
            // 1. Scene Panning
            if (state.isDragging) {
                state.transform.x = e.clientX - state.startX;
                state.transform.y = e.clientY - state.startY;
                updateTransform();
            }
            
            // 2. Pin Dragging (Optimized Global Listener)
            if (state.draggingPinIndex !== null) {
                const r = DOM.pinsLayer.getBoundingClientRect();
                let px = ((e.clientX - r.left) / r.width) * 100;
                let py = ((e.clientY - r.top) / r.height) * 100;
                
                px = Math.max(0, Math.min(px, 100));
                py = Math.max(0, Math.min(py, 100));
                
                const item = state.activeFile.meta.description[state.draggingPinIndex];
                if (item) {
                    item.x = px;
                    item.y = py;
                    const pin = DOM.pinsLayer.querySelector(`.pin-marker[data-index="${state.draggingPinIndex}"]`);
                    if (pin) {
                        pin.style.left = px + '%';
                        pin.style.top = py + '%';
                    }
                }
            }
        });

        window.addEventListener('mouseup', () => {
            state.isDragging = false;
            if (state.draggingPinIndex !== null) {
                state.draggingPinIndex = null;
                renderDescriptionList(); // Redraw to clear highlight classes and sync UI
            }
        });

        init();
    </script>
</body>
</html>
