<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bychoi workspace - Viewer V4</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    
    <!-- Quill.js Library (Rich Text Editor) -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="assets/theme.css">
    <link rel="stylesheet" href="enhanced_v4/style_v4.css">
    <!-- Flatpickr (Date Picker) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
    <style>
        #debug-console {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 999999;
            background: rgba(239, 68, 68, 0.9); color: #fff; font-family: monospace;
            font-size: 11px; padding: 4px 12px; display: none; pointer-events: none;
        }
        /* Fail-safe Modal CSS */
        .modal-overlay.active {
            display: flex !important;
        }
        .loading-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #1e2128;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.6s;
        }
        .loading-overlay.fade-out {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .loading-bar-container {
            width: 200px; height: 3px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px; overflow: hidden; position: relative;
        }
        @keyframes loadingMotion {
            0% { left: -40%; }
            100% { left: 100%; }
        }
        .loading-text {
            margin-top: 20px; font-size: 11px; color: #aab2bd;
            letter-spacing: 2px; font-weight: 600; text-transform: uppercase;
            animation: pulse 2s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1); }
        }
        .sidebar { position: relative; overflow: visible !important; }
        .sidebar.collapsed { width: 0 !important; min-width: 0 !important; padding: 0 !important; border: none !important; overflow: visible !important; }
        .sidebar.collapsed > *:not(.sidebar-handle) { display: none !important; }
        .sidebar-handle {
            position: absolute; top: 50%; transform: translateY(-50%); width: 20px; height: 48px;
            background: var(--panel-bg); border: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 1000; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--text-secondary); backdrop-filter: blur(10px);
        }
        .sidebar-handle:hover { background: var(--accent); color: #000; width: 24px; }
        .handle-left { right: -20px; border-left: none; border-radius: 0 8px 8px 0; }
        .handle-right { left: -20px; border-right: none; border-radius: 8px 0 0 8px; }
        .sidebar-handle span { font-size: 18px; }

        /* V4 Tag Style */
        .v4-badge-tag {
            background: #6366f1; color: white; padding: 1px 6px; border-radius: 4px;
            font-size: 9px; font-weight: 900; vertical-align: middle; margin-left: 6px;
        }
    </style>
    <script>
        window.onerror = function(msg, url, line, col, error) {
            const dc = document.getElementById('debug-console');
            if (dc) { 
                dc.style.display = 'block'; 
                const fileName = url ? url.split('/').pop() : 'inline';
                dc.innerText = `[ERROR] ${msg} (${fileName}:${line}:${col})`;
                if (error && error.stack) console.error(error.stack);
            }
            return false;
        };
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(function() {
                const loader = document.getElementById('loading-overlay');
                if (loader && !loader.classList.contains('fade-out')) {
                    loader.classList.add('fade-out');
                }
            }, 4000);
        });
    </script>
</head>
<body class="dark-mode">
    <div id="debug-console"></div>
    <!-- Premium Loading Screen Overlay -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="loading-bar-container">
            <div class="loading-bar-progress"></div>
        </div>
        <div class="loading-text">Loading Project (V4)</div>
    </div>

    <header class="toolbar">
        <div class="brand">
            <a href="index_v4.html" class="tool-btn" id="btn-back" title="목록으로 돌아가기 (Esc)">
                <span class="material-icons-outlined">arrow_back</span>
            </a>
            <div style="width: 1px; background: var(--border-color); margin: 6px 4px;"></div>
            <img src="assets/logo.svg" class="brand-logo" alt="Logo">
            <span style="font-weight: 600; letter-spacing: 0.5px;" id="file-name-display">Loading...</span>
            <span class="v4-badge-tag">V4 PREVIEW</span>
        </div>
        
        <div class="tools">
            <div class="tool-group">
                <button class="tool-btn active" id="btn-select" title="선택 도구 (V)"><span class="material-icons-outlined">near_me</span></button>
                <button class="tool-btn" id="btn-hand" title="이동 도구 (Space)"><span class="material-icons-outlined">pan_tool</span></button>
            </div>
            
            <div style="width: 1px; background: var(--border-color); margin: 6px 12px;"></div>
            
            <div class="tool-group">
                <button class="tool-btn device-btn" onclick="setDeviceViewport('mobile', 375, 812)" title="Mobile View"><span class="material-icons-outlined">smartphone</span></button>
                <button class="tool-btn device-btn" onclick="setDeviceViewport('tablet', 768, 1024)" title="Tablet View"><span class="material-icons-outlined">tablet_mac</span></button>
                <button class="tool-btn active device-btn" id="btn-desktop" onclick="setDeviceViewport('desktop', 1440, 900)" title="Desktop View"><span class="material-icons-outlined">desktop_windows</span></button>
            </div>
        </div>

        <div class="actions">
            <div class="zoom-controls">
                <button class="tool-btn" onclick="adjustZoom(-0.1)" title="Zoom Out"><span class="material-icons-outlined">remove_circle_outline</span></button>
                <span class="zoom-level" id="zoom-txt">100%</span>
                <button class="tool-btn" onclick="adjustZoom(0.1)" title="Zoom In"><span class="material-icons-outlined">add_circle_outline</span></button>
            </div>

            <div style="width: 1px; background: var(--border-color); margin: 6px 4px;"></div>
            <button class="tool-btn" onclick="centerView()" title="가운데 맞춤"><span class="material-icons-outlined">center_focus_strong</span></button>
        </div>
    </header>

    <div class="project-info-bar" id="top-metadata-panel">
        <div class="empty-text" style="padding: 0; margin: 0;">Loading metadata...</div>
    </div>

    <div id="workspace-view" style="display: flex; flex: 1; overflow: hidden;">
        <!-- Left Sidebar -->
        <aside class="sidebar sidebar-left" id="sidebar-left" style="width: 280px; background: var(--panel-bg); display: flex; flex-direction: column;">
            <div class="sidebar-handle handle-left" id="btn-toggle-left" title="Toggle Metadata (L)">
                <span class="material-icons-outlined">chevron_left</span>
            </div>
            <div class="panel-header">
                <span>PROJECT SCREENS</span>
                <button class="btn-add-action" id="btn-add-screen" title="새 화면 추가">
                    <span class="material-icons-outlined">add_circle</span>
                </button>
            </div>
            <div id="screens-list" style="flex: 1; overflow-y: auto; padding: 12px;"></div>
        </aside>

        <!-- Center -->
        <div class="center-content">
            <main class="canvas" id="canvas">
                <div class="stage" id="stage">
                    <div class="artboard-wrapper" id="artboard-wrapper">
                        <iframe id="main-iframe" class="artboard-iframe" style="width: 1440px; height: 900px; display: none;" sandbox="allow-scripts allow-same-origin allow-forms allow-modals"></iframe>
                        <div class="pins-layer" id="pins-layer"></div>
                    </div>
                </div>
                <div class="placeholder-card" id="placeholder">
                    <i class="material-icons-outlined" style="font-size: 64px; color: var(--accent);">add_to_photos</i>
                    <h2 id="placeholder-txt" style="color: #fff; margin: 0;">프로젝트 스크린을 추가해주세요.</h2>
                </div>
            </main>
            <footer class="bottom-bar">
                <div class="bottom-info-group"><div class="bottom-item" id="bottom-updated"><span>최종 업데이트: -</span></div></div>
                <div class="bottom-actions">
                    <button id="btn-global-save" class="btn-primary" style="background: #6366f1;">전체 저장 (V4)</button>
                </div>
            </footer>
        </div>

        <!-- Right Sidebar -->
        <aside class="sidebar sidebar-right" id="sidebar-right" style="width: 340px; background: var(--panel-bg); display: flex; flex-direction: column;">
            <div class="sidebar-handle handle-right" id="btn-toggle-right" title="Toggle Sidebar (R)">
                <span class="material-icons-outlined">chevron_right</span>
            </div>
            <div class="sidebar-tabs">
                <button class="tab-btn active" data-tab="editor">Editor</button>
                <button class="tab-btn" data-tab="description">Description</button>
            </div>

            <div id="tab-description" class="tab-pane" style="display: none; flex-direction: column;">
                <div class="panel-header"><span>SCENE ANNOTATIONS</span></div>
                <div id="description-list"></div>
            </div>

            <div id="tab-editor" class="tab-pane active" style="display: flex; flex-direction: column; overflow-y: auto;">
                <div class="panel-header"><span style="color: #6366f1; font-weight: bold;">PREMIUM V4 LIBRARY</span></div>
                <div class="components-body" style="padding: 16px;">
                    <!-- V4 Table Section -->
                    <div class="component-section">
                        <div class="section-label" style="font-size: 11px; font-weight: 600; color: #6366f1; margin-bottom: 12px;">TABLES & GRIDS</div>
                        <div class="component-grid" style="display: grid; grid-template-columns: 1fr; gap: 12px;">
                            <div class="component-item v4-card" onclick="insertV4ComponentById('v4-data-table')" style="cursor: pointer; padding: 12px;">
                                <div class="comp-preview" style="height: 48px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); border-radius: 8px;">
                                    <span class="material-icons-outlined" style="font-size: 24px; color: #6366f1;">table_chart</span>
                                </div>
                                <div class="comp-name" style="font-size: 11px; text-align: center; color: var(--v4-text-dim); margin-top: 8px;">Glass Data Table</div>
                            </div>
                        </div>
                    </div>

                    <!-- Original Library (Ported) -->
                    <div class="component-section" style="margin-top: 24px;">
                        <div class="section-label" style="font-size: 11px; font-weight: 600; color: var(--accent); margin-bottom: 12px;">LEGACY ATOMS</div>
                        <div class="component-grid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;">
                            <div class="component-item" onclick="insertAtomicComponent('image', 'LF Logo')" style="background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); border-radius: 8px; padding: 12px; cursor: pointer;">
                                <img src="https://img.lfmall.co.kr/file/WAS/apps/2024/mfront/logo/lf_logo_mo.png" style="width: auto; height: 24px; display: block; margin: 0 auto;">
                                <div class="comp-name" style="font-size: 10px; text-align: center; color: var(--text-secondary); margin-top: 8px;">LF Logo</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="panel-header"><span>SELECTION PROPERTIES</span></div>
                <div class="inspector-body" style="padding: 16px;">
                    <div id="text-editor-section" style="display: none;">
                        <div id="editor-container" style="height: 150px; background: rgba(0,0,0,0.2); border-radius: 8px; margin-bottom: 8px;"></div>
                        <button id="btn-editor-apply" class="btn-primary" style="width: 100%; background: #6366f1;">적용하기</button>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <!-- Modals -->
    <div id="auth-modal" class="modal-overlay"></div>
    <div id="add-screen-modal" class="modal-overlay"></div>
    <div id="edit-screen-modal" class="modal-overlay"></div>
    
    <script src="assets/templates.js"></script>
    <script src="assets/app.js"></script>
    <script src="enhanced_v4/component_library_v4.js"></script>
    <script src="enhanced_v4/vctrl_v4.js"></script>
</body>
</html>
