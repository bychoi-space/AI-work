<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BYCHOI 화면설계 스튜디오 (Screen Design Studio)</title>
    <!-- 폰트 및 아이콘 시스템 적용 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        @keyframes subtlePan {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes fadeInSlideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Design System Tokens */
        :root {
            --bg-base: #1e2128; /* 조금 더 밝은 배경색 */
            --panel-bg: rgba(35, 38, 45, 0.75); /* Glassmorphism 패널 (조금 더 밝게) */
            --border-color: rgba(255, 255, 255, 0.12);
            --text-primary: #ffffff;
            --text-secondary: #aab2bd;
            --accent: #00e5ff; /* 포인트 컬러: 네온 시안 */
            --accent-hover: #b3f7ff;
            --hover-bg: rgba(255, 255, 255, 0.08);
            --selected-bg: rgba(0, 229, 255, 0.15);
            --font-main: 'Inter', -apple-system, sans-serif;
            --box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-base);
            /* 애니메이션 효과가 들어간 배경 그래디언트 (톤업) */
            background-image: radial-gradient(circle at 30% 0%, #3a4252 0%, transparent 50%),
                              radial-gradient(circle at 70% 100%, #2c323f 0%, transparent 50%);
            background-size: 200% 200%;
            animation: subtlePan 15s ease infinite alternate;
            color: var(--text-primary);
            font-family: var(--font-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ----------------------------------------------------
           1. Header Toolbar (상단 바)
           ---------------------------------------------------- */
        .toolbar {
            height: 56px;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            font-size: 15px;
            letter-spacing: 0.3px;
        }
        .brand-icon { 
            color: var(--accent); 
            font-size: 22px; 
        }

        .tools {
            display: flex;
            gap: 6px;
            background: rgba(0, 0, 0, 0.2);
            padding: 4px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .tool-btn {
            background: transparent;
            color: var(--text-secondary);
            border: none;
            width: 34px; height: 34px;
            border-radius: 6px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .tool-btn:hover { 
            background: var(--hover-bg); 
            color: var(--text-primary);
            transform: scale(1.05); /* 호버 시 마이크로 애니메이션 강화 */
        }
        .tool-btn:active { transform: scale(0.95); }
        .tool-btn.active { background: var(--selected-bg); color: var(--accent); }

        .file-upload-wrapper { position: relative; }
        .file-upload-wrapper input[type="file"] { position: absolute; width: 0; height: 0; opacity: 0; }

        .actions {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 13px;
        }
        .zoom-level { color: var(--text-secondary); width: 44px; text-align: right; }

        /* ----------------------------------------------------
           2. Dashboard View & Card Grid (목록 화면)
           ---------------------------------------------------- */
        #dashboard-view {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dashboard-title {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
        }

        .file-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .file-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: var(--box-shadow);
            background: var(--hover-bg);
        }

        .file-card .thumbnail-wrapper {
            width: 100%;
            aspect-ratio: 16 / 10;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(255,255,255,0.05);
            transition: border-color 0.2s;
        }
        
        .file-card:hover .thumbnail-wrapper {
            border-color: rgba(0, 229, 255, 0.3);
        }

        .file-card .thumbnail-iframe {
            position: absolute;
            top: 0; left: 0;
            width: 1440px; 
            height: 900px;
            border: none;
            transform-origin: 0 0;
            pointer-events: none;
            background: #fff;
        }

        .file-card .icon-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
        }
        
        .file-card .card-info {
            text-align: left;
            width: 100%;
            padding: 0 4px;
        }

        .file-card .card-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .file-card .card-meta {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* ----------------------------------------------------
           3. Main Workspace (상세 에디터 화면)
           ---------------------------------------------------- */
        #workspace-view {
            display: none; /* 초기에는 숨김 처리 */
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* Sidebars */
        .sidebar {
            width: 280px;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            display: flex;
            flex-direction: column;
            z-index: 5;
        }
        /* 왼쪽 사이드바는 이제 제거하므로 삭제 또는 숨김 처리, 하지만 CSS는 남겨둘 수 있음 */
        
        .sidebar-right { border-left: 1px solid var(--border-color); }

        .panel-header {
            padding: 18px 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-color);
        }
        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }
        .layer-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 20px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.1s;
        }
        .layer-item:hover { background: var(--hover-bg); }
        .layer-item.active { background: var(--selected-bg); color: #fff; }
        .layer-item.active .material-icons-outlined { color: var(--accent); }
        .layer-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .empty-text {
            padding: 40px 20px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.6;
        }

        /* ----------------------------------------------------
           3. Canvas (도화지 / 중앙 영역)
           ---------------------------------------------------- */
        .canvas {
            flex: 1;
            background-color: var(--bg-base);
            background-image: radial-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 0);
            background-size: 24px 24px;
            position: relative;
            overflow: hidden;
        }
        .canvas.hand-active { cursor: grab; }
        .canvas.hand-active:active { cursor: grabbing; }

        /* The scaling container */
        .stage {
            position: absolute;
            top: 0; left: 0;
            transform-origin: 0 0;
            will-change: transform;
        }
        
        .artboard-wrapper {
            position: absolute;
            top: 0; left: 0;
            display: flex; align-items: flex-start; justify-content: flex-start;
        }

        /* HTML IFrame Viewer */
        .artboard-iframe {
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.4);
            border-radius: 6px;
            background: #ffffff;
            width: 1440px; 
            height: 900px;
            border: 1px solid rgba(255,255,255,0.2);
            display: none; 
            transition: width 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), height 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.3s;
            animation: fadeInSlideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .placeholder-card {
            background: rgba(30, 30, 35, 0.6);
            border: 1px dashed rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 40px 60px;
            text-align: center;
            backdrop-filter: blur(8px);
            color: var(--text-secondary);
            box-shadow: 0 4px 24px rgba(0,0,0,0.2);
            transition: all 0.2s ease;
        }
        .placeholder-card:hover { background: rgba(40, 40, 45, 0.6); }
        .placeholder-card i { font-size: 48px; margin-bottom: 20px; color: var(--text-primary); opacity: 0.8; }

        /* ----------------------------------------------------
           4. Properties & Upload Zone (우측 패널)
           ---------------------------------------------------- */
        .upload-zone {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 30px 20px;
            cursor: pointer;
            text-align: center;
            background: rgba(0,0,0,0.2);
            transition: all 0.2s ease;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--accent);
            background: rgba(168, 199, 250, 0.05);
        }

        .prop-section {
            padding: 20px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .prop-section:last-child { border-bottom: none; }
        .prop-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
            letter-spacing: 0.5px;
        }
        .prop-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 12px;
            align-items: center;
        }
        .prop-row:last-child { margin-bottom: 0; }
        .prop-label { color: var(--text-secondary); width: 80px; }
        .prop-value-box {
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 8px 12px;
            border-radius: 6px;
            font-family: 'Inter', monospace;
            color: var(--text-primary);
            flex: 1;
            text-align: right;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <!-- Header Toolbar -->
    <header class="toolbar">
        <div class="brand">
            <span class="material-icons-outlined brand-icon">art_track</span>
            <span style="font-weight: 600; letter-spacing: 0.5px;">BYCHOI Screen Design Studio</span>
        </div>
        
        <!-- Center Tools -->
        <div class="tools">
            <!-- 뒤로가기 버튼 (상세화면용) -->
            <button class="tool-btn" id="btn-back" onclick="goBackToDashboard()" title="목록으로 돌아가기 (Esc)" style="display:none; margin-right: 8px;">
                <span class="material-icons-outlined">arrow_back</span>
            </button>
            <div id="divider-back" style="width: 1px; background: var(--border-color); margin: 6px 4px; display:none;"></div>

            <button class="tool-btn active" id="btn-select" title="선택 도구 (V)" style="display:none;"><span class="material-icons-outlined">near_me</span></button>
            <button class="tool-btn" id="btn-hand" title="이동 도구 (Space)" style="display:none;"><span class="material-icons-outlined">pan_tool</span></button>
            <div id="divider-tools" style="width: 1px; background: var(--border-color); margin: 6px 4px; display:none;"></div>
            
            <!-- 기기 뷰어 버튼 -->
            <button class="tool-btn device-btn" onclick="setDeviceViewport('mobile', 375, 812)" title="Mobile View (375x812)" style="display:none;"><span class="material-icons-outlined">smartphone</span></button>
            <button class="tool-btn device-btn" onclick="setDeviceViewport('tablet', 768, 1024)" title="Tablet View (768x1024)" style="display:none;"><span class="material-icons-outlined">tablet_mac</span></button>
            <button class="tool-btn active device-btn" id="btn-desktop" onclick="setDeviceViewport('desktop', 1440, 900)" title="Desktop View (1440x900)" style="display:none;"><span class="material-icons-outlined">desktop_windows</span></button>
        </div>

        <!-- Right Actions -->
        <div class="actions" id="header-actions" style="display:none;">
            <span class="zoom-level" id="zoom-txt">100%</span>
            <button class="tool-btn" onclick="centerView()" title="가운데 맞춤"><span class="material-icons-outlined">center_focus_strong</span></button>
        </div>
    </header>

    <!-- Main Content -->
    <!-- 1. Dashboard View -->
    <div id="dashboard-view">
        <div class="dashboard-header">
            <h2 class="dashboard-title">Recent Files</h2>
            <label class="tool-btn" title="로컬 HTML 업로드" style="width: auto; padding: 0 16px; background: var(--accent); color: #000; font-weight: 600;">
                <span class="material-icons-outlined" style="margin-right: 6px;">note_add</span> New Upload
                <input type="file" id="file-upload-top" accept=".html,.htm" multiple style="display:none;">
            </label>
        </div>
        <div class="card-grid" id="file-list">
            <!-- 텅 빈 상태일 때 디자인 -->
            <div class="empty-text" style="grid-column: 1 / -1;">
                업로드된 화면이 없습니다.<br><br>
                <span class="material-icons-outlined" style="font-size:36px; margin-top: 12px; opacity: 0.5;">cloud_upload</span>
            </div>
        </div>
    </div>

    <!-- 2. Workspace View -->
    <div id="workspace-view">
        <!-- Center: Interactive Canvas (사이드바 삭제로 확장) -->
        <main class="canvas" id="canvas">
            <div class="stage" id="stage">
                <div class="artboard-wrapper">
                    <!-- Image를 HTML Iframe으로 변경 -->
                    <iframe id="main-iframe" class="artboard-iframe" sandbox="allow-scripts allow-same-origin allow-forms allow-modals"></iframe>
                    
                    <div class="placeholder-card" id="placeholder">
                        <i class="material-icons-outlined">web</i>
                        <h3 style="color:var(--text-primary); font-weight: 500; font-size: 15px;">HTML 웹 설계서 뷰어</h3>
                        <p style="margin-top: 8px; font-size: 13px;">우측 업로드 영역 혹은 화면 아무 곳에<br>`.html` 파일을 끌어다 놓으세요.</p>
                    </div>
                </div>
            </div>
        </main>

        <!-- Right Panel: Properties & Upload Zone -->
        <aside class="sidebar sidebar-right">
            <div class="panel-header">Upload & Properties</div>
            <div class="panel-content" style="padding: 16px;">
                
                <!-- 우측 업로드 영역 추가 -->
                <label id="right-upload-zone" class="upload-zone">
                    <input type="file" id="file-upload-right" accept=".html,.htm" multiple hidden>
                    <i class="material-icons-outlined" style="font-size:36px; color:var(--accent);">upload_file</i>
                    <p style="margin-top:12px; font-size:12px; color:var(--text-secondary); line-height:1.5;">HTML 파일 업로드<br>(클릭 또는 드롭)</p>
                </label>

                <!-- GitHub Integration -->
                <div class="prop-section">
                    <div class="prop-title" style="display:flex; justify-content:space-between; align-items:center;">
                        GitHub Sync
                        <span id="gh-status" style="font-size:10px; font-weight:normal; color:var(--text-secondary);"></span>
                    </div>
                    <div style="display:flex; gap:8px;">
                        <input type="password" id="gh-token" placeholder="Personal Access Token" style="flex:1; background:rgba(0,0,0,0.2); border:1px solid rgba(255,255,255,0.1); color:#fff; padding:6px 10px; border-radius:4px; font-size:12px;" />
                        <button class="tool-btn" id="btn-save-token" style="width:auto; padding:0 12px; font-size:12px; height:auto;">Save</button>
                    </div>
                </div>

                <!-- Properties Panel -->
                <div id="properties-panel" style="margin-top: 16px;">
                    <div class="empty-text" style="padding:10px 0;">선택된 화면이 없습니다.</div>
                </div>
            </div>
        </aside>
    </div>

    <!-- Interface Logic -->
    <script>
        // State Management
        const state = {
            files: [],
            activeId: null,
            tool: 'select',
            transform: { x: 0, y: 0, scale: 1 },
            isDragging: false,
            startX: 0, startY: 0
        };

        const ghConfig = {
            owner: 'bychoi-space',
            repo: 'AI-work',
            token: localStorage.getItem('gh_token') || ''
        };

        // UI Reference
        const DOM = {
            uploadTop: document.getElementById('file-upload-top'),
            uploadRight: document.getElementById('file-upload-right'),
            rightZone: document.getElementById('right-upload-zone'),
            list: document.getElementById('file-list'),
            canvas: document.getElementById('canvas'),
            stage: document.getElementById('stage'),
            iframe: document.getElementById('main-iframe'),
            placeholder: document.getElementById('placeholder'),
            props: document.getElementById('properties-panel'),
            zoomTxt: document.getElementById('zoom-txt'),
            btnSelect: document.getElementById('btn-select'),
            btnHand: document.getElementById('btn-hand')
        };

        // Setup GitHub Settings
        if (ghConfig.token) {
            document.getElementById('gh-token').value = ghConfig.token;
            document.getElementById('gh-status').innerText = '가동 중🟢';
            document.getElementById('gh-status').style.color = '#4ade80';
        }
        document.getElementById('btn-save-token').addEventListener('click', () => {
            const val = document.getElementById('gh-token').value.trim();
            localStorage.setItem('gh_token', val);
            ghConfig.token = val;
            alert(val ? "GitHub 토큰이 안전하게 저장되었습니다!" : "토큰이 삭제되었습니다.");
            document.getElementById('gh-status').innerText = val ? '가동 중🟢' : '';
            document.getElementById('gh-status').style.color = '#4ade80';
            
            if (val) syncFilesFromGitHub(); // 토큰 저장 시 즉시 동기화
        });

        function encodeBase64(str) {
            return btoa(unescape(encodeURIComponent(str)));
        }

        async function uploadToGitHub(filename, content) {
            if (!ghConfig.token) return; 
            
            const statusEl = document.getElementById('gh-status');
            statusEl.innerText = '업로드 중 ⏳';
            statusEl.style.color = '#facc15';

            try {
                const url = `https://api.github.com/repos/${ghConfig.owner}/${ghConfig.repo}/contents/${filename}`;
                
                let sha = undefined;
                const getRes = await fetch(url, { headers: { 'Authorization': `token ${ghConfig.token}` }});
                if (getRes.ok) {
                    const data = await getRes.json();
                    sha = data.sha;
                }

                const putRes = await fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${ghConfig.token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `Auto-upload: ${filename} from UI Viewer`,
                        content: encodeBase64(content),
                        sha: sha
                    })
                });

                if (putRes.ok) {
                    statusEl.innerText = '저장 완료 ✅';
                    statusEl.style.color = '#4ade80';
                    setTimeout(() => statusEl.innerText = '가동 중🟢', 3000);
                    // 성공 시 목록 갱신 (이미 목록에 없을 경우를 위해)
                    if (!state.files.find(f => f.name === filename)) {
                         syncFilesFromGitHub();
                    }
                } else {
                    throw new Error('Upload failed');
                }
            } catch (err) {
                console.error(err);
                statusEl.innerText = '오류 발생 ❌';
                statusEl.style.color = '#ef4444';
            }
        }

        // -- GitHub 동기화 고도화 (새로고침 유지 로직) --
        
        async function syncFilesFromGitHub() {
            if (!ghConfig.token) return;
            const statusEl = document.getElementById('gh-status');
            statusEl.innerText = '동기화 중... 🔄';
            
            try {
                const url = `https://api.github.com/repos/${ghConfig.owner}/${ghConfig.repo}/contents/`;
                const res = await fetch(url, { headers: { 'Authorization': `token ${ghConfig.token}` }});
                if (!res.ok) throw new Error('Sync failed');
                
                const data = await res.json();
                const htmlFiles = data.filter(item => item.name.endsWith('.html') || item.name.endsWith('.htm'));
                
                // 기존의 Blob URL이 있는 파일들과 합치되, 중복 방지
                htmlFiles.forEach(item => {
                    const existing = state.files.find(f => f.name === item.name);
                    if (!existing) {
                        state.files.push({
                            id: 'gh_' + item.sha,
                            name: item.name,
                            src: null, // 원격 데이터 (처음엔 비워둠)
                            w: 1440, h: 900,
                            size: (item.size / 1024).toFixed(1) + ' KB',
                            isRemote: true
                        });
                    }
                });
                
                renderList();
                statusEl.innerText = '동기화 완료 ✅';
                setTimeout(() => statusEl.innerText = '가동 중🟢', 2000);
            } catch (err) {
                console.error(err);
                statusEl.innerText = '동기화 실패 ⚠️';
            }
        }

        async function fetchFileContent(f) {
            if (!ghConfig.token || !f.isRemote || f.src) return;
            
            try {
                const url = `https://api.github.com/repos/${ghConfig.owner}/${ghConfig.repo}/contents/${f.name}`;
                const res = await fetch(url, { 
                    headers: { 
                        'Authorization': `token ${ghConfig.token}`,
                        'Accept': 'application/vnd.github.v3.raw'
                    }
                });
                if (!res.ok) throw new Error('Fetch content failed');
                
                const htmlCode = await res.text();
                const blob = new Blob([htmlCode], {type: 'text/html;charset=utf-8'});
                f.src = URL.createObjectURL(blob);
            } catch (err) {
                console.error(err);
                alert("파일 내용을 가져오지 못했습니다.");
            }
        }

        // 1. File Upload & Processing (HTML 전용)
        function processFiles(fileList) {
            const newFiles = Array.from(fileList).filter(f => f.name.endsWith('.html') || f.name.endsWith('.htm') || f.type === 'text/html');
            if(newFiles.length === 0) {
                alert("HTML 파일만 업로드할 수 있습니다 (.html 기호를 확인해주세요).");
                return;
            }

            newFiles.forEach(file => {
                const reader = new FileReader();
                reader.onload = ev => {
                    const htmlCode = ev.target.result;
                    // HTML 텍스트를 IFrame에 넣기 위해 Blob URL로 변환
                    const blob = new Blob([htmlCode], {type: 'text/html;charset=utf-8'});
                    const blobUrl = URL.createObjectURL(blob);

                    const newFile = {
                        id: 'html_' + Date.now() + Math.random().toString(16).slice(2,8),
                        name: file.name,
                        src: blobUrl,
                        w: 1440, // Web 기본 해상도 매핑
                        h: 900,
                        size: (file.size / 1024).toFixed(1) + ' KB'
                    };
                    state.files.unshift(newFile);
                    renderList();
                    if(!state.activeId) selectFile(newFile.id);
                    
                    // GitHub 자동 업로드 호출
                    uploadToGitHub(file.name, htmlCode);
                };
                reader.readAsText(file); // HTML 요소를 위해 텍스트로 읽음
            });
        }

        // Bind File Inputs
        DOM.uploadTop.addEventListener('change', (e) => { processFiles(e.target.files); e.target.value = ''; });
        DOM.uploadRight.addEventListener('change', (e) => { processFiles(e.target.files); e.target.value = ''; });

        // 1.5 Global Drag & Drop with Right Zone Highlight
        let dragCounter = 0;

        document.body.addEventListener('dragenter', (e) => {
            e.preventDefault();
            dragCounter++;
            DOM.rightZone.classList.add('dragover');
        });

        document.body.addEventListener('dragover', (e) => {
            e.preventDefault();
        });

        document.body.addEventListener('dragleave', (e) => {
            dragCounter--;
            if (dragCounter === 0) {
                DOM.rightZone.classList.remove('dragover');
            }
        });

        document.body.addEventListener('drop', (e) => {
            e.preventDefault();
            dragCounter = 0;
            DOM.rightZone.classList.remove('dragover');
            if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                processFiles(e.dataTransfer.files);
            }
        });

        // 2. Layer List Rendering (Dashboard Grid View)
        function renderList() {
            if(state.files.length === 0) {
                DOM.list.innerHTML = `
                <div class="empty-text" style="grid-column: 1 / -1;">
                    저장소에 HTML 파일이 없습니다. 상단의 Upload 버튼을 누르거나 화면에 드롭하세요.<br><br>
                    <span class="material-icons-outlined" style="font-size:36px; margin-top: 12px; opacity: 0.5;">web_asset_off</span>
                </div>`;
                return;
            }
            DOM.list.innerHTML = '';
            state.files.forEach(f => {
                const card = document.createElement('div');
                card.className = 'file-card';
                card.onclick = () => selectFile(f.id);

                let thumbnailHtml = '';
                if (f.src) { 
                    thumbnailHtml = `<iframe src="${f.src}" class="thumbnail-iframe" style="transform: scale(0.18);" tabindex="-1"></iframe>`;
                } else {
                    thumbnailHtml = `
                        <div class="icon-wrapper" style="width: 100%; height: 100%;">
                            <span class="material-icons-outlined" style="font-size: 36px; opacity: 0.4;">cloud_download</span>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="thumbnail-wrapper">
                        ${thumbnailHtml}
                    </div>
                    <div class="card-info">
                        <div class="card-name" title="${f.name}">${f.name}</div>
                        <div class="card-meta">${f.isRemote ? 'Cloud' : 'Local'} • ${f.size} ${!f.src && f.isRemote ? '(Click to Download)' : ''}</div>
                    </div>
                `;
                DOM.list.appendChild(card);
            });
        }

        // 3. Selection & IFrame View Update
        async function selectFile(id) {
            state.activeId = id;
            renderList();
            const f = state.files.find(x => x.id === id);
            
            if(f) {
                // 원격 데이터이고 데이터가 없다면 먼저 가져옴
                if (f.isRemote && !f.src) {
                    const statusEl = document.getElementById('gh-status');
                    statusEl.innerText = '로드 중... ⏳';
                    await fetchFileContent(f);
                    statusEl.innerText = '가동 중🟢';
                    // 다운로드 완료 시 목록 화면의 썸네일도 갱신
                    renderList();
                }

                DOM.placeholder.style.display = 'none';
                DOM.iframe.src = f.src;
                DOM.iframe.style.display = 'block';
                
                // 뷰 전환: Dashboard -> Workspace
                document.getElementById('dashboard-view').style.display = 'none';
                document.getElementById('workspace-view').style.display = 'flex';
                
                // 툴바 버튼 노출 설정
                document.getElementById('btn-back').style.display = 'flex';
                document.getElementById('divider-back').style.display = 'block';
                document.getElementById('btn-select').style.display = 'flex';
                document.getElementById('btn-hand').style.display = 'flex';
                document.getElementById('divider-tools').style.display = 'block';
                document.querySelectorAll('.device-btn').forEach(btn => btn.style.display = 'flex');
                document.getElementById('header-actions').style.display = 'flex';
                
                // 도화지 렌더링 리사이즈 맞춤
                setTimeout(() => centerViewForImage(f.w, f.h), 10);
                
                // Update Properties Panel
                DOM.props.innerHTML = `
                    <div class="prop-section">
                        <div class="prop-title">File Info</div>
                        <div class="prop-row">
                            <span class="prop-label">Name</span>
                            <div class="prop-value-box" style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" title="${f.name}">${f.name}</div>
                        </div>
                        <div class="prop-row">
                            <span class="prop-label">Size</span>
                            <div class="prop-value-box">${f.size}</div>
                        </div>
                    </div>
                    <div class="prop-section">
                        <div class="prop-title">Default Dimensions</div>
                        <div class="prop-row">
                            <span class="prop-label">View Width</span>
                            <div class="prop-value-box">${f.w}</div>
                        </div>
                        <div class="prop-row">
                            <span class="prop-label">View Height</span>
                            <div class="prop-value-box">${f.h}</div>
                        </div>
                    </div>
                `;
                centerViewForImage(f.w, f.h);
            }
        }

        // Workspace -> Dashboard 전환 로직
        window.goBackToDashboard = function() {
            state.activeId = null;
            DOM.iframe.src = '';
            DOM.iframe.style.display = 'none';
            // 뷰 전환: Workspace -> Dashboard
            document.getElementById('dashboard-view').style.display = 'flex';
            document.getElementById('workspace-view').style.display = 'none';
            
            // 툴바 버튼 숨김 설정
            document.getElementById('btn-back').style.display = 'none';
            document.getElementById('divider-back').style.display = 'none';
            document.getElementById('btn-select').style.display = 'none';
            document.getElementById('btn-hand').style.display = 'none';
            document.getElementById('divider-tools').style.display = 'none';
            document.querySelectorAll('.device-btn').forEach(btn => btn.style.display = 'none');
            document.getElementById('header-actions').style.display = 'none';
        }

        // 3.5 Device Viewport Management
        function setDeviceViewport(type, w, h) {
            // 버튼 활성화 상태 업데이트
            document.querySelectorAll('.tools .tool-btn[onclick^="setDeviceViewport"]').forEach(btn => btn.classList.remove('active'));
            if(type === 'mobile') document.querySelector('.tools .tool-btn[onclick*="mobile"]').classList.add('active');
            else if(type === 'tablet') document.querySelector('.tools .tool-btn[onclick*="tablet"]').classList.add('active');
            else document.getElementById('btn-desktop').classList.add('active');

            // iframe 크기 조절 (CSS 트랜지션 효과 적용됨)
            DOM.iframe.style.width = w + 'px';
            DOM.iframe.style.height = h + 'px';

            // 크기 변경 후 약간의 지연 후에 도화지 중심 맞춤 (트랜지션이 부드럽게 보이도록)
            setTimeout(() => {
                centerViewForImage(w, h);
            }, 50);
        }

        // 4. Tools (Select vs Pan)
        function setTool(t) {
            state.tool = t;
            DOM.btnSelect.classList.toggle('active', t === 'select');
            DOM.btnHand.classList.toggle('active', t === 'hand');
            DOM.canvas.classList.toggle('hand-active', t === 'hand');
            // Allow pointer events on iframe only when the 'Select' tool is active.
            // This grants iframe scrolling/clicking naturally. If 'Hand', we steal dragging!
            DOM.iframe.style.pointerEvents = t === 'hand' ? 'none' : 'auto';
        }
        DOM.btnSelect.onclick = () => setTool('select');
        DOM.btnHand.onclick = () => setTool('hand');

        // Shortcut Keys (Spacebar temporarily overrides Select Tool to Hand)
        window.addEventListener('keydown', e => {
            if(e.key === 'Escape' && state.activeId) {
                goBackToDashboard();
            }
            if(e.code === 'Space' && state.tool !== 'hand' && e.target.tagName !== 'INPUT' && state.activeId) {
                DOM.canvas.classList.add('hand-active');
                DOM.iframe.style.pointerEvents = 'none';
            }
            if(e.code === 'KeyV' && e.target.tagName !== 'INPUT') setTool('select');
            if(e.code === 'KeyH' && e.target.tagName !== 'INPUT') setTool('hand');
        });
        window.addEventListener('keyup', e => {
            if(e.code === 'Space' && state.tool !== 'hand') {
                DOM.canvas.classList.remove('hand-active');
                DOM.iframe.style.pointerEvents = 'auto'; // 리스토어
            }
        });

        // 5. Canvas Pan & Zoom Engine
        function updateTransform() {
            DOM.stage.style.transform = `translate(${state.transform.x}px, ${state.transform.y}px) scale(${state.transform.scale})`;
            DOM.zoomTxt.innerText = Math.round(state.transform.scale * 100) + '%';
        }

        window.centerView = function() {
            let iw = 1440; let ih = 900;
            if (DOM.iframe && DOM.iframe.style.display !== 'none') {
                iw = DOM.iframe.offsetWidth || 1440;
                ih = DOM.iframe.offsetHeight || 900;
            } else if (DOM.placeholder && DOM.placeholder.style.display !== 'none') {
                iw = DOM.placeholder.offsetWidth || 400;
                ih = DOM.placeholder.offsetHeight || 200;
            }
            centerViewForImage(iw, ih);
        }

        function centerViewForImage(iw, ih) {
            const cw = DOM.canvas.clientWidth;
            const ch = DOM.canvas.clientHeight;
            // Pad 20%
            const s = Math.min((cw * 0.8) / iw, (ch * 0.8) / ih, 1);
            
            // 중앙 자동 정렬 (캔버스 크기에서 축소된 화면의 크기를 뺀 여백의 절반)
            state.transform = {
                x: (cw - (iw * s)) / 2,
                y: (ch - (ih * s)) / 2,
                scale: s
            };
            updateTransform();
        }

        DOM.canvas.addEventListener('wheel', e => {
            // Iframe 내부에서 스크롤을 시도할 수도 있으니, 
            // Select 툴 상태에서 iframe 영역에 마우스를 둔 경우 wheel 이벤트가 iframe 내부를 움직입니다.
            // 이 이벤트 리스너는 canvas (Stage 영역 밖 혹은 pointer-events가 none일 때) 동작합니다.
            
            e.preventDefault();
            const s = state.transform.scale;
            // Zoom behavior
            const zoomSensitivity = 0.05;
            const delta = e.deltaY > 0 ? -zoomSensitivity : zoomSensitivity;
            const ns = Math.max(0.05, Math.min(s * (1 + delta), 20)); // allow large zoom
            
            // Zoom precisely to cursor position
            const r = DOM.canvas.getBoundingClientRect();
            const mx = e.clientX - r.left;
            const my = e.clientY - r.top;
            
            state.transform.x = mx - (mx - state.transform.x) * (ns / s);
            state.transform.y = my - (my - state.transform.y) * (ns / s);
            state.transform.scale = ns;
            updateTransform();
        }, {passive: false});

        DOM.canvas.addEventListener('mousedown', e => {
            const isHand = state.tool === 'hand' || e.button === 1 || DOM.canvas.classList.contains('hand-active');
            if(isHand) {
                state.isDragging = true;
                state.startX = e.clientX - state.transform.x;
                state.startY = e.clientY - state.transform.y;
                e.preventDefault();
            }
        });

        window.addEventListener('mousemove', e => {
            if(!state.isDragging) return;
            state.transform.x = e.clientX - state.startX;
            state.transform.y = e.clientY - state.startY;
            updateTransform();
        });

        window.addEventListener('mouseup', () => state.isDragging = false);

        // Initial setup
        centerView();
        if (ghConfig.token) syncFilesFromGitHub(); 
    </script>
</body>
</html>
