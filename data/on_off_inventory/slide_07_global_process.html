<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
    <style>
        .flow-stage-v9 { padding: 50px 80px; height: 100%; position: relative; }
        .flow-step { 
            position: absolute; width: 140px; height: 90px; border: 2.5px solid #333; 
            border-radius: 12px; background: #fff; z-index: 10;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; font-weight: 900; font-size: 13px; color: #222;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.1);
        }
        .step-num { font-size: 32px; color: #C8192E; margin-bottom: 5px; opacity: 0.2; position: absolute; top: -5px; left: 10px; }
        
        .step-oms { background: #E2EFDA; }
        .step-center { background: #E9EDF4; }
        .step-shop { background: #FFF2CC; }
    </style>
</head>
<body>
    <div class="slide-canvas">
        <header class="ppt-header">07. 전체 주문 이행 프로세스 (Global Fulfillment Flow)</header>

        <div class="flow-stage-v9">
            <svg style="position:absolute; width:100%; height:100%; top:0; left:0;">
                <defs>
                    <marker id="arr-big" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                        <polygon points="0 0, 10 3.5, 0 7" fill="#666" />
                    </marker>
                </defs>
                <line x1="220" y1="210" x2="330" y2="210" stroke="#666" stroke-width="2" marker-end="url(#arr-big)" />
                <line x1="470" y1="210" x2="580" y2="210" stroke="#666" stroke-width="2" marker-end="url(#arr-big)" />
                <path d="M 720 210 L 800 210 L 800 130 L 880 130" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arr-big)" />
                <path d="M 800 210 L 800 290 L 880 290" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arr-big)" />
                <line x1="1020" y1="130" x2="1130" y2="130" stroke="#666" stroke-width="2" marker-end="url(#arr-big)" />
                <line x1="1020" y1="290" x2="1130" y2="290" stroke="#666" stroke-width="2" marker-end="url(#arr-big)" />
            </svg>

            <div class="flow-step" style="top:165px; left:80px;">
                <div class="step-num">01</div>
                주문완료<br>(LFmall)
            </div>
            <div class="flow-step step-oms" style="top:165px; left:330px;">
                <div class="step-num">02</div>
                주문수집/배정<br>(OMS)
            </div>
            <div class="flow-step step-oms" style="top:165px; left:580px;">
                <div class="step-num">03</div>
                재고 가용성 체크
            </div>

            <!-- Branch 1: Center -->
            <div class="flow-step step-center" style="top:85px; left:880px;">
                <div class="step-num">04</div>
                센터 직송 출고
            </div>
            <div class="flow-step" style="top:85px; left:1130px;">
                <div class="step-num">05</div>
                배송완료
            </div>

            <!-- Branch 2: Shop -->
            <div class="flow-step step-shop" style="top:245px; left:880px;">
                <div class="step-num">04'</div>
                매장 상품 배송
            </div>
            <div class="flow-step" style="top:245px; left:1130px;">
                <div class="step-num">05'</div>
                배송완료
            </div>

            <div style="position:absolute; bottom:60px; left:80px; right:80px; padding:25px; border:2px dashed #C8192E; border-radius:12px; background:rgba(200,25,46,0.02);">
                <p style="font-size:14px; font-weight:900; color:#C8192E; margin-bottom:10px;">★ 주요 결정 사항</p>
                <p style="font-size:12px; color:#444; font-weight:700;">• 매장 상품 배송 시, OMS에서 실시간 매장 재고 확인 후 배정 로직 수행 (API 기반)</p>
                <p style="font-size:12px; color:#444; font-weight:700;">• 센터 재고 우선 배정 원칙 (Policy Root: Center First)</p>
            </div>
        </div>

        <div class="ppt-footer">
            <div class="ppt-logo-box">LF</div>
            <div style="font-size:10px; color:#555; font-weight:bold;">7</div>
        </div>
    </div>
</body>
</html>
