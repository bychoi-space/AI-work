<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
    <style>
        .lt-stage-hf { padding: 80px 110px; display: flex; flex-direction: column; align-items: center; }
        
        .timeline-box-hf {
            display: flex; gap: 40px; align-items: center; margin-bottom: 60px;
        }
        .time-pill-hf {
            width: 140px; text-align: center;
        }
        .time-circle-hf {
            width: 70px; height: 70px; border-radius: 50%; background: #fff;
            border: 2px solid #DDD; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 12px; font-weight: 900; font-size: 14px; box-shadow: var(--ppt-shadow);
        }
        .time-circle-hf.active { border-color: var(--lf-red); color: var(--lf-red); }
        
        .timeline-line-hf { width: 60px; height: 2px; background: #DDD; margin-top: -25px; }
    </style>
</head>
<body>
    <div class="slide-canvas">
        <header class="ppt-header">11. 배송 LT 및 자동결품 정책 (Delivery Policy)</header>

        <div class="lt-stage-hf">
            <div class="timeline-box-hf">
                <div class="time-pill-hf"><div class="time-circle-hf active">D + 0</div><p style="font-size:12px; font-weight:bold;">시스템 배정</p></div>
                <div class="timeline-line-hf"></div>
                <div class="time-pill-hf"><div class="time-circle-hf active">D + 1</div><p style="font-size:12px; font-weight:bold;">상품 준비</p></div>
                <div class="timeline-line-hf"></div>
                <div class="time-pill-hf"><div class="time-circle-hf">D + 2</div><p style="font-size:12px;">택배 발송</p></div>
                <div class="timeline-line-hf"></div>
                <div class="time-pill-hf" style="opacity:0.4;"><div class="time-circle-hf">D + 3</div><p style="font-size:12px;">자동결품</p></div>
            </div>

            <table class="data-table-hf">
                <thead>
                    <tr><th style="background:#333; color:#fff; width:150px;">매장 유형</th><th>상품준비 기한 (LT)</th><th>자동결품 시점</th><th>패널티 정책</th></tr>
                </thead>
                <tbody>
                    <tr><td style="font-weight:900; background:#F8FAFC;">백화점/직영</td><td>배정 후 24시간 이내</td><td style="color:var(--lf-red); font-weight:900;">D+2일 자정</td><td>결품률 5% 초과 시 배정 정지</td></tr>
                    <tr><td style="font-weight:900; background:#F8FAFC;">대리점</td><td>배정 후 48시간 이내</td><td style="color:var(--lf-red); font-weight:900;">D+3일 자정</td><td>점주 수동 컨펌 필수</td></tr>
                </tbody>
            </table>
        </div>

        <div class="ppt-footer-logo">LF</div>
    </div>
</body>
</html>
