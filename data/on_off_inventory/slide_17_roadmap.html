<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
    <style>
        .roadmap-stage {
            padding: 80px 100px;
        }

        .timeline-header {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            border-bottom: 2px solid #333;
            padding-bottom: 15px;
            margin-bottom: 30px;
        }
        .q-mark { font-size: 18px; font-weight: 900; color: #333; }

        .phase-row {
            display: grid;
            grid-template-columns: 180px 1fr;
            margin-bottom: 25px;
            align-items: center;
        }
        .phase-label { font-size: 14px; font-weight: 700; color: #555; }
        
        .gantt-bar {
            height: 35px;
            background: #F1F3F5;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }
        .gantt-fill {
            height: 100%;
            position: absolute;
            background: #DEEAF6;
            border: 1px solid #BDD7EE;
            display: flex;
            align-items: center;
            padding-left: 15px;
            font-size: 12px;
            font-weight: 700;
        }
        .gantt-fill.active { background: var(--node-lfmall-bg); border-color: #2E5BFF; box-shadow: 0 4px 10px rgba(46, 91, 255, 0.2); }
        .gantt-fill.red { background: rgba(200, 25, 46, 0.1); border-color: var(--lf-red); color: var(--lf-red); }
    </style>
</head>
<body>
    <div class="slide-canvas">
        <header class="ppt-header">17. 개발 및 런칭 로드맵</header>

        <div class="roadmap-stage">
            <div class="timeline-header">
                <div class="q-mark">1Q</div>
                <div class="q-mark">2Q</div>
                <div class="q-mark">3Q</div>
                <div class="q-mark">4Q</div>
            </div>

            <div class="phase-row">
                <div class="phase-label">기획/기반</div>
                <div class="gantt-bar">
                    <div class="gantt-fill" style="width: 25%;">프로세스 설계 및 요건 정의</div>
                </div>
            </div>

            <div class="phase-row">
                <div class="phase-label">인터페이스</div>
                <div class="gantt-bar">
                    <div class="gantt-fill" style="width: 35%; left: 20%;">SAP ↔ OMS ↔ LFM 연동 개발</div>
                </div>
            </div>

            <div class="phase-row">
                <div class="phase-label">프론트/어드민</div>
                <div class="gantt-bar">
                    <div class="gantt-fill active" style="width: 30%; left: 35%;">UI 고도화 및 운영 도구 구축</div>
                </div>
            </div>

            <div class="phase-row">
                <div class="phase-label">안정화/오픈</div>
                <div class="gantt-bar">
                    <div class="gantt-fill red" style="width: 20%; left: 60%; font-weight:900;">★ GRAND OPEN (June)</div>
                </div>
            </div>
        </div>

        <div class="ppt-footer-logo">LF</div>
    </div>
</body>
</html>
