<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
    <style>
        .roadmap-stage-v4 { padding: 80px 110px; }
        .gantt-table-v4 { width:100%; border-collapse: collapse; border: 1px solid #CCC; table-layout: fixed; }
        .gantt-table-v4 th { background: #EEE; border: 1px solid #CCC; padding: 10px; font-size: 13px; text-align: center; }
        .gantt-table-v4 td { border: 1px solid #DDD; height: 50px; padding: 0 10px; position: relative; }
        
        .gantt-bar-v4 {
            position: absolute; top: 12px; bottom: 12px; border-radius: 20px;
            background: #444; color: #fff; font-size: 10px; font-weight: 800;
            display: flex; align-items: center; justify-content: center; box-shadow: var(--ppt-shadow);
        }
        .gantt-bar-v4.red { background: var(--lf-red); }
    </style>
</head>
<body>
    <div class="slide-canvas">
        <header class="ppt-header-strategy">17. 향후 주요 추진 일정 (Project Roadmap)</header>
        
        <div class="roadmap-stage-v4">
            <table class="gantt-table-v4">
                <thead>
                    <tr><th style="width:120px;">Task</th><th>4월 2주</th><th>4월 3주</th><th>4월 4주</th><th>5월 1주</th><th>5월 2주</th></tr>
                </thead>
                <tbody>
                    <tr><td style="font-weight:900;">기획/설계</td><td><div class="gantt-bar-v4" style="left:10px; right:-10px;">Process Fix</div></td><td></td><td></td><td></td><td></td></tr>
                    <tr><td style="font-weight:900;">시스템 개발</td><td></td><td><div class="gantt-bar-v4 red" style="left:5px; right:-10px; width:450px;">Interface / UI Development</div></td><td></td><td></td><td></td></tr>
                    <tr><td style="font-weight:900;">통합 테스트</td><td></td><td></td><td></td><td><div class="gantt-bar-v4" style="left:5px; right:5px;">Beta Test</div></td><td></td></tr>
                    <tr><td style="font-weight:900;">안정화/오픈</td><td></td><td></td><td></td><td></td><td><div class="gantt-bar-v4" style="left:5px; right:5px; background:#059669;">Go-Live</div></td></tr>
                </tbody>
            </table>
        </div>

        <div class="ppt-footer">
            <div class="ppt-logo-box">LF</div>
            <div>PAGE 17</div>
        </div>
    </div>
</body>
</html>
