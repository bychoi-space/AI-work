<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
    <style>
        .res-stage-hf { padding: 80px 110px; }
        .summary-banner-hf {
            background: #252830; color: #fff; padding: 40px; border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center; margin-top: 50px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="slide-canvas">
        <header class="ppt-header">12. 리소스 산출 및 투입 안 (Project Resources)</header>

        <div class="res-stage-hf">
            <table class="data-table-hf">
                <thead>
                    <tr><th style="background:#F1F3F5;">구분</th><th>주요 과업 (Task)</th><th>M/D</th><th>비중</th></tr>
                </thead>
                <tbody>
                    <tr><td><b>기획/설계</b></td><td>프로세스 정의 및 전장 UI 기획</td><td style="text-align:right;">40</td><td>25%</td></tr>
                    <tr><td><b>시스템 연동</b></td><td>SAP/OMS/LFM 인터페이스 개발</td><td style="text-align:right; color:var(--lf-red); font-weight:900;">85</td><td>53%</td></tr>
                    <tr><td><b>인프라/보안</b></td><td>DB 튜닝 및 보안 취약점 점검</td><td style="text-align:right;">15</td><td>9%</td></tr>
                    <tr><td><b>QA/안정화</b></td><td>통합 테스트 및 현업 교육</td><td style="text-align:right;">20</td><td>13%</td></tr>
                </tbody>
            </table>

            <div class="summary-banner-hf">
                <div>
                    <div style="font-size:14px; opacity:0.6; margin-bottom:10px; font-weight:800; letter-spacing:1px;">TOTAL PROJECT RESOURCE</div>
                    <div style="font-size:16px;">본 프로젝트 완수를 위한 최적 가용 공수</div>
                </div>
                <div style="text-align:right;">
                    <div style="font-size:52px; font-weight:900; color:var(--lf-red);">160 M/D</div>
                </div>
            </div>
        </div>

        <div class="ppt-footer-logo">LF</div>
    </div>
</body>
</html>
