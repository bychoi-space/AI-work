<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
    <style>
        .admin-view-hf {
            padding: 30px 40px; margin-left: 240px; background: #F5F6F8; height: calc(100% - 48px);
            display: grid; grid-template-columns: 2fr 1fr; gap: 20px;
        }
        .detail-card-hf { background: #fff; padding: 25px; border: 1px solid #DDD; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="slide-canvas">
        <header class="ppt-header">35. [어드민] 주문 정보 상세 조회</header>

        <!-- Sidebar placeholder -->
        <div style="width:240px; background:#252830; height:100%; position:absolute; top:48px; left:0; padding:20px;">
            <div style="color:#FFF; opacity:0.3; font-size:10px;">DASHBOARD</div>
            <div style="color:#FFF; margin-top:20px; font-size:13px;">→ 주문 상세 조회</div>
        </div>

        <div class="admin-view-hf">
            <div class="detail-card-hf">
                <h4 style="margin-bottom:20px;">주문 정보 (20260420-9981)</h4>
                <div style="display:grid; grid-template-columns: 100px 1fr; gap:15px; font-size:13px;">
                    <b>주문일시</b> <span>2026.04.20 13:45:12</span>
                    <b>주문자</b> <span>홍길동 (010-1234-****)</span>
                    <b>배송지</b> <span>서울시 강남구 언주로 123...</span>
                </div>
                <hr style="margin:20px 0; border:none; border-top:1px solid #EEE;">
                <h4 style="margin-bottom:15px;">주문 상품</h4>
                <div style="display:flex; gap:15px; background:#F8FAFC; padding:15px; border-radius:4px;">
                    <div style="width:50px; height:70px; background:#EEE;"></div>
                    <div>
                        <span class="admin-badge" style="background:var(--lf-red); color:#fff;">매장배송</span>
                        <div style="font-weight:700; margin-top:4px;">HAZZYS 기모 티셔츠</div>
                        <div style="font-size:12px; color:#666;">배정 매장: <b>강남본점</b></div>
                    </div>
                </div>
            </div>

            <div class="detail-card-hf" style="border-top:5px solid var(--lf-red);">
                <h4>배송 처리</h4>
                <div style="margin-top:20px;">
                    <label style="font-size:12px; display:block; margin-bottom:5px;">배송사</label>
                    <select class="form-input" style="width:100%;"><option>로젠택배</option></select>
                    <label style="font-size:12px; display:block; margin-top:15px; margin-bottom:5px;">운송장 번호</label>
                    <input type="text" class="form-input" style="width:100%;" placeholder="- 제외 입력">
                    <button class="btn-lf" style="width:100%; margin-top:20px; height:45px;">발송 처리</button>
                    <button class="btn-lf" style="width:100%; margin-top:10px; height:45px; background:#475569;">매정 변경/결품</button>
                </div>
            </div>
        </div>

        <div class="ppt-footer-logo">LF</div>
    </div>
</body>
</html>
