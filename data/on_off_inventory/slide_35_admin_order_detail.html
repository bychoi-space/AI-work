<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
    <style>
        .detail-row-v4 { display: grid; grid-template-columns: 120px 1fr; gap: 20px; font-size: 14px; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="slide-canvas">
        <div class="admin-sidebar-v4">
            <div style="font-size:10px; opacity:0.4; margin-bottom:20px;">SYSTEM MONITOR</div>
            <div style="font-size:14px; margin-bottom:15px; font-weight:bold;">Dashboard</div>
            <div style="font-size:14px; margin-bottom:15px; color:var(--lf-red); font-weight:bold;">▶ 주문 상세 정보</div>
        </div>

        <div class="admin-stage-v4">
            <header style="margin-bottom:30px;">
                <h2 style="font-size:22px; font-weight:900;">주문 처리 및 배송 연동 상태</h2>
            </header>

            <div style="background:#fff; border:1px solid #CCC; padding:30px; border-radius:4px; box-shadow: var(--ppt-shadow);">
                <h4 style="font-size:16px; font-weight:900; margin-bottom:25px; border-bottom:2px solid #333; padding-bottom:10px;">주문 정보</h4>
                <div class="detail-row-v4"><b>주문번호</b> <span>20260420-9988</span></div>
                <div class="detail-row-v4"><b>주문자</b> <span>홍길동 (010-****-5678)</span></div>
                <div class="detail-row-v4"><b>배송지</b> <span>서울 강남구 언주로 123...</span></div>
                
                <h4 style="font-size:16px; font-weight:900; margin-top:40px; margin-bottom:20px;">처리 현황</h4>
                <div style="background:#F8FAFC; padding:20px; border:1px solid #EEE;">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-weight:900; color:var(--lf-red);">[매장발송완료]</span>
                        <span style="font-size:12px; color:#666;">2026.04.20 14:30 처리됨</span>
                    </div>
                    <div style="margin-top:10px; font-size:13px;">로젠택배 (1234567890) - <b style="color:var(--lf-red);">강남본점</b> 발송</div>
                </div>
            </div>
        </div>

        <div class="ppt-footer">
            <div class="ppt-logo-box">LF</div>
            <div>PAGE 35</div>
        </div>
    </div>
</body>
</html>
