<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
    <style>
        .interface-stage-hf { padding: 100px 110px; position: relative; }
        .tech-label-hf {
            position: absolute; font-size: 11px; font-weight: 900;
            background: #fff; border: 1.5px solid #DDD; padding: 4px 12px;
            border-radius: 20px; color: var(--lf-red); z-index: 20;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="slide-canvas">
        <header class="ppt-header">14. 시스템간 데이터 연동 상세 (Interface Map)</header>

        <div class="interface-stage-hf">
            <svg class="svg-flow-layer">
                <defs>
                    <marker id="arrow-gray-hf" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                        <polygon points="0 0, 10 3.5, 0 7" fill="#999" />
                    </marker>
                </defs>
                <!-- Horizontal -->
                <line x1="290" y1="180" x2="430" y2="180" stroke="#999" stroke-width="2" marker-end="url(#arrow-gray-hf)" />
                <line x1="430" y1="200" x2="290" y2="200" stroke="#999" stroke-width="2" marker-end="url(#arrow-gray-hf)" />
                
                <!-- Vertical -->
                <line x1="520" y1="250" x2="520" y2="350" stroke="#999" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-gray-hf)" />
                <line x1="210" y1="350" x2="210" y2="250" stroke="#999" stroke-width="2" marker-end="url(#arrow-gray-hf)" />
            </svg>

            <!-- Nodes -->
            <div class="ppt-node-hf" style="top: 140px; left: 130px; width: 160px; height: 80px; border-color: #2E5BFF;">LFmall</div>
            <div class="ppt-node-hf" style="top: 140px; left: 440px; width: 160px; height: 80px; border-color: #059669;">OMS</div>
            <div class="ppt-node-hf" style="top: 360px; left: 440px; width: 160px; height: 80px; border-color: #D97706;">SAP ERP</div>
            <div class="ppt-node-hf" style="top: 360px; left: 130px; width: 160px; height: 80px; border-color: #6366F1;">POS</div>

            <!-- Labels -->
            <div class="tech-label-hf" style="top: 178px; left: 320px;">REAL-TIME API</div>
            <div class="tech-label-hf" style="top: 285px; left: 535px;">10M BATCH</div>
            <div class="tech-label-hf" style="top: 285px; left: 125px;">RFC / EAI</div>
        </div>

        <div class="ppt-footer-logo">LF</div>
    </div>
</body>
</html>
