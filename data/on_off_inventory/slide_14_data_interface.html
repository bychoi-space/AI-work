<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
    <style>
        .interface-canvas {
            position: relative;
            width: 100%;
            height: 500px;
            margin-top: 50px;
        }

        .sys-node {
            width: 160px;
            height: 80px;
            background: #fff;
            border: 2px solid #333;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            position: absolute;
            z-index: 5;
        }

        .line-tech { position: absolute; height: 2px; background: #666; }
        .label-tech { position: absolute; font-size: 11px; color: var(--lf-red); font-weight: 700; background: #fff; padding: 2px 6px; border: 1px solid #ddd; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="slide-canvas">
        <header class="ppt-header">14. 시스템간 데이터 연동 상세</header>

        <div class="interface-canvas">
            <div class="sys-node" style="top: 50px; left: 100px; border-color: #2E5BFF;">LFmall</div>
            <div class="sys-node" style="top: 50px; left: 450px; border-color: #059669;">OMS</div>
            <div class="sys-node" style="top: 300px; left: 450px; border-color: #D97706;">SAP ERP</div>
            <div class="sys-node" style="top: 300px; left: 100px; border-color: #6366F1;">POS</div>

            <!-- Lines & Labels -->
            <div class="line-tech" style="top: 90px; left: 260px; width: 190px;"></div>
            <div class="label-tech" style="top: 78px; left: 320px;">API (Real-time)</div>

            <div class="line-tech" style="top: 130px; left: 530px; width: 2px; height: 170px;"></div>
            <div class="label-tech" style="top: 200px; left: 540px;">BATCH (10m)</div>

            <div class="line-tech" style="top: 340px; left: 260px; width: 190px;"></div>
            <div class="label-tech" style="top: 328px; left: 320px;">RFC / EAI</div>
        </div>

        <div class="ppt-footer-logo">LF</div>
    </div>
</body>
</html>
