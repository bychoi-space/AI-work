<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
    <style>
        .modal-overlay-hf {
            position: absolute; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-hf {
            width: 520px; background: #fff; border-radius: 12px; overflow: hidden;
            box-shadow: 0 30px 90px rgba(0,0,0,0.4); border: 1px solid #999;
        }
        .modal-header-hf { background: #252830; color: #fff; padding: 18px 25px; display: flex; justify-content: space-between; align-items: center; }
        .modal-body-hf { padding: 30px; }
        
        .brand-list-node-hf {
            height: 280px; overflow-y: auto; border: 1.5px solid #EEE; margin-top: 20px; border-radius: 6px;
        }
        .brand-row-node-hf { padding: 14px 20px; border-bottom: 1px solid #F1F3F5; display: flex; justify-content: space-between; font-size: 14px; align-items: center; }
        .brand-row-node-hf:hover { background: #F8FAFC; cursor: pointer; }
        .brand-row-node-hf.selected-node { background: rgba(200, 25, 46, 0.05); border-left: 4px solid var(--lf-red); }
    </style>
</head>
<body>
    <div class="slide-canvas">
        <header class="ppt-header">38. [어드민] 브랜드 조회 / 선택 팝업 (Modal)</header>

        <div class="modal-overlay-hf">
            <div class="modal-hf">
                <div class="modal-header-hf">
                    <b style="font-size:16px;">브랜드 검색 / 선택</b>
                    <span style="font-size:24px; cursor:pointer;">&times;</span>
                </div>
                <div class="modal-body-hf">
                    <div style="display:flex; gap:12px;">
                        <input type="text" class="form-input-hf" style="flex:1;" placeholder="브랜드명 또는 코드 입력">
                        <button style="background:var(--lf-red); color:#fff; border:none; padding:0 24px; font-weight:900; border-radius:4px; height:42px;">Search</button>
                    </div>
                    <div class="brand-list-node-hf">
                        <div class="brand-row-node-hf"><span>HAZZYS</span> <span style="font-size:11px; color:#999;">HZ</span></div>
                        <div class="brand-row-node-hf selected-node"><b>DAKS</b> <span style="font-size:11px; color:var(--lf-red); font-weight:900;">DK [SELECTED]</span></div>
                        <div class="brand-row-node-hf"><span>MAESTRO</span> <span style="font-size:11px; color:#999;">MT</span></div>
                        <div class="brand-row-node-hf"><span>ATHE VANESSABRUNO</span> <span style="font-size:11px; color:#999;">AT</span></div>
                        <div class="brand-row-node-hf"><span>JILLSTUART</span> <span style="font-size:11px; color:#999;">JS</span></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="ppt-footer-logo">LF</div>
    </div>
</body>
</html>
