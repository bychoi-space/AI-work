<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
    <style>
        .modal-overlay-v9 { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;
            z-index: 100;
        }
        .modal-v9 { 
            width: 600px; background: #fff; border-radius: 8px; overflow: hidden;
            box-shadow: 0 40px 80px rgba(0,0,0,0.4); border: 2px solid #333;
        }
        .modal-header-v9 { background: #333; color: #fff; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; }
        .modal-body-v9 { padding: 25px; }

        .brand-list-v9 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; max-height: 300px; overflow-y: auto; }
        .brand-item-v9 { padding: 10px; border: 1.2px solid #EEE; font-size: 11px; font-weight: 700; cursor: pointer; }
        .brand-item-v9:hover { background: #F4F6F9; border-color: #2E5BFF; color: #2E5BFF; }
        
        .alpha-filter-v9 { display: flex; gap: 5px; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #EEE; overflow-x: auto; }
        .alpha-chip-v9 { padding: 4px 8px; background: #F1F3F5; font-size: 10px; font-weight: 900; border-radius: 4px; cursor: pointer; }
        .alpha-chip-v9.active { background: #333; color: #fff; }
    </style>
</head>
<body>
    <div class="slide-canvas" style="background:#F2F4F7;">
        <!-- Background Screen (Blurred) -->
        <div style="filter: blur(4px); padding: 40px;">
            <div style="width:100%; height:400px; background:#fff; border:1px solid #DDD;"></div>
        </div>

        <!-- Identity Locked: Brand Selection Modal -->
        <div class="modal-overlay-v9">
            <div class="modal-v9">
                <div class="modal-header-v9">
                    <span style="font-size:14px; font-weight:900;">운영 브랜드 조회 (Brand Selection)</span>
                    <span style="cursor:pointer; font-size:18px;">×</span>
                </div>
                <div class="modal-body-v9">
                    <div class="alpha-filter-v9">
                        <div class="alpha-chip-v9 active">ALL</div>
                        <div class="alpha-chip-v9">A</div><div class="alpha-chip-v9">B</div><div class="alpha-chip-v9">C</div>
                        <div class="alpha-chip-v9">D</div><div class="alpha-chip-v9">E</div><div class="alpha-chip-v9">F</div>
                        <div class="alpha-chip-v9">H</div><div class="alpha-chip-v9">I</div><div class="alpha-chip-v9">J</div>
                    </div>
                    
                    <input type="text" placeholder="브랜드명 검색" style="width:100%; padding:10px; border:1px solid #DDD; font-size:12px; margin-bottom:15px; border-radius:4px;">

                    <div class="brand-list-v9">
                        <div class="brand-item-v9">H001 - HAZZYS</div>
                        <div class="brand-item-v9">D002 - DAKS</div>
                        <div class="brand-item-v9">J003 - JILLSTUART</div>
                        <div class="brand-item-v9">M004 - MAESTRO</div>
                        <div class="brand-item-v9">A005 - ATHE</div>
                        <div class="brand-item-v9">T006 - TNGT</div>
                    </div>

                    <div style="margin-top:25px; display:flex; justify-content:flex-end; gap:10px;">
                        <button style="padding:10px 25px; border:1px solid #DDD; background:#fff; font-size:12px; font-weight:900;">취소</button>
                        <button style="padding:10px 25px; border:none; background:#111; color:#fff; font-size:12px; font-weight:900;">선택 완료</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="ppt-footer">
            <div class="ppt-logo-box" style="background:#fff; color:#111;">LF</div>
            <div style="font-size:12px; font-weight:900; color:#fff;">38</div>
        </div>
    </div>
</body>
</html>
