<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
    <style>
        .modal-overlay-v4 {
            width: 100%; height: 100%; position: absolute; top:0; left:0;
            background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-v4 {
            width: 500px; background: #fff; border-radius: 8px; overflow: hidden;
            box-shadow: 0 30px 90px rgba(0,0,0,0.5);
        }
        .modal-header-v4 { background: #333; color: #fff; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <div class="slide-canvas">
        <header class="ppt-header-strategy">38. [어드민] 브랜드 조회 / 선택 팝업 (Modal)</header>

        <div class="modal-overlay-v4">
            <div class="modal-v4">
                <div class="modal-header-v4">
                    <b style="font-size:15px;">브랜드 검색</b>
                    <span style="font-size:20px; cursor:pointer;">&times;</span>
                </div>
                <div style="padding:30px;">
                    <div style="display:flex; gap:10px;">
                        <input type="text" class="form-input-hf" style="flex:1;" placeholder="브랜드명 또는 코드">
                        <button style="background:var(--lf-red); color:#fff; border:none; padding:0 20px; font-weight:bold;">SEARCH</button>
                    </div>
                    <div style="margin-top:20px; border:1px solid #EEE; height:200px; overflow-y:auto; font-size:13px;">
                        <div style="padding:12px; border-bottom:1px solid #F8F9FA;"><b>HAZZYS</b> (HZ)</div>
                        <div style="padding:12px; border-bottom:1px solid #F8F9FA; background:rgba(200, 25, 46, 0.05); border-left:4px solid var(--lf-red);"><b>DAKS</b> (DK) [Selected]</div>
                        <div style="padding:12px; border-bottom:1px solid #F8F9FA;"><b>MAESTRO</b> (MT)</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="ppt-footer">
            <div class="ppt-logo-box">LF</div>
            <div>PAGE 38</div>
        </div>
    </div>
</body>
</html>
