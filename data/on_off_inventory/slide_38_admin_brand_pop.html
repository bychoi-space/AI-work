<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
    <style>
        .modal-overlay-hf {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.4); 
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-window-hf {
            width: 500px; background: #fff; border-radius: 12px; overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .modal-body-hf { padding: 30px; }
        .brand-list-hf { height: 250px; overflow-y: auto; border: 1px solid #EEE; padding: 10px; border-radius: 8px; margin-top: 15px; }
        .brand-row-hf { padding: 12px; border-bottom: 1px solid #F8F9FA; display: flex; justify-content: space-between; font-size: 13px; }
        .brand-row-hf:hover { background: #F1F3F5; cursor: pointer; }
    </style>
</head>
<body>
    <div class="slide-canvas">
        <header class="ppt-header">38. [어드민] 브랜드 조회 / 선택 팝업</header>

        <div class="modal-overlay-hf">
            <div class="modal-window-hf">
                <div style="background:#F1F3F5; padding:15px 25px; border-bottom:1px solid #DDD; display:flex; justify-content:space-between; align-items:center;">
                    <b style="font-size:15px;">브랜드 검색</b>
                    <span style="font-size:20px; color:#999; cursor:pointer;">&times;</span>
                </div>
                <div class="modal-body-hf">
                    <div style="display:flex; gap:10px;">
                        <input type="text" class="form-input" style="flex:1;" placeholder="브랜드명 또는 코드">
                        <button class="btn-lf" style="height:36px; padding:0 20px;">검색</button>
                    </div>
                    <div class="brand-list-hf">
                        <div class="brand-row-hf"><b>HAZZYS</b> <span style="color:#999;">HZ</span></div>
                        <div class="brand-row-hf" style="background:rgba(200, 25, 46, 0.05); border-left:3px solid var(--lf-red);"><b>DAKS</b> <span style="color:var(--lf-red);">DK (Selected)</span></div>
                        <div class="brand-row-hf"><b>MAESTRO</b> <span style="color:#999;">MT</span></div>
                        <div class="brand-row-hf"><b>ATHE</b> <span style="color:#999;">AT</span></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="ppt-footer-logo">LF</div>
    </div>
</body>
</html>
