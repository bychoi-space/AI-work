<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
</head>
<body>
    <div class="slide-canvas">
        <header class="ppt-header">23. [UI] 상품상세 - 배송 혜택 안내 (PDP)</header>

        <div style="display:flex; justify-content:center; padding:40px;">
            <div style="width:340px; height:700px; background:#000; border-radius:50px; padding:12px; box-shadow: 0 40px 100px rgba(0,0,0,0.2);">
                <div style="background:#FFF; width:100%; height:100%; border-radius:38px; overflow:hidden;">
                    <div style="padding:24px; border-bottom:1px solid #EEE;">
                        <h4 style="font-size:16px; margin-bottom:20px;">배송 혜택</h4>
                        
                        <div style="background:#F8FAFC; border:1px solid #E9ECEF; border-radius:12px; padding:20px; margin-bottom:15px;">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <span style="font-size:13px; font-weight:700;">일반 택배 배송</span>
                                <span style="font-size:11px; color:#999;">3만원 이상 무료</span>
                            </div>
                            <div style="margin-top:8px; font-size:11px; color:#666;">전국 물류센터에서 상시 발송</div>
                        </div>

                        <div style="background:rgba(200, 25, 46, 0.05); border:1.5px solid var(--lf-red); border-radius:12px; padding:20px;">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <span style="font-size:13px; font-weight:800; color:var(--lf-red);">매장상품배송 ✨</span>
                                <span style="font-size:11px; color:var(--lf-red); font-weight:800;">런칭기념 상시무료</span>
                            </div>
                            <div style="margin-top:8px; font-size:11px; color:var(--lf-red); opacity:0.8;">인근 매장에서 퀵하게 전용 발송</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="ppt-footer-logo">LF</div>
    </div>
</body>
</html>
