<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
</head>
<body>
    <div class="slide-canvas">
        <header class="ppt-header-strategy">04. 시스템 아키텍처 (System Architecture)</header>

        <svg class="svg-layer-v4">
            <defs>
                <marker id="arrowhead-v4" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="#595959" />
                </marker>
            </defs>
            <line x1="300" y1="210" x2="420" y2="210" stroke="#595959" stroke-width="2" marker-end="url(#arrowhead-v4)" />
            <line x1="420" y1="410" x2="300" y2="410" stroke="#595959" stroke-width="2" marker-end="url(#arrowhead-v4)" />
            <line x1="510" y1="260" x2="510" y2="340" stroke="#595959" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowhead-v4)" />
        </svg>

        <div class="ppt-node-v4" style="top: 160px; left: 120px; width: 180px; height: 100px; background: #DEEAF6;">LFmall (Front)</div>
        <div class="ppt-node-v4" style="top: 160px; left: 420px; width: 180px; height: 100px; background: #E2EFDA;">OMS (Order)</div>
        <div class="ppt-node-v4" style="top: 360px; left: 420px; width: 180px; height: 100px; background: #E2EFDA;">SAP ERP</div>
        <div class="ppt-node-v4" style="top: 360px; left: 120px; width: 180px; height: 100px; background: #FFF2CC;">Store POS</div>

        <div style="position:absolute; bottom:100px; left:120px; right:120px; border-top:1px solid #EEE; padding-top:20px; font-size:12px; color:#666;">
            ※ SAP ERP의 매장 실재고 데이터를 기반으로 OMS에서 온라인 가용 재고를 산출하여 LFmall에 동기화함.
        </div>

        <div class="ppt-footer">
            <div class="ppt-logo-box">LF</div>
            <div>PAGE 04</div>
        </div>
    </div>
</body>
