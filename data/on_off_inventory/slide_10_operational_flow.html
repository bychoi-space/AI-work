<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
    <style>
        .talk-stage {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 40px;
            padding: 100px;
        }

        .kakao-card-hf {
            width: 280px;
            background: #FFEB3B;
            border-radius: 18px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
        }

        .kakao-logo-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1.5px solid rgba(0,0,0,0.1);
            padding-bottom: 10px;
        }
        .kakao-logo-bar b { font-size: 13px; color: #4E342E; }

        .bubble-msg {
            background: #fff;
            padding: 16px;
            border-radius: 8px;
            font-size: 12px;
            line-height: 1.6;
            color: #333;
        }
        .bubble-msg b { color: var(--lf-red); }

        .kakao-btn-hf {
            background: #f8f9fa;
            border: 1px solid #DDD;
            padding: 10px;
            text-align: center;
            font-size: 12px;
            font-weight: 700;
            border-radius: 6px;
        }

        .flow-next {
            align-self: center;
            position: relative;
        }
        .flow-next::after {
            content: '▶';
            font-size: 24px;
            color: #D9D9D9;
        }
    </style>
</head>
<body>
    <div class="slide-canvas">
        <header class="ppt-header">10. 매장상품배송 알림톡 서비스</header>

        <div class="talk-stage">
            <div class="kakao-card-hf">
                <div class="kakao-logo-bar"><b>알림톡 [주문완료]</b></div>
                <div class="bubble-msg">
                    <b>[LFmall]</b><br>
                    고객님의 주문이 접수되었습니다.<br><br>
                    주문한 상품은 <b>강남본점</b>에서 <br>직접 발송해 드릴 예정입니다.
                </div>
                <div class="kakao-btn-hf">주문내역 확인</div>
            </div>

            <div class="flow-next"></div>

            <div class="kakao-card-hf">
                <div class="kakao-logo-bar"><b>알림톡 [배송시작]</b></div>
                <div class="bubble-msg">
                    <b>[LFmall]</b><br>
                    상품 배송이 시작되었습니다!<br><br>
                    - 상품명: HAZZYS 티셔츠<br>
                    - 발송매장: 강남본점<br>
                    - 송장: [로젠] 123456789
                </div>
                <div class="kakao-btn-hf">배송조회 하기</div>
            </div>

            <div class="flow-next"></div>

            <div class="kakao-card-hf" style="background:#E0E0E0; opacity:0.6;">
                <div class="kakao-logo-bar"><b>알림톡 [배송완료]</b></div>
                <div class="bubble-msg">
                    <b>[LFmall]</b><br>
                    상품이 무사히 도착했나요?<br><br>
                    지금 리뷰를 작성하시면 <br>L-Point를 적립해 드립니다.
                </div>
                <div class="kakao-btn-hf">리뷰 작성하기</div>
            </div>
        </div>

        <div class="ppt-footer-logo">LF</div>
    </div>
</body>
</html>
