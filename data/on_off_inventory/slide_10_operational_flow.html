<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
    <style>
        .messenger-stage-hf { padding: 100px 110px; display: flex; align-items: flex-start; justify-content: space-between; position: relative; }
        
        .kakao-bubble-hf {
            width: 300px;
            background: #FFEB33;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
            z-index: 10;
        }
        .kakao-header-hf { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 10px; margin-bottom: 15px; }
        .kakao-header-hf b { font-size: 13px; color: #3E2723; }

        .talk-msg-hf {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            font-size: 13px;
            line-height: 1.6;
        }

        .flow-marker-hf { align-self: center; font-size: 32px; color: #CCC; }
    </style>
</head>
<body>
    <div class="slide-canvas">
        <header class="ppt-header">10. 매장상품배송 알림톡 서비스 (Kakaotalk)</header>

        <div class="messenger-stage-hf">
            <div class="kakao-bubble-hf">
                <div class="kakao-header-hf"><b>알림톡 [주문완료]</b></div>
                <div class="talk-msg-hf">
                    <b style="color:var(--lf-red);">[LFmall]</b><br><br>
                    고객님의 주문이 <b>강남본점</b>에 배정되어 출고 준비를 시작합니다.
                </div>
            </div>

            <div class="flow-marker-hf">▶</div>

            <div class="kakao-bubble-hf">
                <div class="kakao-header-hf"><b>알림톡 [발송시작]</b></div>
                <div class="talk-msg-hf">
                    <b style="color:var(--lf-red);">[LFmall]</b><br><br>
                    상품 발송이 시작되었습니다!<br>
                    - 매장: 강남본점<br>
                    - 송장: [로젠] 123456...
                </div>
            </div>

            <div class="flow-marker-hf">▶</div>

            <div class="kakao-bubble-hf" style="opacity:0.6;">
                <div class="kakao-header-hf"><b>알림톡 [도착안내]</b></div>
                <div class="talk-msg-hf">
                    <b style="color:var(--lf-red);">[LFmall]</b><br><br>
                    매장에서 발송한 상품이 안전하게 도착했습니다.
                </div>
            </div>
        </div>

        <div class="ppt-footer-logo">LF</div>
    </div>
</body>
</html>
