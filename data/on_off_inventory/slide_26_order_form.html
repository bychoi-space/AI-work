<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
</head>
<body>
    <div class="slide-canvas">
        <header class="ppt-header">26. [UI] 주문서/결제 (Checkout)</header>

        <div style="display:flex; justify-content:center; padding:40px;">
            <div style="width:340px; height:700px; background:#000; border-radius:50px; padding:12px; box-shadow: 0 40px 100px rgba(0,0,0,0.2);">
                <div style="background:#FFF; width:100%; height:100%; border-radius:38px; overflow-y:auto; position:relative;">
                    <div style="padding:20px; border-bottom:1px solid #eee; text-align:center; font-weight:800;">주문서</div>
                    
                    <div style="padding:20px; border-bottom:8px solid #F1F3F5;">
                        <h5 style="margin-bottom:10px;">배송지 정보</h5>
                        <p style="font-size:13px;">서울시 강남구 언주로 123...<br>홍길동 (010-1234-****)</p>
                        <div style="margin-top:15px; background:rgba(200, 25, 46, 0.05); padding:10px; border-radius:4px; font-size:11px; color:var(--lf-red);">
                            ※ 해당 주문은 <b>강남본점</b>에서 직접 배송됩니다.
                        </div>
                    </div>

                    <div style="padding:20px; border-bottom:8px solid #F1F3F5;">
                        <h5 style="margin-bottom:10px;">주문 상품 (1)</h5>
                        <div style="display:flex; gap:12px;">
                            <div style="width:50px; height:60px; background:#EEE;"></div>
                            <div style="font-size:12px;">[매장상품] HAZZYS 반팔 티셔츠<br>옵션: Navy / 100</div>
                        </div>
                    </div>

                    <div style="padding:20px;">
                        <h5 style="margin-bottom:15px;">결제 수단</h5>
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                            <div style="border:1px solid var(--lf-red); padding:10px; text-align:center; border-radius:4px; font-size:12px; color:var(--lf-red); font-weight:700;">LF Pay</div>
                            <div style="border:1px solid #DDD; padding:10px; text-align:center; border-radius:4px; font-size:12px;">신용카드</div>
                        </div>
                    </div>

                    <div style="padding:20px;">
                        <button class="btn-lf" style="width:100%; height:50px;">89,000원 결제하기</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="ppt-footer-logo">LF</div>
    </div>
</body>
</html>
