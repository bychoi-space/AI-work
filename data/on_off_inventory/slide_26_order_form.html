<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
</head>
<body>
    <div class="slide-canvas">
        <header class="ppt-header">26. [UI] 주문서/결제 (Checkout UX)</header>

        <div style="display:flex; justify-content:center; padding:40px;">
            <div class="phone-frame-hf">
                <div class="phone-screen-ins">
                    <div style="background:#fff; height:60px; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:16px; border-bottom:1.5px solid #EEE;">주문/결제</div>
                    
                    <div style="padding:25px; overflow-y:auto; flex:1;">
                        <h5 style="font-size:14px; margin-bottom:15px; font-weight:900;">배송 정보</h5>
                        <div style="font-size:13.5px; border:1px solid #EEE; padding:20px; border-radius:10px; background:#fff; box-shadow: 0 4px 10px rgba(0,0,0,0.02);">
                            <div style="display:flex; justify-content:space-between; margin-bottom:10px;"><b>홍길동</b> <span style="font-size:11px; color:var(--lf-red); border:1px solid var(--lf-red); padding:2px 6px;">기본배송지</span></div>
                            <div style="color:#555; line-height:1.5;">서울시 강남구 언주로 123... <br>010-1234-5678</div>
                            <div style="margin-top:15px; padding:12px; background:rgba(200, 25, 46, 0.05); color:var(--lf-red); font-size:11px; font-weight:900; border-radius:6px;">
                                📦 이 상품은 <b>강남본점</b>에서 직접 배송합니다.
                            </div>
                        </div>

                        <h5 style="font-size:14px; margin-top:35px; margin-bottom:15px; font-weight:900;">주문 상품 (1)</h5>
                        <div style="display:flex; gap:15px; align-items:center;">
                            <div style="width:60px; height:80px; background:#F1F3F5; border-radius:4px;"></div>
                            <div style="font-size:12px;"><b>[매장상품]</b> HAZZYS 기모 티셔츠 <br><span style="color:#888;">Navy / 100</span></div>
                        </div>
                    </div>

                    <div style="background:#fff; padding:25px; border-top:1.5px solid #EEE;">
                        <button style="width:100%; height:54px; background:var(--lf-red); color:#fff; border:none; border-radius:10px; font-weight:900; font-size:17px;">89,000원 결제하기</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="ppt-footer-logo">LF</div>
    </div>
</body>
</html>
