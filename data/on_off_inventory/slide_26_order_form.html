<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
    <style>
        .iphone-v9 { 
            width: 320px; height: 650px; background: #000; border-radius: 40px; 
            padding: 10px; box-shadow: 0 40px 80px rgba(0,0,0,0.3); position: relative;
            margin: 40px auto;
        }
        .screen-v9 { background: #fff; width: 100%; height: 100%; border-radius: 32px; overflow-y: auto; display: flex; flex-direction: column; }
        
        .order-header { height: 50px; border-bottom: 1px solid #EEE; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 15px; position: sticky; top: 0; background: #fff; z-index: 10; }
        
        .sec-v9 { padding: 25px; border-bottom: 8px solid #F4F6F9; }
        .sec-title { font-size: 16px; font-weight: 900; color: #111; margin-bottom: 20px; }
        
        .order-item-v9 { display: flex; gap: 15px; margin-bottom: 20px; }
        .item-img { width: 60px; height: 80px; background: #F2F4F6; border-radius: 4px; }
        
        .arrival-badge-v9 { background: rgba(200,25,46,0.05); color: #C8192E; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 800; display: inline-block; margin-top: 10px; }
        
        .price-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; font-weight: 700; color: #555; }
    </style>
</head>
<body>
    <div class="slide-canvas">
        <header class="ppt-header">26. [UI] 주문서 - 배송 정보 및 결제상세 (Order Checkout)</header>

        <div class="iphone-v9">
            <div class="screen-v9">
                <div class="order-header">Checkout</div>
                
                <div class="sec-v9">
                    <div class="sec-title">배송 상품 (Order Items)</div>
                    <div class="order-item-v9">
                        <div class="item-img"></div>
                        <div style="flex:1;">
                            <div style="font-size:11px; color:#C8192E; font-weight:900; margin-bottom:4px;">매장상품배송</div>
                            <div style="font-size:14px; font-weight:900;">DAKS 런던 체크 플리스 컬렉션</div>
                            <div class="arrival-badge-v9">📅 01/14 (수) 도착 예정</div>
                        </div>
                    </div>
                </div>

                <div class="sec-v9">
                    <div class="sec-title">결제 금액 (Payment Details)</div>
                    <div class="price-row"><span>총 상품금액</span> <span>433,300 원</span></div>
                    <div class="price-row"><span>배송비</span> <span>0 원 (무료)</span></div>
                    <div class="price-row" style="margin-top:15px; font-size:18px; color:#111; font-weight:900;"><span>최종 결제 금액</span> <span style="color:#C8192E;">433,300 원</span></div>
                </div>

                <div style="padding:20px;">
                    <button style="width:100%; background:#C8192E; color:#fff; padding:18px; border:none; border-radius:8px; font-weight:900; font-size:16px;">결제하기 (Pay Now)</button>
                </div>
            </div>
        </div>

        <div class="ppt-footer">
            <div class="ppt-logo-box">LF</div>
            <div style="font-size:12px; font-weight:900; color:#444;">26</div>
        </div>
    </div>
</body>
</html>
