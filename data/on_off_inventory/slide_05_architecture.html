<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
    <style>
        .master-stage-v9 { padding: 40px; position: relative; height: 100%; border: 1px solid #CCC; overflow: hidden; background: #fff; }
        
        .box-v9 { 
            position: absolute; border: 1.2px solid #555; border-radius: 4px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 8.5px; font-weight: 900; text-align: center; line-height: 1.2; 
            z-index: 10; background: #fff;
            width: 74px; height: 36px;
            box-shadow: 1px 1px 2px rgba(0,0,0,0.08);
        }
        .b-lfmall { background: #E9EDF4; border-color: #92A8D1; }
        .b-oms { background: #E2EFDA; border-color: #A9D18E; }
        .b-pos { background: #FFF2CC; border-color: #FFD966; }
        
        .b-status-v9 { 
            width: 48px; height: 48px; border-radius: 50%; background: #333; color: #fff; border: 1.5px solid #222;
            display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 900; 
            position: absolute; z-index: 15; line-height: 1.1; 
        }
        
        .b-pill-v9 { 
            background: #FCE4D6; border: 1.8px solid #F4B183; border-radius: 40px; 
            width: 250px; height: 38px; color: #333; z-index: 10; font-size: 10px; font-weight: 900;
            position: absolute; display: flex; align-items: center; justify-content: center;
        }
        
        .diamond-v9 {
            position: absolute; width: 56px; height: 56px; background: #FFF2CC; border: 1.8px solid #F4B183;
            transform: rotate(45deg); z-index: 5; display: flex; align-items: center; justify-content: center;
        }
        .diamond-inner { transform: rotate(-45deg); font-size: 8px; font-weight: 900; text-align: center; line-height: 1.1; }

        .banner-issue-v9 { position: absolute; bottom: 85px; width: 145px; text-align: center; }
        .banner-label-v9 { background: #C8192E; color: #fff; padding: 4px 18px; border-radius: 20px; font-size: 11px; font-weight: 900; display: inline-block; margin-bottom: 10px; }
        .banner-text-v9 { font-size: 9.3px; color: #333; font-weight: 900; line-height: 1.5; }
    </style>
</head>
