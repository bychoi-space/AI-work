<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
    <style>
        .header { padding: 40px 40px 0; border-bottom: 2px solid var(--admin-border); margin-bottom: 20px; }
        .page-title { font-size: 28px; font-weight: 700; color: var(--lf-red); }
        .content { padding: 40px; display: flex; justify-content: center; }
        .iphone { width: 320px; height: 600px; border: 10px solid #222; border-radius: 30px; background: #fff; overflow: hidden; position: relative; }
    </style>
</head>
<body>
    <div class="header">
        <h2 class="page-title">25. [UI] 쇼핑백</h2>
        <p style="color:#64748B; font-size:14px;">장바구니 내 일반배송/매장배송 상품 그룹화 및 안내 문구 홍보</p>
    </div>
    <div class="content">
        <div class="iphone">
            <div style="padding:15px; border-bottom:1px solid #eee; font-weight:700;">SHOPPING BAG (2)</div>
            <div style="padding:15px; border-bottom:1px solid #eee;">
                <span class="badge badge-red">매장상품배송</span>
                <div style="font-size:13px; margin-top:5px;">HAZZYS 티셔츠</div>
                <div style="font-size:14px; font-weight:700; margin-top:5px;">89,000원</div>
            </div>
            <div style="padding:15px; border-bottom:1px solid #eee;">
                <span class="badge" style="background:#eee; color:#666;">일반배송</span>
                <div style="font-size:13px; margin-top:5px;">DAKS 셔츠</div>
                <div style="font-size:14px; font-weight:700; margin-top:5px;">120,000원</div>
            </div>
            <div style="position:absolute; bottom:0; width:100%; padding:15px; background:#f8fafc; border-top:1px solid #eee;">
                <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:14px;">
                    <span>총 결제금액</span> <b style="color:var(--lf-red);">209,000원</b>
                </div>
                <button class="btn-lf" style="width:100%; height:44px;">주문하기</button>
            </div>
        </div>
    </div>
</body>
</html>
