<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
    <style>
        .iphone-v9 { 
            width: 320px; height: 650px; background: #000; border-radius: 40px; 
            padding: 10px; box-shadow: 0 40px 80px rgba(0,0,0,0.3); position: relative;
            margin: 40px auto;
        }
        .screen-v9 { background: #fff; width: 100%; height: 100%; border-radius: 32px; overflow: hidden; display: flex; flex-direction: column; }
        
        .cart-header { height: 50px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 15px; border-bottom: 1px solid #EEE; }
        .cart-item-v9 { padding: 20px; display: flex; gap: 15px; border-bottom: 1px solid #EEE; opacity: 0.5; }
        .cart-img { width: 70px; height: 90px; background: #F4F6F9; border-radius: 4px; }
        
        /* Option Change Overlay */
        .opt-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:50; display:flex; align-items:flex-end; }
        .opt-box { background:#fff; width:100%; padding:30px 20px 40px; border-radius: 20px 20px 0 0; }
        .grid-v9 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 15px; }
        .chip-v9 { border:1px solid #DDD; height:45px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; position:relative; }
        .chip-v9.selected { border-color:#C8192E; color:#C8192E; background:rgba(200,25,46,0.05); }
        .chip-badge { position:absolute; top:-6px; right:-6px; background:#C8192E; color:#fff; font-size:7px; padding:2px 4px; border-radius:10px; font-weight:900; }
    </style>
</head>
<body>
    <div class="slide-canvas">
        <header class="ppt-header">25. [UI] 쇼핑백 - 옵션 변경 팝업 (Cart - Option Change)</header>

        <div class="iphone-v9">
            <div class="screen-v9">
                <div class="cart-header">Shopping Bag (1)</div>
                <div class="cart-item-v9">
                    <div class="cart-img"></div>
                    <div style="flex:1;">
                        <div style="font-size:11px; color:#C8192E; font-weight:900; margin-bottom:5px;">매장상품배송</div>
                        <div style="font-size:13px; font-weight:900;">DAKS 체크 플리스 자켓</div>
                        <div style="font-size:12px; color:#888; margin-top:5px;">옵션: Navy / 100</div>
                    </div>
                </div>

                <!-- Option Change Popup -->
                <div class="opt-overlay">
                    <div class="opt-box">
                        <div style="font-size:15px; font-weight:900; border-bottom:1.5px solid #333; padding-bottom:10px; margin-bottom:15px;">옵션 변경 (Change Option)</div>
                        <div class="grid-v9">
                            <div class="chip-v9">90</div>
                            <div class="chip-v9">95</div>
                            <div class="chip-v9 selected">100
                                <div class="chip-badge">매장배송</div>
                            </div>
                            <div class="chip-v9">105</div>
                        </div>
                        <button style="width:100%; background:#111; color:#fff; padding:15px; border:none; border-radius:8px; font-weight:900; margin-top:25px;">변경 완료</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="ppt-footer">
            <div class="ppt-logo-box">LF</div>
            <div style="font-size:12px; font-weight:900; color:#444;">25</div>
        </div>
    </div>
</body>
</html>
