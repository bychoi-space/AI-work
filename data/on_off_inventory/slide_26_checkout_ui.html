<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
    <style>
        .ui-stage-v4 { padding: 30px 45px; }
        .iphone-center-v4 { display: flex; justify-content: center; margin-top: 10px; }
        .iphone-shell-v4 {
            width: 320px; height: 600px; background: #000; border-radius: 40px;
            padding: 10px; box-shadow: 0 40px 80px rgba(0,0,0,0.3); border: 2.5px solid #222;
        }
        .iphone-screen-v4 { background: #fff; width: 100%; height: 100%; border-radius: 32px; overflow: hidden; display: flex; flex-direction: column; }
        
        .section-box-v4 { padding: 20px; border-bottom: 8px solid #F4F6F9; }
        .anno-box-v4 { position: absolute; right: 80px; top: 120px; width: 340px; background: #F8F9FA; border: 1px solid #DDD; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div class="slide-canvas">
        <table class="ppt-metadata-table">
            <tr>
                <td class="label">Project</td><td class="val" colspan="3">온오프 재고 효율화 고도화</td>
                <td class="label">Step</td><td class="val">[UI] 주문서 (Checkout)</td>
                <td class="label">Date</td><td class="val">2026.04.14</td>
            </tr>
            <tr>
                <td class="label">Focus</td><td class="val">매장배송 상품 전용 문구 노출</td>
                <td class="label">Modifier</td><td class="val">Architect</td>
                <td class="label">Version</td><td class="val">v0.8</td>
                <td class="label">Page No.</td><td class="val">26</td>
            </tr>
        </table>
        
        <header class="ppt-header-strategy" style="background:#888;">26. UI Wireframe - 주문서/결제 (Checkout UI)</header>

        <div class="ui-stage-v4">
            <div class="iphone-center-v4">
                <div class="iphone-shell-v4">
                    <div class="iphone-screen-v4">
                        <div style="background:#fff; height:50px; display:flex; align-items:center; justify-content:center; border-bottom:1px solid #EEE;"><b>주문/결제</b></div>
                        <div class="section-box-v4">
                            <h5 style="font-size:13px; margin-bottom:12px;">배송지 정보</h5>
                            <div style="font-size:12px; color:#333; line-height:1.5; border:1px solid #EEE; padding:12px; position:relative;">
                                <b>홍길동</b><br>서울 강남구 언주로 123...<br>
                                <div style="margin-top:10px; background:rgba(200, 25, 46, 0.05); color:var(--lf-red); font-size:10px; padding:6px; font-weight:bold;">
                                    📦 이 상품은 '강남본점'에서 직접 배송됩니다.
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="anno-box-v4">
                <div class="anno-item-v4">
                    <div class="anno-num-v4">1</div>
                    <div><b>직송 안내</b>: 배송지 정보 하단에 '발송 매장' 정보를 박스 형태로 명시하여 오배송 문의 감소 유도</div>
                </div>
            </div>
        </div>

        <div class="ppt-footer">
            <div class="ppt-logo-box">LF</div>
            <div>PAGE 26</div>
        </div>
    </div>
</body>
</html>
