<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
</head>
<body>
    <div class="slide-canvas">
        <div class="admin-sidebar-v4">
            <div style="font-size:10px; opacity:0.4; margin-bottom:20px;">SYSTEM MONITOR</div>
            <div style="font-size:14px; margin-bottom:15px; font-weight:bold;">Dashboard</div>
            <div style="font-size:14px; margin-bottom:15px; color:var(--lf-red); font-weight:bold;">▶ 주문 배정 관리</div>
        </div>

        <div class="admin-stage-v4">
            <header style="margin-bottom:30px;">
                <h2 style="font-size:22px; font-weight:900;">실시간 매장 배정 주문 현황</h2>
            </header>

            <div style="background:#fff; border:1px solid #CCC; padding:20px; display:grid; grid-template-columns: repeat(4, 1fr); gap:12px; margin-bottom:25px;">
                <div><b>주문번호</b> <input type="text" class="form-input-hf" style="width:100%;"></div>
                <div><b>배정상태</b> <select class="form-input-hf" style="width:100%;"><option>전체</option></select></div>
                <div><b>기간</b> <input type="date" class="form-input-hf" style="width:100%;"></div>
                <div style="display:flex; align-items:flex-end;"><button style="background:var(--ppt-header-bg); color:#fff; border:none; padding:8px 25px; font-weight:bold;">조회</button></div>
            </div>

            <table class="data-grid-v4">
                <thead>
                    <tr><th>주문일시</th><th>주문번호</th><th>상품명</th><th>배정매장</th><th>배송사</th><th>상태</th></tr>
                </thead>
                <tbody>
                    <tr><td>13:45</td><td style="color:#2E5BFF; font-weight:bold;">2026-0420-99</td><td>헤지스 티셔츠</td><td>강남본점</td><td>로젠택배</td><td><span style="background:var(--lf-red); color:#fff; padding:2px 8px; font-size:10px;">배정완료</span></td></tr>
                    <tr><td>12:20</td><td style="color:#2E5BFF; font-weight:bold;">2026-0420-98</td><td>닥스 벨트</td><td>명동스타일</td><td>-</td><td><span style="background:#888; color:#fff; padding:2px 8px; font-size:10px;">결품</span></td></tr>
                </tbody>
            </table>
        </div>

        <div class="ppt-footer">
            <div class="ppt-logo-box">LF</div>
            <div>PAGE 34</div>
        </div>
    </div>
</body>
</html>
