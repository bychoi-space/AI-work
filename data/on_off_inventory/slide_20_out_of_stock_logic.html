<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
</head>
<body>
    <div class="slide-canvas">
        <header class="ppt-header-strategy">20. 매장 결품 발생 시 주문 처리 로직 (Out of Stock)</header>
        
        <div style="padding: 60px 110px; position: relative; height: 100%;">
            <svg class="svg-layer-v4">
                <defs>
                    <marker id="arrow-v4" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
                        <polygon points="0 0, 8 3, 0 6" fill="#AAA" />
                    </marker>
                </defs>
                <line x1="280" y1="120" x2="400" y2="120" stroke="#AAA" stroke-width="2" marker-end="url(#arrow-v4)" />
                <line x1="560" y1="120" x2="680" y2="120" stroke="#AAA" stroke-width="2" marker-end="url(#arrow-v4)" />
                <path d="M 480 155 L 480 250" stroke="#AAA" stroke-width="2" marker-end="url(#arrow-v4)" fill="none" />
                <path d="M 480 320 L 480 400" stroke="#AAA" stroke-width="2" marker-end="url(#arrow-v4)" fill="none" />
            </svg>

            <div class="ppt-node-v4" style="top:80px; left:80px; width:200px; height:80px; background:#F8F9FA;">결품 발생 (매장)</div>
            
            <div class="ppt-node-v4" style="top:70px; left:400px; width:160px; height:100px; border-radius:10px; background:#FFEBEB; border:2px solid var(--lf-red); transform: rotate(0deg); display:flex; justify-content:center; align-items:center;">
                <div style="font-weight:900;">가용 재고<br>재조회</div>
            </div>

            <div class="ppt-node-v4" style="top:80px; left:680px; width:200px; height:80px; background:#E2EFDA;">인근 매장<br>재배정</div>

            <div class="ppt-node-v4" style="top:250px; left:380px; width:200px; height:80px; background:#F1F3F5;">상태값: 결품<br>(OMS)</div>

            <div class="ppt-node-v4" style="top:400px; left:380px; width:200px; height:80px; background:var(--lf-red); color:#fff; border:none;">주문 취소 및<br>품절 통보</div>

            <div style="position:absolute; top:125px; left:580px; font-size:11px; font-weight:bold; color:#059669;">[Y] 타매장 재유</div>
            <div style="position:absolute; top:200px; left:490px; font-size:11px; font-weight:bold; color:var(--lf-red);">[N] 전점 품절</div>
        </div>

        <div class="ppt-footer">
            <div class="ppt-logo-box">LF</div>
            <div>PAGE 20</div>
        </div>
    </div>
</body>
</html>
