<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
    <style>
        .decision-stage-hf { padding: 100px 110px; display: flex; flex-direction: column; align-items: center; position: relative; }
        
        .logic-pill-hf {
            width: 280px; padding: 18px;
            background: #fff; border: 2px solid #333;
            border-radius: 50px; text-align: center;
            font-size: 15px; font-weight: 900;
            box-shadow: var(--ppt-shadow);
            z-index: 10;
        }

        .logic-diamond-hf {
            width: 160px; height: 160px;
            background: #FFF2CC; border: 2px solid #D9AE3B;
            transform: rotate(45deg);
            display: flex; align-items: center; justify-content: center;
            margin: 60px 0; box-shadow: var(--ppt-shadow);
            position: relative; z-index: 10;
        }
        .diamond-inner { transform: rotate(-45deg); font-size: 13px; font-weight: 900; text-align: center; }

        .logic-label-hf { font-size: 14px; font-weight: 900; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="slide-canvas">
        <header class="ppt-header">20. 자동결품 로직 고도화 안 (Logic Flow)</header>

        <div class="decision-stage-hf">
            <svg class="svg-flow-layer" style="width:100%; height:100%;">
                <defs>
                    <marker id="arrow-black" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                        <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
                    </marker>
                </defs>
                <line x1="720" y1="160" x2="720" y2="220" stroke="#333" stroke-width="2" marker-end="url(#arrow-black)" />
                <line x1="720" y1="410" x2="720" y2="480" stroke="#333" stroke-width="2" marker-end="url(#arrow-black)" />
                
                <!-- Yes Branch -->
                <path d="M 820 540 L 950 540" stroke="#059669" stroke-width="2" marker-end="url(#arrow-black)" fill="none" />
                <!-- No Branch -->
                <path d="M 620 540 L 490 540" stroke="#C8192E" stroke-width="2" marker-end="url(#arrow-black)" fill="none" />
            </svg>

            <div class="logic-pill-hf">매장 주문 배정 (Order Assigned)</div>
            
            <div class="logic-diamond-hf">
                <div class="diamond-inner">48시간 내<br>패킹 완료?</div>
            </div>

            <div style="display:flex; gap:200px;">
                <div style="text-align:center;">
                    <div class="logic-label-hf" style="color:#059669;">YES (Success)</div>
                    <div class="logic-pill-hf" style="border-color:#059669; width:220px;">송장 입력 및 발송</div>
                </div>
                <div style="text-align:center;">
                    <div class="logic-label-hf" style="color:var(--lf-red);">NO (Time-out)</div>
                    <div class="logic-pill-hf" style="border-color:var(--lf-red); color:var(--lf-red); width:220px;">자동 결품 / 재배정</div>
                </div>
            </div>
        </div>

        <div class="ppt-footer-logo">LF</div>
    </div>
</body>
</html>
