<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
    <style>
        .iphone-v9 { 
            width: 320px; height: 650px; background: #000; border-radius: 40px; 
            padding: 10px; box-shadow: 0 40px 80px rgba(0,0,0,0.3); position: relative;
            margin: 40px auto;
        }
        .screen-v9 { background: #fff; width: 100%; height: 100%; border-radius: 32px; overflow-y: auto; display: flex; flex-direction: column; }
        
        .dt-header { height: 50px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 15px; border-bottom: 1px solid #EEE; position: sticky; top: 0; background: #fff; z-index: 10; }
        
        .dt-sec { padding: 25px; border-bottom: 8px solid #F4F6F9; }
        .dt-title { font-size: 16px; font-weight: 900; color: #111; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        
        .dt-item { display: flex; gap: 15px; margin-bottom: 15px; }
        .dt-img { width: 60px; height: 80px; background: #F2F4F6; border-radius: 4px; flex-shrink: 0; }
        
        .btn-row-v9 { display: flex; gap: 10px; margin-top: 15px; }
        .btn-ui-v9 { 
            flex: 1; height: 40px; border: 1px solid #DDD; background: #fff; font-size: 12px; font-weight: 800; 
            display: flex; align-items: center; justify-content: center; border-radius: 4px;
        }
        .btn-ui-v9.disabled { background: #F8F9FA; color: #BBB; border-color: #EEE; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="slide-canvas">
        <header class="ppt-header">29. [UI] 주문 상세 내역 - 취소/옵션변경 제한 (Order Details)</header>

        <div class="iphone-v9">
            <div class="screen-v9">
                <div class="dt-header">Order Details</div>
                
                <div class="dt-sec">
                    <div class="dt-title">
                        <span>Order #20260414-001</span>
                        <span style="font-size:12px; color:#666;">2026.04.14</span>
                    </div>

                    <div class="dt-item">
                        <div class="dt-img"></div>
                        <div style="flex:1;">
                            <div style="font-size:11px; color:#C8192E; font-weight:900; margin-bottom:4px;">매장상품배송</div>
                            <div style="font-size:14px; font-weight:900;">DAKS 런던 체크 플리스 컬렉션</div>
                            <div style="font-size:12px; color:#666; margin-top:5px; font-weight:700;">Status: <b style="color:#C8192E;">매장준비중</b></div>
                        </div>
                    </div>

                    <div class="btn-row-v9">
                        <div class="btn-ui-v9">배송 조회</div>
                        <div class="btn-ui-v9 disabled">옵션 변경 (불가)</div>
                    </div>
                    <div style="font-size:10px; color:#C8192E; font-weight:900; margin-top:10px; text-align:center;">※ 매장에서 상품을 준비 중인 상태로 옵션 변경이 제한됩니다.</div>
                </div>

                <div class="dt-sec" style="border-bottom:none;">
                    <div class="dt-title">Payment Info</div>
                    <div style="display:flex; justify-content:space-between; font-size:14px; font-weight:700; color:#555;">
                        <span>결제 수단</span> <span>신용카드 (현대)</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="ppt-footer">
            <div class="ppt-logo-box">LF</div>
            <div style="font-size:12px; font-weight:900; color:#444;">29</div>
        </div>
    </div>
</body>
</html>
