<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
    <style>
        .split-view-hf { display: grid; grid-template-columns: 440px 1fr; gap: 60px; padding: 60px 110px; }
        
        /* Premium iPhone Frame */
        .phone-frame-hf {
            width: 330px; height: 670px;
            background: #111; border-radius: 45px;
            padding: 12px; position: relative;
            box-shadow: 0 40px 80px rgba(0,0,0,0.4);
        }
        .phone-screen-hf {
            background: #fff; width: 100%; height: 100%;
            border-radius: 35px; overflow: hidden;
            position: relative;
        }

        .ppt-web-window-hf {
            background: #fff; border: 1px solid #CCC;
            border-radius: 10px; overflow: hidden;
            box-shadow: var(--ppt-shadow);
        }
        .web-header-hf { background: #F1F3F5; height: 40px; border-bottom: 1px solid #CCC; display: flex; align-items: center; padding-left: 15px; gap: 8px; }
    </style>
</head>
<body>
    <div class="slide-canvas">
        <header class="ppt-header">08. UI 표현 정책 상세 (PDP / Shopping Bag)</header>

        <div class="split-view-hf">
            <div class="phone-frame-hf">
                <div class="phone-screen-hf">
                    <div style="height:350px; background:#F8FAFC; display:flex; align-items:center; justify-content:center; color:#AAA;">PRODUCT_IMG</div>
                    <div style="padding:25px;">
                        <span class="admin-badge" style="background:var(--lf-red); color:#fff; padding:4px 12px; font-size:12px;">매장상품배송</span>
                        <h4 style="font-size:18px; margin-top:12px; font-weight:900;">[매장상품] <br>헤지스 기모 베이직 티셔츠</h4>
                        <div style="font-size:22px; font-weight:900; margin-top:10px;">89,000 원</div>
                    </div>
                </div>
            </div>

            <div class="ppt-web-window-hf">
                <div class="web-header-hf">
                    <div style="width:10px; height:10px; background:#FF5F56; border-radius:50%;"></div>
                    <div style="width:10px; height:10px; background:#FFBD2E; border-radius:50%;"></div>
                    <div style="width:10px; height:10px; background:#27C93F; border-radius:50%;"></div>
                </div>
                <div style="padding:40px;">
                    <h3 style="font-size:20px; font-weight:900; margin-bottom:30px;">장바구니</h3>
                    <div style="border-top:2px solid #333; padding:20px 0; display:flex; gap:20px; align-items:center;">
                        <input type="checkbox" checked>
                        <div style="width:70px; height:90px; background:#F1F3F5;"></div>
                        <div style="flex:1;">
                            <span style="background:var(--lf-red); color:#fff; font-size:10px; padding:2px 6px;">매장배송</span>
                            <div style="font-size:14px; font-weight:bold; margin-top:5px;">HAZZYS 기모 티셔츠 (Navy)</div>
                        </div>
                        <b style="font-size:18px;">89,000원</b>
                    </div>
                </div>
            </div>
        </div>

        <div class="ppt-footer-logo">LF</div>
    </div>
</body>
</html>
