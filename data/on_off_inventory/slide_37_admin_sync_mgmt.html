<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
    <style>
        .admin-view-hf {
            padding: 30px 40px; margin-left: 240px; background: #F5F6F8; height: calc(100% - 48px);
        }
        .monitor-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }
        .stat-card-hf {
            background: #fff; padding: 20px; border-radius: 8px; border: 1px solid #DDD;
        }
        .stat-val { font-size: 24px; font-weight: 900; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="slide-canvas">
        <header class="ppt-header">37. [어드민] 재고 연동/인터페이스 모니터링</header>

        <!-- Sidebar placeholder -->
        <div style="width:240px; background:#252830; height:100%; position:absolute; top:48px; left:0; padding:20px;">
            <div style="color:#FFF; opacity:0.3; font-size:10px;">DASHBOARD</div>
            <div style="color:#FFF; margin-top:20px; font-size:13px;">→ 인터페이스 관리</div>
        </div>

        <div class="admin-view-hf">
            <div class="monitor-grid">
                <div class="stat-card-hf">
                    <div style="font-size:12px; color:#666;">배치 성공률</div>
                    <div class="stat-val" style="color:#059669;">99.8%</div>
                </div>
                <div class="stat-card-hf">
                    <div style="font-size:12px; color:#666;">연동 지연 건수</div>
                    <div class="stat-val" style="color:var(--lf-red);">12 건</div>
                </div>
                <div class="stat-card-hf">
                    <div style="font-size:12px; color:#666;">오늘의 연동량</div>
                    <div class="stat-val">245,120 건</div>
                </div>
            </div>

            <table class="ppt-data-table">
                <thead>
                    <tr><th>ID</th><th>IF 유형</th><th>소스</th><th>타겟</th><th>상태</th><th>시간</th></tr>
                </thead>
                <tbody>
                    <tr><td>IF-8821</td><td>API (Real-time)</td><td>LFmall</td><td>OMS</td><td><span class="admin-badge" style="background:var(--node-oms-sap-bg); color:#059669;">SUCCESS</span></td><td>14:32:01</td></tr>
                    <tr style="background:#FFF5F5;"><td>IF-8820</td><td>BATCH (10m)</td><td>SAP</td><td>LFmall</td><td><span class="admin-badge" style="background:#FFEBEB; color:var(--lf-red);">ERROR (RFC)</span></td><td>14:30:00</td></tr>
                </tbody>
            </table>
        </div>

        <div class="ppt-footer-logo">LF</div>
    </div>
</body>
</html>
