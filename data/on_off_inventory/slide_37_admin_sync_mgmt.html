<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
    <style>
        .config-block-v4 { background: #fff; border: 1px solid #CCC; padding: 30px; margin-bottom: 25px; }
    </style>
</head>
<body>
    <div class="slide-canvas">
        <div class="admin-sidebar-v4">
            <div style="font-size:10px; opacity:0.4; margin-bottom:20px;">SYSTEM MONITOR</div>
            <div style="font-size:14px; margin-bottom:15px; font-weight:bold;">Dashboard</div>
            <div style="font-size:14px; margin-bottom:15px; color:var(--lf-red); font-weight:bold;">▶ 시스템 공통 설정</div>
        </div>

        <div class="admin-stage-v4">
            <header style="margin-bottom:30px;">
                <h2 style="font-size:22px; font-weight:900;">글로벌 서버 운영 파라미터</h2>
            </header>

            <div class="config-block-v4">
                <h4 style="font-size:16px; font-weight:900; margin-bottom:20px; color:#1E3A8A;">• 가용 재고 산출 옵션</h4>
                <div style="display:grid; grid-template-columns:180px 1fr; gap:20px; font-size:14px; align-items:center;">
                    <b>배치 실행 주기</b> <div style="display:flex; gap:10px;"><input type="text" class="form-input-hf" value="10" style="width:60px;"> <span>분 (Default: 10m)</span></div>
                    <b>기본 안전재고(Safety)</b> <div style="display:flex; gap:10px;"><input type="text" class="form-input-hf" value="2" style="width:60px;"> <span>EA (전점 공통)</span></div>
                    <b>서비스 중단 시간</b> <div style="display:flex; gap:10px;"><input type="text" class="form-input-hf" value="03:00~04:00" style="width:120px;"> <span>(ERP 정기 점검)</span></div>
                </div>
            </div>
        </div>

        <div class="ppt-footer">
            <div class="ppt-logo-box">LF</div>
            <div>PAGE 37</div>
        </div>
    </div>
</body>
</html>
