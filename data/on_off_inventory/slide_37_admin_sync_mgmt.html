<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
    <style>
        .admin-main-hf { position: absolute; top: 52px; left: 260px; right: 0; bottom: 0; background: #F4F6F9; padding: 40px; }
        .stat-grid-hf { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card-hf { background: #fff; padding: 25px; border: 1px solid #CCC; box-shadow: var(--ppt-shadow); border-radius: 8px; }
        .stat-label-hf { font-size: 11px; color: #777; margin-bottom: 8px; font-weight: 800; letter-spacing: 0.5px; }
        .stat-val-hf { font-size: 28px; font-weight: 900; }
    </style>
</head>
<body>
    <div class="slide-canvas">
        <header class="ppt-header">37. [어드민] 재고 연동/인터페이스 모니터링</header>

        <div class="admin-sidebar-hf">
            <div style="font-size:10px; opacity:0.4; letter-spacing:1px; margin-bottom:20px;">SYSTEM MENU</div>
            <div style="font-size:14px; margin-bottom:15px; font-weight:bold;">Dashboard</div>
            <div style="font-size:14px; margin-bottom:15px; color:var(--lf-red); font-weight:bold;">▶ 인터페이스 관리</div>
            <div style="margin-left:15px; font-size:13px; opacity:0.8;">- 연동 로그 조회</div>
        </div>

        <div class="admin-main-hf">
            <div class="stat-grid-hf">
                <div class="stat-card-hf">
                    <div class="stat-label-hf">BATCH SUCCESS RATE</div>
                    <div class="stat-val-hf" style="color:#059669;">99.98%</div>
                </div>
                <div class="stat-card-hf">
                    <div class="stat-label-hf">DELAYED TRANSACTIONS</div>
                    <div class="stat-val-hf" style="color:var(--lf-red);">12 건</div>
                </div>
                <div class="stat-card-hf">
                    <div class="stat-label-hf">TOTAL SYNC VOLUME</div>
                    <div class="stat-val-hf">2.4M</div>
                </div>
            </div>

            <table class="data-table-hf">
                <thead>
                    <tr><th>IF ID</th><th>I/F Type</th><th>Source</th><th>Target</th><th>Status</th><th>Timestamp</th></tr>
                </thead>
                <tbody>
                    <tr><td style="color:#2E5BFF; font-weight:bold;">IF-8221</td><td>API</td><td>LFmall</td><td>OMS</td><td><span class="status-pill-hf" style="background:#E2EFDA; color:#059669;">NORMAL</span></td><td>14:55:01</td></tr>
                    <tr style="background:rgba(200, 25, 46, 0.05);">
                        <td style="color:#2E5BFF; font-weight:bold;">IF-8220</td>
                        <td>BATCH</td>
                        <td>SAP</td>
                        <td>LFmall</td>
                        <td><span class="status-pill-hf" style="background:#FFEBEB; color:var(--lf-red);">RFC_ERROR</span></td>
                        <td>14:50:00</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="ppt-footer-logo">LF</div>
    </div>
</body>
</html>
