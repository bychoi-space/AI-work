<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
    <style>
        .arch-title {
            font-size: 24px;
            font-weight: 700;
            padding: 30px 40px;
            border-bottom: 3.5px solid var(--lf-red);
            display: inline-block;
            margin-left: 40px;
        }
        
        .node-lfmall { background: #DEEAF6; top: 150px; left: 150px; width: 140px; }
        .node-oms { background: #E2EFDA; top: 150px; left: 450px; width: 140px; }
        .node-sap { background: #E2EFDA; top: 350px; left: 450px; width: 140px; }
        .node-pos { background: #FFF2CC; top: 350px; left: 150px; width: 140px; }
        
        /* Dashed Line style */
        .line-dashed {
            border-bottom: 2px dashed #999;
            position: absolute;
        }

        .issue-marker {
            position: absolute;
            background: #FF0000;
            color: #fff;
            width: 24px; height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 900;
        }

        .issue-legend {
            position: absolute;
            bottom: 80px; left: 40px; right: 40px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
        }
        .legend-item {
            font-size: 11px;
            display: flex;
            gap: 6px;
        }
    </style>
</head>
<body>
    <div class="slide-canvas">
        <header class="ppt-header">
            03. 시스템 아키텍처
        </header>

        <div class="ppt-node node-lfmall" style="top: 150px; left: 150px;">LFmall</div>
        <div class="ppt-node node-oms" style="top: 150px; left: 450px;">OMS</div>
        <div class="ppt-node node-sap" style="top: 320px; left: 450px;">SAP ERP</div>
        <div class="ppt-node node-pos" style="top: 320px; left: 150px;">Store POS</div>

        <!-- Arrows -->
        <div class="ppt-arrow-solid" style="top: 175px; left: 290px; width: 160px;"></div>
        <div class="ppt-arrow-dashed" style="top: 185px; left: 450px; height: 135px; width: 0; border-left: 2px dashed #999;"></div>

        <!-- Issue Markers -->
        <div class="issue-marker" style="top: 165px; left: 350px;">1</div>
        <div class="issue-marker" style="top: 135px; left: 520px;">2</div>
        <div class="issue-marker" style="top: 310px; left: 450px;">3</div>

        <div class="issue-legend">
            <div class="legend-item"><b style="color:red;">①</b> 재고 데이터 연동 지연</div>
            <div class="legend-item"><b style="color:red;">②</b> 주문 배정 로직 부하</div>
            <div class="legend-item"><b style="color:red;">③</b> SAP 배치 안정성</div>
            <div class="legend-item"><b style="color:red;">④</b> 자동 결품 감지 고도화</div>
            <div class="legend-item"><b style="color:red;">⑤</b> 통합 정산 프로세스</div>
        </div>

        <div class="ppt-footer-logo">LF</div>
    </div>
</body>
</html>
