<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
</head>
<body>
    <div class="slide-canvas">
        <header class="ppt-header-strategy">16. 비직송매장 RT 현황 관리 주체 및 채널 (Monitoring)</header>
        
        <div style="padding: 100px 110px; position: relative;">
            <svg class="svg-layer-v4">
                <defs>
                    <marker id="arrow-v4" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
                        <polygon points="0 0, 8 3, 0 6" fill="#AAA" />
                    </marker>
                </defs>
                <line x1="330" y1="140" x2="520" y2="140" stroke="#AAA" stroke-width="2" marker-end="url(#arrow-v4)" />
                <line x1="520" y1="160" x2="330" y2="160" stroke="#AAA" stroke-width="2" marker-end="url(#arrow-v4)" />
            </svg>

            <div class="ppt-node-v4" style="top:100px; left:120px; width:220px; height:100px; background:#DEEAF6; border-color:#2E5BFF;">
                브랜드 영업 MD<br><span style="font-size:11px; font-weight:normal;">(Dashboard 관리)</span>
            </div>
            
            <div class="ppt-node-v4" style="top:100px; left:520px; width:220px; height:100px; background:#FFF2CC; border-color:#D9AE3B;">
                거점/대리점 매장<br><span style="font-size:11px; font-weight:normal;">(실물 이동 처리)</span>
            </div>

            <div style="margin-top:140px; padding:35px; border:1px solid #EEE; border-radius:8px; line-height:1.7; font-size:14px; background:#fff;">
                <p><b>• 관리 채널</b>: 영업 MD용 태블릿 대시보드 및 카카오 비즈톡 알림톡 연동</p>
                <p><b>• 관리 주기</b>: 매일 오전 10시(전일 실판매 재고 수급분) 및 오후 4시(당일 급구분)</p>
                <p><b>• 프로세스</b>: MD 이동 지시(Command) → 매장 실물 준비 → 본사 순회 물류 입고</p>
            </div>
        </div>

        <div class="ppt-footer">
            <div class="ppt-logo-box">LF</div>
            <div>PAGE 16</div>
        </div>
    </div>
</body>
</html>
