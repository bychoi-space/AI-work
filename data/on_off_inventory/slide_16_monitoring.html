<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">

<body>
    <div class="slide-canvas">
        <header class="ppt-header">16. 비직송매장 RT 현황 관리 주체 및 채널</header>

        <div class="db-flow" style="padding:100px;">
            <div class="db-box sap" style="width:200px; background:#DEEAF6; border-color:#2E5BFF;">
                <h3 style="color:#1E40AF">영업 기획</h3>
                <div style="font-size:11px;">Monitor & Command</div>
            </div>

            <div class="sync-connector">
                <span class="batch-badge">Stock Movement (RT)</span>
                <div class="sync-arrow"></div>
            </div>

            <div class="db-box" style="width:200px; background:#FFF2CC; border-color:#D9AE3B;">

                <div style="font-size:11px;">Inventory Level Check</div>
            </div>
        </div>

        <div class="logic-summary">
            <p style="font-size:14px; line-height:1.6;">• <b>관리 채널</b>: 매장 ERP 및 모바일 MD 도구를 통한 실시간 재고 대시보드 제공</p>
            <p style="font-size:14px; line-height:1.6; margin-top:10px;">• <b>관리 주체</b>: 각 브랜드 영업 MD가 매일 오전 거점 매장 재고 부족분 확인 및 이동 지시</p>
        </div>

        <div class="ppt-footer-logo">LF</div>
    </div>
