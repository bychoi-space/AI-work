<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
</head>
<body>
    <div class="slide-canvas">
        <header class="ppt-header">16. 비직송매장 RT 현황 관리 주체 및 채널</header>

        <div class="db-flow" style="padding:100px 110px;">
            <div class="sys-card-hf" style="width:220px; background:#DEEAF6; border-color:#2E5BFF;">
                <h3 style="color:#1E3A8A; font-size:21px; margin-bottom:12px;">현업 영업기획</h3>
                <div style="font-size:11px; color:#555;">Dashboard Monitor</div>
            </div>

            <div class="sync-connector">
                <span class="batch-badge" style="border-color:#2E5BFF; color:#2E5BFF;">RT Command</span>
                <div class="sync-arrow" style="background:#2E5BFF;"></div>
            </div>

            <div class="sys-card-hf" style="width:220px; background:#FFF2CC; border-color:#D9AE3B;">
                <h3 style="color:#B45309; font-size:21px; margin-bottom:12px;">대리점/비직송</h3>
                <div style="font-size:11px; color:#555;">Stock Response</div>
            </div>
        </div>

        <div class="summary-box-hf" style="background:#F8FAFC; border-left:6px solid #2E5BFF;">
            <p style="font-size:15px; color:#1E3A8A; font-weight:900; margin-bottom:12px;">📊 운영 모니터링 체계 (Monitoring Framework)</p>
            <p style="font-size:13.5px; color:#1e1e1e; line-height:1.7;">
                • <b>관리 채널</b>: 매장 ERP 및 모바일 MD 도구를 통한 권역별 가용 재고 대시보드 실시간 제공.<br>
                • <b>관리 주체</b>: 브랜드 영업 담당 MD가 매일 오전 거점 매장 재고 부족분(Safety 미만) 확인 및 이동 지시(RT) 확정.
            </p>
        </div>

        <div class="ppt-footer-logo">LF</div>
    </div>
</body>
</html>
