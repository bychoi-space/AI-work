<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
</head>
<body>
    <div class="slide-canvas">
        <div class="admin-sidebar-v4">
            <div style="font-size:10px; opacity:0.4; margin-bottom:20px;">SYSTEM MONITOR</div>
            <div style="font-size:14px; margin-bottom:15px; font-weight:bold;">Dashboard</div>
            <div style="font-size:14px; margin-bottom:15px; color:var(--lf-red); font-weight:bold;">▶ 상품 목록 관리</div>
        </div>

        <div class="admin-stage-v4">
            <header style="margin-bottom:30px;">
                <h2 style="font-size:22px; font-weight:900;">전사 통합 상품 마스터 조회</h2>
            </header>

            <div style="background:#fff; border:1px solid #CCC; padding:20px; display:grid; grid-template-columns: repeat(4, 1fr); gap:15px; margin-bottom:25px;">
                <div><b>카테고리</b> <select class="form-input-hf" style="width:100%;"><option>전체</option></select></div>
                <div><b>상품코드</b> <input type="text" class="form-input-hf" style="width:100%;"></div>
                <div><b>매송여부</b> <select class="form-input-hf" style="width:100%;"><option>Y / N</option></select></div>
                <div style="display:flex; align-items:flex-end;"><button style="background:var(--ppt-header-bg); color:#fff; border:none; padding:8px 25px; font-weight:bold;">SEARCH</button></div>
            </div>

            <table class="data-grid-v4">
                <thead>
                    <tr><th>NO</th><th>IMG</th><th>상품코드</th><th>상품명</th><th>매송대상</th><th>최종가</th></tr>
                </thead>
                <tbody>
                    <tr><td>1</td><td><div style="width:30px; height:40px; background:#EEE; margin:0 auto;"></div></td><td style="color:#2E5BFF; font-weight:bold;">HZM22A123</td><td>헤지스 피케 티셔츠</td><td><span style="color:var(--lf-red); font-weight:900;">Y</span></td><td style="text-align:right;">89,000</td></tr>
                    <tr><td>2</td><td><div style="width:30px; height:40px; background:#EEE; margin:0 auto;"></div></td><td style="color:#2E5BFF; font-weight:bold;">DKS11X442</td><td>닥스 가죽 벨트</td><td><span style="color:#999; font-weight:bold;">N</span></td><td style="text-align:right;">124,000</td></tr>
                </tbody>
            </table>
        </div>

        <div class="ppt-footer">
            <div class="ppt-logo-box">LF</div>
            <div>PAGE 31</div>
        </div>
    </div>
</body>
</html>
