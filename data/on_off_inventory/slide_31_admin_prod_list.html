<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
</head>
<body>
    <div class="slide-canvas">
        <header class="ppt-header">31. [어드민] 상품 관리 목록 (Product Administration)</header>

        <div class="admin-sidebar-hf">
            <div style="font-size:10px; opacity:0.4; letter-spacing:1px; margin-bottom:20px;">SYSTEM MENU</div>
            <div style="font-size:14px; margin-bottom:15px; font-weight:bold;">Dashboard</div>
            <div style="font-size:14px; margin-bottom:15px; color:var(--lf-red); font-weight:bold;">▶ 상품 목록 관리</div>
            <div style="margin-left:15px; font-size:13px; opacity:0.8;">- 상품 마스터</div>
        </div>

        <div class="admin-main-hf">
            <div class="ppt-filter-panel-hf" style="grid-template-columns: repeat(4, 1fr); align-items: end;">
                <div class="filter-item-hf">브랜드 <select class="form-input-hf" style="width:100%;"><option>전체</option></select></div>
                <div class="filter-item-hf">상품 코드 <input type="text" class="form-input-hf" style="width:100%;"></div>
                <div class="filter-item-hf">매송 여부 <select class="form-input-hf" style="width:100%;"><option>Y</option></select></div>
                <button style="background:var(--ppt-header-bg); color:#fff; border:none; padding:10px 20px; font-weight:bold; height:38px;">SEARCH</button>
            </div>

            <table class="data-table-hf">
                <thead>
                    <tr><th>NO</th><th>IMG</th><th>상품코드</th><th>상품명</th><th>브랜드</th><th>판매가</th><th>매송여부</th></tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td><div style="width:30px; height:40px; background:#EEE; margin:0 auto;"></div></td>
                        <td style="color:#2E5BFF; font-weight:900;">HZM22A123</td>
                        <td style="font-weight:bold;">HAZZYS 기모 티셔츠</td>
                        <td>HAZZYS</td>
                        <td style="text-align:right;">89,000</td>
                        <td style="text-align:center;"><span class="status-pill-hf" style="background:#FFEBEB; color:var(--lf-red);">Active (Y)</span></td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td><div style="width:30px; height:40px; background:#EEE; margin:0 auto;"></div></td>
                        <td style="color:#2E5BFF; font-weight:900;">DKS22X998</td>
                        <td style="font-weight:bold;">DAKS 소가죽 지갑</td>
                        <td>DAKS</td>
                        <td style="text-align:right;">142,000</td>
                        <td style="text-align:center;"><span class="status-pill-hf" style="background:#FFEBEB; color:var(--lf-red);">Active (Y)</span></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="ppt-footer-logo">LF</div>
    </div>
</body>
</html>
