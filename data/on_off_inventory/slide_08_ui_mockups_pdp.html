<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
    <style>
        .ui-stage-v9 { padding: 40px 60px; height: 100%; display: flex; align-items: flex-start; gap: 60px; position: relative; }
        .iphone-v9 {
            width: 300px; height: 600px; background: #000; border-radius: 40px; padding: 10px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2); position: relative; flex-shrink: 0;
        }
        .iphone-screen-v9 { background: #fff; width: 100%; height: 100%; border-radius: 32px; overflow: hidden; display: flex; flex-direction: column; position: relative; }
        
        /* PDP Content */
        .pdp-img { height: 260px; background: #F2F4F6; display: flex; align-items: center; justify-content: center; color: #AAA; font-size: 14px; font-weight: 900; }
        .pdp-info { padding: 20px; }
        .badge-shop { background: #C8192E; color: #fff; font-size: 10px; padding: 4px 8px; font-weight: 900; display: inline-block; margin-bottom: 8px; }
        .pdp-title { font-size: 17px; font-weight: 900; color: #111; margin-bottom: 5px; }
        .pdp-price { font-size: 22px; font-weight: 900; color: #222; }
        
        .pdp-option-box { margin-top: 20px; border-top: 1px solid #EEE; padding-top: 15px; }
        .size-chip { display: inline-flex; width: 45px; height: 45px; border: 1px solid #DDD; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; margin-right: 8px; }
        .size-chip.active { border-color: #C8192E; color: #C8192E; background: rgba(200,25,46,0.05); }

        .anno-panel-v9 { flex: 1; padding-top: 20px; }
        .anno-row-v9 { display: flex; gap: 15px; margin-bottom: 25px; }
        .anno-num-v9 { width: 24px; height: 24px; background: #C8192E; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 900; flex-shrink: 0; }
        .anno-txt-v9 { font-size: 14px; font-weight: 700; color: #333; line-height: 1.6; }

        .svg-anno-v9 { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }
    </style>
</head>
<body>
    <div class="slide-canvas">
        <header class="ppt-header">08. UI Wireframe - 상품 상세 (PDP)</header>

        <div class="ui-stage-v9">
            <!-- iPhone Mockup -->
            <div class="iphone-v9">
                <div class="iphone-screen-v9">
                    <div class="pdp-img">PRODUCT IMAGE</div>
                    <div class="pdp-info">
                        <div class="badge-shop" id="target-1">매장상품배송</div>
                        <div class="pdp-title">HAZZYS 기모 베이직 티셔츠</div>
                        <div class="pdp-price">89,000</div>
                        
                        <div class="pdp-option-box">
                            <div style="font-size:11px; font-weight:900; color:#888; margin-bottom:10px;">SIZE SELECT</div>
                            <div class="size-chip">95</div>
                            <div class="size-chip active" id="target-2">100</div>
                            <div class="size-chip">105</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Annotations -->
            <div class="anno-panel-v9">
                <div class="anno-row-v9">
                    <div class="anno-num-v9">1</div>
                    <div class="anno-txt-v9"><b>서비스 뱃지 강제 노출</b><br>재고 로직에 의해 '매장상품배송' 대상 상품인 경우<br>상품명 상단에 브랜드 적색 뱃지 노출</div>
                </div>
                <div class="anno-row-v9">
                    <div class="anno-num-v9">2</div>
                    <div class="anno-txt-v9"><b>재고 상태 기반 옵션 활성화</b><br>매장 재고가 있는 옵션만 활성화 처리하며,<br>품절 시 사선(Disabled) 처리 또는 솔드아웃 표시</div>
                </div>
            </div>

            <!-- Curved SVG Arrows -->
            <svg class="svg-anno-v9">
                <defs>
                    <marker id="arr-p-v9" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
                        <polygon points="0 0, 8 3, 0 6" fill="#C8192E" />
                    </marker>
                </defs>
                <!-- Arrow 1 -->
                <path d="M 400 135 C 380 135, 330 310, 260 310" stroke="#C8192E" stroke-width="2" fill="none" marker-end="url(#arr-p-v9)" />
                <!-- Arrow 2 -->
                <path d="M 400 240 C 380 240, 330 500, 260 500" stroke="#C8192E" stroke-width="2" fill="none" marker-end="url(#arr-p-v9)" />
            </svg>
        </div>

        <div class="ppt-footer">
            <div class="ppt-logo-box">LF</div>
            <div style="font-size:10px; color:#555; font-weight:bold;">8</div>
        </div>
    </div>
</body>
</html>
