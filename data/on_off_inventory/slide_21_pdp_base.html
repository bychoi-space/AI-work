<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
    <style>
        .header { padding: 40px 40px 0; border-bottom: 2px solid var(--admin-border); margin-bottom: 20px; }
        .page-title { font-size: 28px; font-weight: 700; color: var(--lf-red); }
        .content { padding: 40px; display: flex; justify-content: center; }
        
        .iphone { width: 320px; height: 600px; border: 10px solid #222; border-radius: 30px; background: #fff; overflow: hidden; position: relative; }
        .app-header { height: 50px; background: #fff; border-bottom: 1px solid #eee; display: flex; align-items: center; padding: 0 15px; font-weight: 700; }
    </style>
</head>
<body>
    <div class="header">
        <h2 class="page-title">21. [UI] 상품상세 - 기본</h2>
        <p style="color:#64748B; font-size:14px;">매장상품배송 대상 상품의 PDP 기본 레이아웃 및 뱃지 노출 안</p>
    </div>
    <div class="content">
        <div class="iphone">
            <div class="app-header">PRODUCT DETAIL</div>
            <div style="height:300px; background:#f1f3f5; display:flex; align-items:center; justify-content:center; color:#adb5bd; font-size:11px;">MAIN IMG</div>
            <div style="padding:15px;">
                <span class="badge badge-red">매장상품배송</span>
                <div style="font-weight:700; margin-top:5px; font-size:16px;">HAZZYS 기모 티셔츠</div>
                <div style="margin-top:10px; font-weight:800; font-size:18px;">89,000원</div>
            </div>
            <div style="position:absolute; bottom:0; width:100%; padding:10px; border-top:1px solid #eee;">
                <button class="btn-lf" style="width:100%; height:44px;">구매하기</button>
            </div>
        </div>
    </div>
</body>
</html>
