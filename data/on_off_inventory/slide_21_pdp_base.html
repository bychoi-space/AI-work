<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
    <style>
        .iphone-center { display: flex; justify-content: center; padding: 40px; }
        .iphone-frame-hf {
            width: 340px;
            height: 700px;
            background: #000;
            border-radius: 50px;
            padding: 12px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.2);
            position: relative;
        }
        .iphone-screen-hf {
            background: #FFF;
            width: 100%;
            height: 100%;
            border-radius: 38px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
    </style>
</head>
<body>
    <div class="slide-canvas">
        <header class="ppt-header">21. [UI] 상품상세 - 기본 (PDP)</header>

        <div class="iphone-center">
            <div class="iphone-frame-hf">
                <div class="iphone-screen-hf">
                    <div style="height:320px; background:#F1F3F5; display:flex; align-items:center; justify-content:center; color:#adb5bd;">MAIN_PRODUCT_IMG</div>
                    <div style="padding:24px;">
                        <span class="admin-badge" style="background:var(--lf-red); color:#fff; font-size:12px; padding:4px 10px;">매장상품배송</span>
                        <div style="margin-top:10px; font-size:12px; color:#666; font-weight:700;">HAZZYS MEN</div>

                        <div style="font-size:22px; font-weight:900; margin-top:12px;">89,000원</div>
                        
                        <div style="margin-top:30px; background:#F8FAFC; padding:15px; border-radius:8px; border:1px solid #E9ECEF;">
                            <p style="font-size:11px; color:#555;">• <b>강남본점</b>에서 직접 발송됩니다.</p>
                            <p style="font-size:11px; color:#555; margin-top:4px;">• 오늘 주문 시 모레 도착 예정 (평균 1.5일)</p>
                        </div>
                    </div>
                    <div style="margin-top:auto; padding:20px; border-top:1px solid #EEE;">
                        <button class="btn-lf" style="width:100%; height:50px;">구매하기</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="ppt-footer-logo">LF</div>
    </div>
</body>
</html>
