<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
    <style>
        .iphone-v9 { 
            width: 320px; height: 650px; background: #000; border-radius: 40px; 
            padding: 10px; box-shadow: 0 40px 80px rgba(0,0,0,0.3); position: relative;
            margin: 40px auto;
        }
        .screen-v9 { background: #fff; width: 100%; height: 100%; border-radius: 32px; overflow-y: auto; display: flex; flex-direction: column; }
        
        .track-header { padding: 30px 20px; border-bottom: 8px solid #F4F6F9; }
        .track-title { font-size: 20px; font-weight: 900; color: #111; margin-bottom: 20px; }
        
        /* 5-Stage O2O Timeline */
        .timeline-v9 { padding: 30px 25px; position: relative; }
        .timeline-v9::before { content: ""; position: absolute; left: 34px; top: 30px; bottom: 30px; width: 2px; background: #EEE; }
        
        .time-step-v9 { display: flex; gap: 20px; margin-bottom: 35px; position: relative; }
        .time-dot-v9 { width: 18px; height: 18px; border: 3px solid #DDD; border-radius: 50%; background: #fff; position: relative; z-index: 5; margin-left: -1px; }
        .time-step-v9.active .time-dot-v9 { border-color: #C8192E; background: #C8192E; box-shadow: 0 0 0 6px rgba(200,25,46,0.1); }
        
        .time-info { flex: 1; }
        .time-label { font-size: 14px; font-weight: 900; color: #888; margin-bottom: 4px; }
        .time-step-v9.active .time-label { color: #C8192E; }
        .time-desc { font-size: 11px; color: #999; font-weight: 700; }
        .time-step-v9.active .time-desc { color: #555; }
    </style>
</head>
<body>
    <div class="slide-canvas">
        <header class="ppt-header">28. [UI] 주문/배송 조회 - 택배 추적 (O2O Tracking)</header>

        <div class="iphone-v9">
            <div class="screen-v9">
                <div class="track-header">
                    <div class="track-title">Delivery Status</div>
                    <div style="font-size:13px; font-weight:900; color:#555;">송장번호: [CJ대한통운] 123-4567-8901</div>
                </div>

                <div class="timeline-v9">
                    <div class="time-step-v9">
                        <div class="time-dot-v9"></div>
                        <div class="time-info"><div class="time-label">결제완료</div><div class="time-desc">2026.04.14 09:12 주문 접수</div></div>
                    </div>
                    <div class="time-step-v9 active">
                        <div class="time-dot-v9"></div>
                        <div class="time-info"><div class="time-label">매장준비 (O2O)</div><div class="time-desc">명동본점에서 상품을 준비 중입니다</div></div>
                    </div>
                    <div class="time-step-v9">
                        <div class="time-dot-v9"></div>
                        <div class="time-info"><div class="time-label">물류센터입고 (BSU)</div><div class="time-desc">상품이 수도권 물류센터로 이동 중입니다</div></div>
                    </div>
                    <div class="time-step-v9">
                        <div class="time-dot-v9"></div>
                        <div class="time-info"><div class="time-label">배송중</div><div class="time-desc">택배사 전달 및 배송이 시작되었습니다</div></div>
                    </div>
                    <div class="time-step-v9">
                        <div class="time-dot-v9"></div>
                        <div class="time-info"><div class="time-label">배송완료</div><div class="time-desc">상품이 안전하게 도착했습니다</div></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="ppt-footer">
            <div class="ppt-logo-box">LF</div>
            <div style="font-size:12px; font-weight:900; color:#444;">28</div>
        </div>
    </div>
</body>
</html>
