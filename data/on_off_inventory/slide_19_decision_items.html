<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
    <style>
        .check-stage-hf { padding: 60px 110px; }
        .check-row-hf { display: grid; grid-template-columns: 200px 1fr 120px; gap: 20px; border-bottom: 1.5px solid #EEE; padding: 25px 0; align-items: center; }
        .check-row-hf.header { background: #333; color: #fff; padding: 15px 25px; border-radius: 4px; box-shadow: var(--ppt-shadow); border-bottom: none; }
        
        .c-icon-hf { width: 32px; height: 32px; border-radius: 50%; border: 2.5px solid #CCC; display: flex; align-items: center; justify-content: center; font-weight: 900; margin: 0 auto; }
        .c-icon-hf.v { border-color: #059669; color: #059669; background: rgba(5, 150, 105, 0.05); }
        .c-icon-hf.x { border-color: var(--lf-red); color: var(--lf-red); background: rgba(200, 25, 46, 0.05); }
    </style>
</head>
<body>
    <div class="slide-canvas">
        <header class="ppt-header">19. 오픈 전 주요 의사결정 및 점검 항목</header>

        <div class="check-stage-hf">
            <div class="check-row-hf header">
                <b>의사결정 그룹</b> <b>핵심 점검 및 결정 사항</b> <b style="text-align:center;">상태</b>
            </div>

            <div class="check-row-hf">
                <div style="font-weight:900;">영업 정책</div>
                <div style="font-size:14px; color:#444;">매장별 일일 배정 Cap 수량 확정 및 런칭 매장 리스트업</div>
                <div class="c-icon-hf v">V</div>
            </div>

            <div class="check-row-hf">
                <div style="font-weight:900;">시스템 인터페이스</div>
                <div style="font-size:14px; color:#444;">SAP ↔ OMS 가용 재고 동기화 배치 주기 (10분) 최종 검증</div>
                <div class="c-icon-hf v">V</div>
            </div>

            <div class="check-row-hf">
                <div style="font-weight:900;">물류/정산</div>
                <div style="font-size:14px; color:#444;">매장 택배비(2.5천원) 정산 방식 및 인센티브 지급 로직 확정</div>
                <div class="c-icon-hf x">?</div>
            </div>
            
            <div class="check-row-hf" style="border-bottom:none; margin-top:20px; background:#F8FAFC; padding:25px;">
                <p style="font-size:14px; line-height:1.6; color:#666;">
                    • <b>Note</b>: 물류 정산 방식의 경우 브랜드별 현업 MD와 최종 시뮬레이션 후 4월 4주차까지 확정 예정임
                </p>
            </div>
        </div>

        <div class="ppt-footer-logo">LF</div>
    </div>
</body>
</html>
