<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
    <style>
        .header { padding: 40px 40px 0; border-bottom: 2px solid var(--admin-border); margin-bottom: 20px; }
        .page-title { font-size: 28px; font-weight: 700; color: var(--lf-red); }
        .sub-desc { color: #64748B; margin-top: 8px; font-size: 14px; }
        
        .content-container {
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .candidates-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 800px;
            margin-bottom: 40px;
        }

        .candidate-item {
            padding: 20px;
            background: #fff;
            border: 1px solid var(--admin-border);
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .candidate-item.selected {
            border: 2px solid var(--lf-red);
            background: rgba(200, 25, 46, 0.05);
        }

        .candidate-name { font-weight: 700; font-size: 16px; }
        .candidate-status { font-size: 12px; color: var(--lf-red); font-weight: 800; }

        .selected-box {
            background: var(--admin-sidebar);
            color: #fff;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            width: 100%;
            max-width: 800px;
            box-shadow: var(--box-shadow);
        }

        .selected-label { font-size: 14px; color: var(--lf-red); font-weight: 700; margin-bottom: 12px; }
        .selected-value { font-size: 36px; font-weight: 800; letter-spacing: -1px; }
    </style>
</head>
<body>
    <div class="header">
        <h2 class="page-title">04. 서비스 명칭 선정</h2>
        <p class="sub-desc">브랜드별 유관 부서 및 고객 인지도 조사를 통한 서비스 명칭 확정</p>
    </div>

    <div class="content-container">
        <div class="candidates-list">
            <div class="candidate-item">
                <span class="candidate-name">매장 합포 배송</span>
                <span style="color:#94a3b8">Drop</span>
            </div>
            <div class="candidate-item">
                <span class="candidate-name">하이퍼 로컬 배송</span>
                <span style="color:#94a3b8">Drop</span>
            </div>
            <div class="candidate-item selected">
                <span class="candidate-name">매장 상품 배송</span>
                <span class="candidate-status">SELECTED ✓</span>
            </div>
            <div class="candidate-item">
                <span class="candidate-name">옴니 채널 배송</span>
                <span style="color:#94a3b8">Drop</span>
            </div>
        </div>

        <div class="selected-box">
            <div class="selected-label">FINAL SERVICE NAME</div>
            <div class="selected-value">매장상품배송</div>
            <p style="margin-top:20px; font-size:14px; opacity:0.6;">매장 내 가용 재고를 기반으로 고객에게 직접 배송하는 서비스의 가치를 직관적으로 전달</p>
        </div>
    </div>
</body>
</html>
