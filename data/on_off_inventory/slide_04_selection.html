<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
    <style>
        .branding-stage-hf { padding: 60px 110px; }
        .branding-title-hf { font-size: 30px; font-weight: 900; margin-bottom: 20px; border-left: 6px solid var(--lf-red); padding-left: 20px; }
        
        .name-grid-hf {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            margin-top: 40px;
        }
        .name-card-hf {
            background: #fff;
            border: 1px solid #D9D9D9;
            box-shadow: var(--ppt-shadow);
            padding: 35px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 4px;
        }
        .name-card-hf.selected {
            border: 2px solid var(--lf-red);
            background: rgba(200, 25, 46, 0.02);
        }
        .name-card-hf h3 { font-size: 24px; font-weight: 800; color: #333; }
        .name-card-hf.selected h3 { color: var(--lf-red); }

        .tag-hf { font-size: 13px; font-weight: 900; padding: 6px 12px; border-radius: 4px; }
        .tag-drop { background: #EEE; color: #999; }
        .tag-selected { background: var(--lf-red); color: #fff; }

        .final-box-hf {
            margin-top: 50px;
            background: #252830;
            padding: 60px;
            text-align: center;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="slide-canvas">
        <header class="ppt-header">04. 서비스 명칭 선정 (Naming Strategy)</header>

        <div class="branding-stage-hf">
            <h1 class="branding-title-hf">내부 실무진 선호도 1위 명칭 확정</h1>
            <p style="font-size:16px; color:#595959;">고객 직관성과 브랜드 아이덴티티를 고려하여 최종 명칭을 선정하였습니다.</p>

            <div class="name-grid-hf">
                <div class="name-card-hf"><h3>하이퍼로컬 배송</h3> <span class="tag-hf tag-drop">Drop</span></div>
                <div class="name-card-hf"><h3>매장 합포 배송</h3> <span class="tag-hf tag-drop">Drop</span></div>
                <div class="name-card-hf selected"><h3>매장상품배송</h3> <span class="tag-hf tag-selected">SELECTED</span></div>
                <div class="name-card-hf"><h3>옴니채널 익스프레스</h3> <span class="tag-hf tag-drop">Drop</span></div>
            </div>

            <div class="final-box-hf">
                <div style="color:var(--lf-red); font-size:15px; font-weight:900; letter-spacing:3px; margin-bottom:15px;">FINAL BRAND NAME</div>
                <div style="color:#fff; font-size:62px; font-weight:900;">매장상품배송</div>
            </div>
        </div>

        <div class="ppt-footer-logo">LF</div>
    </div>
</body>
</html>
