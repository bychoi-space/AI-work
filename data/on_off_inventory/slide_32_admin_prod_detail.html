<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
    <style>
        .master-card-v4 { background: #fff; padding: 40px; border: 1px solid #CCC; border-radius: 8px; box-shadow: var(--ppt-shadow); display: grid; grid-template-columns: 240px 1fr; gap: 40px; }
    </style>
</head>
<body>
    <div class="slide-canvas">
        <div class="admin-sidebar-v4">
            <div style="font-size:10px; opacity:0.4; margin-bottom:20px;">SYSTEM MONITOR</div>
            <div style="font-size:14px; margin-bottom:15px; font-weight:bold;">Dashboard</div>
            <div style="font-size:14px; margin-bottom:15px; color:var(--lf-red); font-weight:bold;">▶ 상품 상세 정보</div>
        </div>

        <div class="admin-stage-v4">
            <header style="margin-bottom:30px;">
                <h2 style="font-size:22px; font-weight:900;">상품 마스터 고유 정보 관리</h2>
            </header>

            <div class="master-card-v4">
                <div style="width:240px; height:300px; background:#F1F3F5; border:1px solid #DDD; display:flex; align-items:center; justify-content:center; color:#AAA;">PRODUCT_IMG</div>
                <div>
                    <h3 style="font-size:20px; font-weight:900; margin-bottom:25px; border-bottom:1.5px solid #333; padding-bottom:15px;">핵심 관리 항목</h3>
                    <div style="display:grid; grid-template-columns:120px 1fr; gap:18px; font-size:14.5px;">
                        <b style="color:#777;">상품코드</b> <span>HZM22A123 (HAZZYS)</span>
                        <b style="color:#777;">판매가</b> <span>89,000 원</span>
                        <b style="color:#777;">매송여부</b> <span style="color:var(--lf-red); font-weight:900;">Y (운영대상)</span>
                        <b style="color:#777;">연동상태</b> <span>정상 (Last sync: 10:45)</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="ppt-footer">
            <div class="ppt-logo-box">LF</div>
            <div>PAGE 32</div>
        </div>
    </div>
</body>
</html>
