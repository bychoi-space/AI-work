<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
</head>
<body>
    <div class="slide-canvas">
        <header class="ppt-header">13. 물류 BSU 오퍼레이션 프로세스 및 이슈</header>

        <div class="db-flow" style="padding:100px 110px;">
            <div class="sys-card-hf" style="width:220px; background:#F8FAFC;">
                <h3 style="color:#333; font-size:20px; margin-bottom:12px;">물류 센터</h3>
                <div style="font-size:11px; color:#666;">WMS / TMS</div>
            </div>

            <div class="sync-connector">
                <span class="batch-badge" style="border-color:#333; color:#333;">RT 발송 (Batch)</span>
                <div class="sync-arrow" style="background:#333;"></div>
            </div>

            <div class="sys-card-hf card-lfmall" style="width:220px;">
                <h3 style="color:#1E3A8A; font-size:20px; margin-bottom:12px;">전국 거점 매장</h3>
                <div style="font-size:11px; color:#555;">Stock In-bound</div>
            </div>
        </div>

        <div class="summary-box-hf" style="background:#FFF5F5; border:1px solid #FFEBEB; border-left:6px solid var(--lf-red);">
            <p style="font-size:15px; color:var(--lf-red); font-weight:900; margin-bottom:12px;">🔎 주요 개선 필요 사항 (Operation Pain-points)</p>
            <p style="font-size:13.5px; color:#1e1e1e; line-height:1.7;">
                • <b>입고 지연</b>: 센터 → 매장 배송 시 물류 차량 스케줄 불일치로 인한 판매 중단 발생 가능성<br>
                • <b>데이터 시차</b>: 물리적 수령 완료 시점과 시스템 입고(POS) 시점의 GAP으로 인한 품절 오류 해결 필요
            </p>
        </div>

        <div class="ppt-footer-logo">LF</div>
    </div>
</body>
</html>
