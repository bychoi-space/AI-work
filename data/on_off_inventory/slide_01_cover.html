<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
    <style>
        .cover-page {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e2128, #2d333f);
            color: #fff;
            text-align: center;
        }
        .main-title {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--lf-red);
            letter-spacing: -1px;
        }
        .sub-title {
            font-size: 24px;
            opacity: 0.8;
            margin-bottom: 60px;
        }
        .meta-box {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 12px;
            text-align: left;
            background: rgba(255,255,255,0.05);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 15px;
        }
        .meta-label { color: #888; font-weight: 600; }
    </style>
</head>
<body>
    <div class="cover-page">
        <h1 class="main-title">온오프 재고 효율화</h1>
        <p class="sub-title">Inventory Optimization Master Plan v0.8</p>
        
        <div class="meta-box">
            <span class="meta-label">ID</span> <span>LFML-138562</span>
            <span class="meta-label">담당자</span> <span>bychoi (Architect)</span>
            <span class="meta-label">기간</span> <span>2026.04.14 ~ 2026.06.30</span>
            <span class="meta-label">버전</span> <span>v0.8 (Final Draft)</span>
        </div>
    </div>
</body>
</html>
