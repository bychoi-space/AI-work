<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
    <style>
        .admin-sidebar {
            width: 240px;
            background: #252830;
            height: 100%;
            position: absolute;
            left: 0; top: 48px;
            padding: 20px;
            color: #fff;
        }
        .main-view {
            position: absolute;
            left: 240px; right: 0; top: 48px; bottom: 0;
            background: #F5F6F8;
            padding: 30px;
        }
        .breadcrumb { font-size: 11px; color: #999; margin-bottom: 20px; }
        .page-header-row { display: flex; justify-content: space-between; margin-bottom: 25px; }
        
        .filter-grid {
            background: #fff;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 4px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .filter-cell { display: flex; align-items: center; gap: 10px; font-size: 12px; }
        .filter-cell input, .filter-cell select { flex: 1; padding: 6px; border: 1px solid #ccc; font-size: 11px; }

        .ppt-data-table {
            width: 100%;
            background: #fff;
            border-collapse: collapse;
            font-size: 11px;
            border: 1px solid #ddd;
        }
        .ppt-data-table th {
            background: #F1F3F5;
            padding: 10px;
            text-align: left;
            border: 1px solid #ddd;
            color: #555;
        }
        .ppt-data-table td {
            padding: 10px;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <div class="slide-canvas">
        <header class="ppt-header">
            30. [어드민] 온오프 재고 현황 조회
        </header>

        <div class="admin-sidebar">
            <div style="opacity:0.3; font-size:10px;">DASHBOARD</div>
            <div style="margin-top:10px; font-size:13px; font-weight:700;">재고 관리</div>
            <div style="margin-top:20px; font-size:13px; color:var(--lf-red);">→ 재고 조회</div>
            <div style="margin-top:10px; font-size:13px; opacity:0.6;">매장 마스터</div>
            <div style="margin-top:10px; font-size:13px; opacity:0.6;">연동 모니터링</div>
        </div>

        <div class="main-view">
            <div class="breadcrumb">Home > 재고 관리 > 재고 현황 조회</div>
            
            <div class="page-header-row">
                <h2 style="font-size:18px;">재고 현황 상세</h2>
            </div>

            <div class="filter-grid">
                <div class="filter-cell"><b>상품코드</b> <input type="text" placeholder="HZM12345"></div>
                <div class="filter-cell"><b>브랜드</b> <select><option>HAZZYS</option></select></div>
                <div class="filter-cell"><b>매장명</b> <input type="text" placeholder="강남본점"></div>
            </div>

            <table class="ppt-data-table">
                <thead>
                    <tr>
                        <th>NO</th>
                        <th>상품코드 (SKU)</th>
                        <th>브랜드</th>
                        <th>매장명</th>
                        <th>가용재고</th>
                        <th>안전재고</th>
                        <th>상태</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td style="color:#2E5BFF; font-weight:700;">HZM22A123-BK</td>
                        <td>HAZZYS</td>
                        <td>강남본점</td>
                        <td style="background:#EBF3FF;">45</td>
                        <td>5</td>
                        <td><span class="admin-badge" style="background:#E1F5FE; color:#01579B;">정상</span></td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td style="color:#2E5BFF; font-weight:700;">DKS11B999-NY</td>
                        <td>DAKS</td>
                        <td>명동스타일</td>
                        <td style="background:#FFF3E0;">3</td>
                        <td>2</td>
                        <td><span class="admin-badge" style="background:#FFF3E0; color:#E65100;">부족</span></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="ppt-footer-logo">LF</div>
    </div>
</body>
</html>
