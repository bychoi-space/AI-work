<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
    <style>
        .admin-sidebar-v4 {
            width: 260px; height: 100%;
            background: #2D3139;
            position: absolute; top: 0; left: 0;
            padding: 30px; color: #fff;
        }
        .admin-stage-v4 {
            position: absolute; top: 0; left: 260px; right: 0; bottom: 0;
            background: #F4F6F9; padding: 40px;
        }
        .data-grid-v4 {
            width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #CCC; font-size: 12px;
        }
        .data-grid-v4 th { background: #E9ECEF; border: 1px solid #CCC; padding: 12px; text-align: left; }
        .data-grid-v4 td { border: 1px solid #CCC; padding: 12px; }
    </style>
</head>
<body>
    <div class="slide-canvas">
        <div class="admin-sidebar-v4">
            <div style="font-size:10px; opacity:0.4; margin-bottom:20px;">SYSTEM MONITOR</div>
            <div style="font-size:14px; margin-bottom:15px; color:var(--lf-red); font-weight:bold;">▶ 재고 현황 관리</div>
            <div style="margin-left:15px; font-size:13px; opacity:0.7;">- 매장별 안전재고</div>
        </div>

        <div class="admin-stage-v4">
            <header style="margin-bottom:30px;">
                <h2 style="font-size:22px; font-weight:900;">실시간 매장 가용 재고 현황 (Admin)</h2>
                <p style="font-size:13px; color:#777; margin-top:5px;">운영지원 > 재고 관리 > 현황 조회</p>
            </header>

            <div style="background:#fff; border:1px solid #CCC; padding:20px; display:grid; grid-template-columns: repeat(3, 1fr); gap:20px; margin-bottom:25px;">
                <div><b>브랜드</b> <select class="form-input-hf" style="width:100%;"><option>HAZZYS</option></select></div>
                <div><b>매장명</b> <input type="text" class="form-input-hf" style="width:100%;" placeholder="강남본점"></div>
                <div style="display:flex; align-items:flex-end;"><button style="background:var(--ppt-header-bg); color:#fff; border:none; padding:8px 25px; font-weight:bold; cursor:pointer;">조회</button></div>
            </div>

            <table class="data-grid-v4">
                <thead>
                    <tr><th>NO</th><th>상품코드</th><th>상품명</th><th>가용재고</th><th>안전재고</th><th>상태</th></tr>
                </thead>
                <tbody>
                    <tr><td>1</td><td style="color:#2E5BFF; font-weight:bold;">HZM22A101</td><td>[매장상품] 헤지스 티셔츠</td><td><b>42</b></td><td>5</td><td><span style="color:#059669;">정상</span></td></tr>
                    <tr style="background:rgba(200, 25, 46, 0.02);"><td>2</td><td style="color:#2E5BFF; font-weight:bold;">HZM22A102</td><td>[매장상품] 헤지스 스니커즈</td><td><b style="color:var(--lf-red);">2</b></td><td>3</td><td><b style="color:var(--lf-red);">재고주의</b></td></tr>
                </tbody>
            </table>
        </div>

        <div class="ppt-footer">
            <div class="ppt-logo-box">LF</div>
            <div>PAGE 30</div>
        </div>
    </div>
</body>
</html>
