<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
    <style>
        .page-header { background: #fff; padding: 20px 30px; border-bottom: 1px solid var(--admin-border); }
        .page-title { font-size: 20px; font-weight: 700; color: #333; display: flex; align-items: center; gap: 10px; }
        .tag-beta { background: var(--lf-red); color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 4px; }
        
        .main-content { padding: 30px; }
        
        /* Specific filter layout for slide 30 */
        .search-area {
            background: #fff;
            padding: 24px;
            border-radius: 8px;
            border: 1px solid var(--admin-border);
            margin-bottom: 24px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        
        .form-group { display: flex; align-items: center; gap: 12px; }
        .form-label { width: 100px; font-size: 13px; font-weight: 600; color: #64748B; }
        .form-input { flex: 1; padding: 8px 12px; border: 1px solid var(--admin-border); border-radius: 4px; font-size: 13px; }
        
        .action-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .result-count { font-size: 13px; color: #64748B; }
        .result-count b { color: #333; }
    </style>
</head>
<body>
    <div class="page-header">
        <h1 class="page-title">
            30. [어드민] 재고 현황 조회
            <span class="tag-beta">LIVE</span>
        </h1>
    </div>

    <div class="main-content">
        <!-- Search Filters -->
        <div class="search-area">
            <div class="form-group">
                <label class="form-label">상품코드</label>
                <input type="text" class="form-input" placeholder="상품명 또는 SKU 입력">
            </div>
            <div class="form-group">
                <label class="form-label">브랜드</label>
                <select class="form-input">
                    <option>전체 브랜드</option>
                    <option>HAZZYS</option>
                    <option>DAKS</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">창고/매장</label>
                <input type="text" class="form-input" placeholder="매장명 입력">
            </div>
            <div class="form-group">
                <label class="form-label">재고상태</label>
                <div style="display:flex; gap:10px;">
                    <label><input type="checkbox" checked> 가용</label>
                    <label><input type="checkbox"> 품절</label>
                    <label><input type="checkbox"> 예약</label>
                </div>
            </div>
            <div style="grid-column: span 2; text-align: right;">
                <button class="btn-lf" style="background:#475569;">초기화</button>
                <button class="btn-lf">검색하기</button>
            </div>
        </div>

        <!-- Action Bar -->
        <div class="action-bar">
            <div class="result-count">조회 결과: <b>1,245</b> 건</div>
            <div style="display:flex; gap:8px;">
                <button class="btn-lf" style="background:transparent; color:#333; border:1px solid #ddd;">엑셀 다운로드</button>
                <button class="btn-lf">매장 개별 할당</button>
            </div>
        </div>

        <!-- Data Table -->
        <table class="data-table">
            <thead>
                <tr>
                    <th><input type="checkbox"></th>
                    <th>상품코드 (SKU)</th>
                    <th>브랜드</th>
                    <th>매장명</th>
                    <th>몰 구분</th>
                    <th>가용재고</th>
                    <th>안전재고</th>
                    <th>업데이트 일시</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><input type="checkbox"></td>
                    <td style="color:var(--lf-red); font-weight:600;">HZM12345-A1</td>
                    <td>HAZZYS</td>
                    <td>강남본점</td>
                    <td>LFmall</td>
                    <td>24</td>
                    <td>5</td>
                    <td>2026-04-20 13:45</td>
                </tr>
                <tr>
                    <td><input type="checkbox"></td>
                    <td style="color:var(--lf-red); font-weight:600;">DKS98765-B2</td>
                    <td>DAKS</td>
                    <td>명동스타일</td>
                    <td>LFmall</td>
                    <td>12</td>
                    <td>2</td>
                    <td>2026-04-20 13:10</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
