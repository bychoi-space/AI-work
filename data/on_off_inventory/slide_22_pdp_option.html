<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
</head>
<body>
    <div class="slide-canvas">
        <header class="ppt-header">22. [UI] 상품상세 - 옵션 선택 (PDP)</header>

        <div style="display:flex; justify-content:center; padding:40px;">
            <div style="width:340px; height:700px; background:#000; border-radius:50px; padding:12px; box-shadow: 0 40px 100px rgba(0,0,0,0.2);">
                <div style="background:#FFF; width:100%; height:100%; border-radius:38px; overflow:hidden; position:relative; display:flex; flex-direction:column;">
                    <div style="height:320px; background:#f1f3f5; opacity:0.3;"></div>
                    <div style="position:absolute; bottom:0; width:100%; height:450px; background:#fff; border-top:1px solid #eee; box-shadow: 0 -10px 40px rgba(0,0,0,0.1); padding:25px; border-radius: 30px 30px 0 0;">
                        <h4 style="font-size:16px; margin-bottom:20px;">옵션 선택</h4>
                        <div style="display:flex; flex-direction:column; gap:12px;">
                            <div style="padding:15px; border:1px solid var(--lf-red); border-radius:8px; display:flex; justify-content:space-between;">
                                <span>Navy / 100</span>
                                <b style="color:var(--lf-red);">매장재고 5개</b>
                            </div>
                            <div style="padding:15px; border:1px solid #EEE; border-radius:8px; display:flex; justify-content:space-between; opacity:0.5;">
                                <span>Navy / 105</span>
                                <b>품절</b>
                            </div>
                            <div style="padding:15px; border:1px solid #EEE; border-radius:8px; display:flex; justify-content:space-between;">
                                <span>Black / 100</span>
                                <span>일반재고 12개</span>
                            </div>
                        </div>
                        <button class="btn-lf" style="width:100%; height:50px; margin-top:40px;">장바구니 담기</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="ppt-footer-logo">LF</div>
    </div>
</body>
</html>
