<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
</head>
<body>
    <div class="slide-canvas">
        <header class="ppt-header">22. [UI] 상품상세 - 옵션 선택 (PDP Option Selector)</header>

        <div style="display:flex; justify-content:center; padding:40px;">
            <div class="phone-frame-hf">
                <div class="phone-screen-hf">
                    <div style="height:320px; background:#f1f3f5; opacity:0.3;"></div>
                    <div style="position:absolute; bottom:0; width:100%; height:480px; background:#fff; border-top:1.5px solid #DDD; box-shadow: 0 -15px 40px rgba(0,0,0,0.1); border-radius: 40px 40px 0 0; padding:30px; display:flex; flex-direction:column;">
                        <h4 style="font-size:18px; font-weight:900; margin-bottom:25px;">색상 / 사이즈 선택</h4>
                        
                        <div style="display:flex; flex-direction:column; gap:12px; flex:1;">
                            <div style="padding:18px; border:1.5px solid var(--lf-red); border-radius:10px; display:flex; justify-content:space-between; background:rgba(200, 25, 46, 0.02);">
                                <span style="font-size:15px; font-weight:bold;">Navy / 100</span>
                                <b style="color:var(--lf-red); font-size:13px;">[매장재고 5개]</b>
                            </div>
                            <div style="padding:18px; border:1px solid #EEE; border-radius:10px; display:flex; justify-content:space-between; background:#F8F9FA; opacity:0.5;">
                                <span style="font-size:15px; color:#999;">Navy / 105</span>
                                <b style="color:#999; font-size:13px;">품절</b>
                            </div>
                            <div style="padding:18px; border:1px solid #EEE; border-radius:10px; display:flex; justify-content:space-between;">
                                <span style="font-size:15px;">Black / 100</span>
                                <b style="color:#666; font-size:13px;">일반재고 12개</b>
                            </div>
                        </div>

                        <button style="width:100%; height:54px; background:var(--ppt-header-bg); color:#fff; border:none; border-radius:10px; font-weight:900; font-size:17px; margin-top:20px;">장바구니 담기</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="ppt-footer-logo">LF</div>
    </div>
</body>
</html>
