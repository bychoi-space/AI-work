<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="system-ui.css">
    <style>
        .iphone-v9 { 
            width: 320px; height: 650px; background: #000; border-radius: 40px; 
            padding: 10px; box-shadow: 0 40px 80px rgba(0,0,0,0.3); position: relative;
            margin: 40px auto;
        }
        .screen-v9 { background: #fff; width: 100%; height: 100%; border-radius: 32px; overflow: hidden; display: flex; flex-direction: column; }
        
        .pdp-info-mini { padding: 20px; border-bottom: 1px solid #EEE; display: flex; align-items: center; gap: 15px; }
        .mini-img { width: 50px; height: 60px; background: #F4F6F9; border-radius: 4px; }
        
        .option-stage { flex: 1; padding: 20px; background: #F8FAFC; }
        .grid-v9 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .chip-v9 { 
            background: #fff; border: 1.5px solid #DDD; border-radius: 8px; height: 65px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 800; cursor: pointer; position: relative;
        }
        .chip-v9.selected { border-color: #333; background: #F1F3F5; }
        .chip-badge { 
            position: absolute; top: -5px; right: -5px; background: #C8192E; color: #fff; 
            font-size: 8px; font-weight: 900; padding: 2px 5px; border-radius: 10px; 
        }
        
        .benefit-btn { 
            margin-top: 30px; border: 1px solid #DDD; padding: 15px; border-radius: 8px; 
            display: flex; justify-content: space-between; align-items: center; font-size: 13px; font-weight: 900;
            background: #fff;
        }
    </style>
</head>
<body>
    <div class="slide-canvas">
        <header class="ppt-header">22. [UI] 상품 상세 페이지 - 옵션 선택 (PDP Option)</header>

        <div class="iphone-v9">
            <div class="screen-v9">
                <div class="pdp-info-mini">
                    <div class="mini-img"></div>
                    <div>
                        <div style="font-size:13px; font-weight:900;">DAKS 런던 체크 플리스</div>
                        <div style="font-size:14px; font-weight:900; color:#C8192E;">433,300</div>
                    </div>
                </div>

                <div class="option-stage">
                    <div style="font-size:12px; font-weight:900; margin-bottom:15px; color:#555;">사이즈 선택 (SIZE)</div>
                    <div class="grid-v9">
                        <div class="chip-v9">90</div>
                        <div class="chip-v9">95</div>
                        <div class="chip-v9 selected">100
                            <div class="chip-badge">매장배송</div>
                        </div>
                        <div class="chip-v9">105</div>
                        <div class="chip-v9" style="opacity:0.3;">110 (품절)</div>
                    </div>

                    <div class="benefit-btn">
                        <span>🏷️ 매장 재고 찾기 (Find Store)</span>
                        <span style="color:#CCC;">❯</span>
                    </div>

                    <button style="width:100%; background:#111; color:#fff; padding:18px; border:none; border-radius:8px; font-weight:900; margin-top:40px; font-size:16px;">구매하기 (Buy Now)</button>
                </div>
            </div>
        </div>

        <div class="ppt-footer">
            <div class="ppt-logo-box">LF</div>
            <div style="font-size:12px; font-weight:900; color:#444;">22</div>
        </div>
    </div>
</body>
</html>
