<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bychoi workspace - Dashboard V4</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="assets/theme.css">
    <style>
        body { background: #020205 !important; }
        .v4-badge {
            background: #6366f1; color: white; padding: 2px 8px; border-radius: 4px;
            font-size: 10px; font-weight: 900; vertical-align: middle; margin-left: 8px;
        }
        .file-card:hover { border-color: #6366f1 !important; }
    </style>
</head>
<body>
    <header class="toolbar" style="background: rgba(15, 17, 21, 0.6); backdrop-filter: blur(20px);">
        <a href="index_v4.html" class="brand">
            <img src="assets/logo.svg" class="brand-logo" alt="Logo">
            <span style="font-weight: 600;">bychoi workspace <span class="v4-badge">V4 PREVIEW</span></span>
        </a>
    </header>

    <div id="dashboard-view" style="padding: 40px;">
        <div class="dashboard-header" style="margin-bottom: 32px;">
            <h2 class="dashboard-title">My Projects <span style="font-size: 14px; font-weight: 400; color: #94a3b8; margin-left: 10px;">(V4 Preview Mode)</span></h2>
            <div style="color: #6366f1; font-size: 12px; margin-top: 4px;">* 모든 프로젝트는 고도화된 V4 에디터로 열립니다.</div>
        </div>
        <div class="card-grid" id="file-list"></div>
    </div>

    <!-- Scripts -->
    <script src="assets/app.js"></script>
    <script>
        // Override the project open logic to use viewer_v4.html
        async function initDashboard() {
            const contents = await listContents('');
            const projects = (contents || []).filter(i => i.type === 'dir' && !i.name.startsWith('.'));
            
            const list = document.getElementById('file-list');
            list.innerHTML = '';
            
            projects.forEach(p => {
                const card = document.createElement('div');
                card.className = 'file-card';
                card.style.cursor = 'pointer';
                card.innerHTML = `
                    <div style="padding: 24px;">
                        <span class="material-icons-outlined" style="font-size: 40px; color: #6366f1; margin-bottom: 16px;">folder</span>
                        <div style="font-weight: 700; font-size: 18px; color: white;">${p.name}</div>
                        <div style="font-size: 12px; color: #94a3b8; margin-top: 8px;">Open in V4 Editor</div>
                    </div>
                `;
                card.onclick = () => {
                    window.location.href = `viewer_v4.html?project=${p.name}`;
                };
                list.appendChild(card);
            });
        }
        document.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>
</html>
