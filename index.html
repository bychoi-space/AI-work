<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML 작업 공간</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Pretendard:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --text: #1a1916;
    --text2: #6b6860;
    --text3: #a09e98;
    --accent: #2a2724;
    --accent-fg: #ffffff;
    --danger: #c0392b;
    --danger-bg: #fdf0ef;
    --radius: 8px;
    --radius-lg: 12px;
    --mono: 'DM Mono', monospace;
    --sans: 'Pretendard', -apple-system, sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #161513;
      --surface: #1e1c1a;
      --surface2: #252320;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --text: #f0ede8;
      --text2: #9e9b96;
      --text3: #6a6760;
      --accent: #e8e4de;
      --accent-fg: #1a1916;
      --danger: #e05a4a;
      --danger-bg: #2a1a18;
    }
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ── Toolbar ── */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 14px;
    height: 48px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    user-select: none;
  }

  .logo {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-right: 6px;
  }

  .logo span {
    display: inline-block;
    width: 8px; height: 8px;
    background: var(--text);
    border-radius: 2px;
    margin-right: 6px;
    vertical-align: middle;
    position: relative;
    top: -1px;
  }

  .sep { width: 1px; height: 18px; background: var(--border2); margin: 0 4px; }
  .spacer { flex: 1; }

  .badge {
    font-size: 11px;
    font-family: var(--mono);
    padding: 2px 8px;
    border-radius: 99px;
    background: var(--surface2);
    color: var(--text2);
    border: 1px solid var(--border);
    font-weight: 500;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 11px;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    transition: background 0.12s, opacity 0.12s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--surface2); }
  .btn:active { opacity: 0.7; }
  .btn svg { width: 13px; height: 13px; flex-shrink: 0; }

  .btn-primary {
    background: var(--accent);
    color: var(--accent-fg);
    border-color: transparent;
  }
  .btn-primary:hover { opacity: 0.88; background: var(--accent); }

  .btn-danger { color: var(--danger); }
  .btn-danger:hover { background: var(--danger-bg); border-color: var(--danger); }

  /* ── Main layout ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 230px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: width 0.2s;
  }

  .sidebar.collapsed { width: 0; }

  .sidebar-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px 8px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .sidebar-head-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--text3);
  }

  .file-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px;
  }

  .file-item {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 7px 8px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.1s;
    font-size: 12.5px;
    color: var(--text);
  }
  .file-item:hover { background: var(--surface2); }
  .file-item.active {
    background: var(--surface2);
    font-weight: 500;
  }

  .file-item svg { width: 14px; height: 14px; flex-shrink: 0; color: var(--text3); }
  .file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .file-del {
    opacity: 0;
    width: 20px; height: 20px;
    border-radius: 4px;
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--text3);
    font-size: 12px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.1s, color 0.1s, opacity 0.1s;
    flex-shrink: 0;
  }
  .file-item:hover .file-del { opacity: 1; }
  .file-del:hover { background: var(--danger-bg); color: var(--danger); }

  /* ── Drop zone ── */
  .drop-zone {
    margin: 8px;
    padding: 18px 10px;
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius-lg);
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    flex-shrink: 0;
  }
  .drop-zone:hover, .drop-zone.over {
    border-color: var(--text);
    background: var(--surface2);
  }
  .drop-zone-icon {
    width: 32px; height: 32px;
    margin: 0 auto 8px;
    color: var(--text3);
  }
  .drop-zone p { font-size: 11.5px; color: var(--text2); line-height: 1.6; }
  .drop-zone small { font-size: 10.5px; color: var(--text3); }

  /* ── Preview area ── */
  .preview-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  .preview-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .url-bar {
    flex: 1;
    height: 30px;
    padding: 0 12px;
    font-family: var(--mono);
    font-size: 11.5px;
    border: 1px solid var(--border2);
    border-radius: 99px;
    background: var(--surface2);
    color: var(--text2);
    outline: none;
    cursor: default;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .view-tabs {
    display: flex;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .view-tab {
    padding: 4px 12px;
    font-size: 11.5px;
    font-weight: 500;
    font-family: var(--sans);
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--text2);
    transition: background 0.1s, color 0.1s;
  }
  .view-tab.active {
    background: var(--surface);
    color: var(--text);
  }

  /* ── Frames ── */
  #preview-frame {
    flex: 1;
    border: none;
    display: block;
    background: #fff;
  }

  #code-view {
    flex: 1;
    overflow: auto;
    display: none;
  }

  #code-view pre {
    padding: 20px;
    font-family: var(--mono);
    font-size: 12.5px;
    line-height: 1.7;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-all;
    tab-size: 2;
  }

  /* ── Empty states ── */
  .empty-preview {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    color: var(--text3);
  }
  .empty-preview svg { width: 48px; height: 48px; opacity: 0.25; }
  .empty-preview p { font-size: 13px; color: var(--text2); text-align: center; line-height: 1.7; }
  .empty-preview small { font-size: 11.5px; color: var(--text3); }

  .empty-files {
    padding: 14px 10px;
    font-size: 11.5px;
    color: var(--text3);
    text-align: center;
    line-height: 1.7;
  }

  /* ── Resize handle ── */
  .resize-handle {
    width: 4px;
    cursor: col-resize;
    background: transparent;
    flex-shrink: 0;
    transition: background 0.15s;
    position: relative;
    z-index: 10;
  }
  .resize-handle:hover { background: var(--border2); }

  /* ── Scrollbar ── */
  .file-list::-webkit-scrollbar,
  #code-view::-webkit-scrollbar { width: 4px; }
  .file-list::-webkit-scrollbar-thumb,
  #code-view::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

  /* ── Sidebar toggle ── */
  .toggle-sidebar {
    width: 28px; height: 28px;
    border-radius: var(--radius);
    background: transparent;
    border: 1px solid var(--border);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text2);
    transition: background 0.12s;
    flex-shrink: 0;
  }
  .toggle-sidebar:hover { background: var(--surface2); }
  .toggle-sidebar svg { width: 14px; height: 14px; }

  /* ── Size indicator ── */
  .size-hint {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--text3);
    margin-left: auto;
  }

  #file-input { display: none; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--accent);
    color: var(--accent-fg);
    font-size: 12.5px;
    padding: 8px 16px;
    border-radius: var(--radius-lg);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    white-space: nowrap;
    z-index: 9999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app">

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="logo"><span></span>작업 공간</div>
    <span id="file-count" class="badge">0개 파일</span>
    <div class="sep"></div>

    <button class="btn btn-primary" onclick="document.getElementById('file-input').click()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
        <path d="M8 2v9M4 7l4-4.5L12 7"/><path d="M2 13h12"/>
      </svg>
      HTML 업로드
    </button>

    <button class="btn" id="export-btn" onclick="exportCurrent()" style="display:none">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
        <path d="M8 11V2M4 8l4 4 4-4"/><path d="M2 13h12"/>
      </svg>
      다운로드
    </button>

    <button class="btn btn-danger" id="clear-btn" onclick="clearAll()" style="display:none">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
        <path d="M4 4l8 8M12 4l-8 8"/>
      </svg>
      전체 삭제
    </button>

    <div class="spacer"></div>

    <button class="toggle-sidebar" onclick="toggleSidebar()" title="사이드바 토글">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="1" y="2" width="14" height="12" rx="2"/>
        <path d="M5 2v12"/>
      </svg>
    </button>
  </div>

  <!-- Main -->
  <div class="main" id="main-area">

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <span class="sidebar-head-label">파일</span>
      </div>
      <div class="file-list" id="file-list">
        <div class="empty-files">업로드된 파일이 없습니다</div>
      </div>
      <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <svg class="drop-zone-icon" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.4">
          <path d="M16 6v16M8 14l8-8 8 8"/>
          <rect x="4" y="22" width="24" height="6" rx="2"/>
        </svg>
        <p>파일을 여기에 드래그<br>하거나 클릭해서 선택</p>
        <small>.html .htm 지원</small>
      </div>
    </div>

    <!-- Resize handle -->
    <div class="resize-handle" id="resize-handle"></div>

    <!-- Preview -->
    <div class="preview-area" id="preview-area">

      <!-- Empty -->
      <div class="empty-preview" id="empty-preview">
        <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1">
          <rect x="6" y="6" width="36" height="36" rx="4"/>
          <path d="M14 18h20M14 24h20M14 30h12"/>
        </svg>
        <p>HTML 파일을 업로드하면<br>여기에 미리보기가 표시됩니다</p>
        <small>여러 파일을 한 번에 업로드할 수 있어요</small>
      </div>

      <!-- Preview bar (hidden until file loaded) -->
      <div class="preview-bar" id="preview-bar" style="display:none">
        <button class="toggle-sidebar" onclick="toggleSidebar()" title="사이드바 토글">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="1" y="2" width="14" height="12" rx="2"/>
            <path d="M5 2v12"/>
          </svg>
        </button>
        <input class="url-bar" id="url-bar" readonly value="파일을 선택하세요" />
        <span class="size-hint" id="size-hint"></span>
        <div class="view-tabs">
          <button class="view-tab active" id="tab-preview" onclick="switchView('preview')">미리보기</button>
          <button class="view-tab" id="tab-code" onclick="switchView('code')">소스코드</button>
        </div>
      </div>

      <iframe id="preview-frame" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
      <div id="code-view"><pre id="code-pre"></pre></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="file-input" accept=".html,.htm" multiple>

<script>
const files = {};
let activeId = null;
let sidebarOpen = true;

const fileListEl = document.getElementById('file-list');
const emptyPreview = document.getElementById('empty-preview');
const previewBar = document.getElementById('preview-bar');
const previewFrame = document.getElementById('preview-frame');
const codeView = document.getElementById('code-view');
const codePre = document.getElementById('code-pre');
const urlBar = document.getElementById('url-bar');
const fileCount = document.getElementById('file-count');
const clearBtn = document.getElementById('clear-btn');
const exportBtn = document.getElementById('export-btn');
const dropZone = document.getElementById('drop-zone');
const sidebar = document.getElementById('sidebar');
const sizeHint = document.getElementById('size-hint');
const toast = document.getElementById('toast');

function uid() { return Math.random().toString(36).slice(2,8); }

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1024 / 1024).toFixed(1) + ' MB';
}

document.getElementById('file-input').addEventListener('change', e => handleFiles(e.target.files));

function handleFiles(fileObjs) {
  let added = 0;
  Array.from(fileObjs).forEach(f => {
    if (!f.name.match(/\.html?$/i)) return;
    const id = uid();
    const reader = new FileReader();
    reader.onload = e => {
      files[id] = { name: f.name, content: e.target.result, size: f.size, added: Date.now() };
      renderFileList();
      if (!activeId) showFile(id);
      added++;
    };
    reader.readAsText(f);
  });
  if (added === 0) showToast('HTML 파일만 업로드할 수 있어요');
}

function renderFileList() {
  const ids = Object.keys(files);
  fileCount.textContent = ids.length + '개 파일';
  clearBtn.style.display = ids.length ? '' : 'none';

  if (!ids.length) {
    fileListEl.innerHTML = '<div class="empty-files">업로드된 파일이 없습니다</div>';
    return;
  }

  fileListEl.innerHTML = '';
  ids.forEach(id => {
    const f = files[id];
    const item = document.createElement('div');
    item.className = 'file-item' + (id === activeId ? ' active' : '');
    item.innerHTML = `
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3">
        <path d="M3 1.5h7l3 3v10H3v-13z"/>
        <path d="M10 1.5v3h3"/>
        <path d="M5.5 8h5M5.5 10h3.5"/>
      </svg>
      <span class="file-name" title="${f.name}">${f.name}</span>
      <button class="file-del" onclick="deleteFile(event,'${id}')" title="삭제">✕</button>
    `;
    item.addEventListener('click', e => { if (!e.target.classList.contains('file-del')) showFile(id); });
    fileListEl.appendChild(item);
  });
}

function showFile(id) {
  activeId = id;
  const f = files[id];
  emptyPreview.style.display = 'none';
  previewBar.style.display = '';
  exportBtn.style.display = '';
  previewFrame.style.display = '';

  urlBar.value = f.name;
  sizeHint.textContent = formatSize(f.size);

  const blob = new Blob([f.content], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  previewFrame.src = url;
  codePre.textContent = f.content;
  renderFileList();
  switchView('preview');
}

function deleteFile(e, id) {
  e.stopPropagation();
  const name = files[id].name;
  delete files[id];
  if (activeId === id) {
    activeId = null;
    const remaining = Object.keys(files);
    if (remaining.length) showFile(remaining[remaining.length - 1]);
    else {
      emptyPreview.style.display = '';
      previewBar.style.display = 'none';
      previewFrame.style.display = 'none';
      codeView.style.display = 'none';
      exportBtn.style.display = 'none';
    }
  }
  renderFileList();
  showToast(`${name} 삭제됨`);
}

function clearAll() {
  if (!confirm('모든 파일을 삭제할까요?')) return;
  Object.keys(files).forEach(k => delete files[k]);
  activeId = null;
  renderFileList();
  emptyPreview.style.display = '';
  previewBar.style.display = 'none';
  previewFrame.style.display = 'none';
  codeView.style.display = 'none';
  exportBtn.style.display = 'none';
  showToast('전체 삭제됨');
}

function switchView(mode) {
  if (mode === 'preview') {
    previewFrame.style.display = '';
    codeView.style.display = 'none';
    document.getElementById('tab-preview').classList.add('active');
    document.getElementById('tab-code').classList.remove('active');
  } else {
    previewFrame.style.display = 'none';
    codeView.style.display = 'block';
    document.getElementById('tab-code').classList.add('active');
    document.getElementById('tab-preview').classList.remove('active');
  }
}

function exportCurrent() {
  if (!activeId) return;
  const f = files[activeId];
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([f.content], { type: 'text/html' }));
  a.download = f.name;
  a.click();
  showToast(`${f.name} 다운로드 시작`);
}

function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  sidebar.classList.toggle('collapsed', !sidebarOpen);
}

// Drag & drop on sidebar
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('over'); handleFiles(e.dataTransfer.files); });

// Drag & drop anywhere on preview
const previewArea = document.getElementById('preview-area');
previewArea.addEventListener('dragover', e => e.preventDefault());
previewArea.addEventListener('drop', e => { e.preventDefault(); handleFiles(e.dataTransfer.files); });

// Sidebar resize
const handle = document.getElementById('resize-handle');
let resizing = false;
handle.addEventListener('mousedown', e => { resizing = true; e.preventDefault(); });
document.addEventListener('mousemove', e => {
  if (!resizing) return;
  const rect = document.getElementById('main-area').getBoundingClientRect();
  const w = Math.max(160, Math.min(420, e.clientX - rect.left));
  sidebar.style.width = w + 'px';
});
document.addEventListener('mouseup', () => resizing = false);
</script>
</body>
</html>
