<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bychoi workspace - Dashboard</title>
    <!-- 폰트 및 아이콘 시스템 적용 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>

    <!-- Header Toolbar -->
    <header class="toolbar">
        <a href="index.html" class="brand">
            <span class="material-icons-outlined brand-icon">art_track</span>
            <span style="font-weight: 600; letter-spacing: 0.5px;">bychoi workspace</span>
        </a>
        
        <!-- Right Actions (GitHub Token) -->
        <div class="actions">
             <div style="display:flex; align-items:center; gap:8px; background: rgba(0,0,0,0.2); padding: 4px 12px; border-radius: 8px; border: 1px solid var(--border-color);">
                <span id="gh-status" style="font-size:10px; color:var(--text-secondary); margin-right:4px;"></span>
                <input type="password" id="gh-token" placeholder="GitHub Token" style="background:transparent; border:none; color:#fff; font-size:12px; width: 120px;" />
                <button id="btn-save-token" class="tool-btn" style="width:auto; height:24px; font-size:11px; padding:0 8px;">Save</button>
            </div>
        </div>
    </header>

    <!-- Dashboard View -->
    <div id="dashboard-view">
        <div class="dashboard-header">
            <h2 class="dashboard-title">Recent Files</h2>
            <label class="tool-btn" title="로컬 HTML 업로드" style="width: auto; padding: 0 16px; background: var(--accent); color: #000; font-weight: 600;">
                <span class="material-icons-outlined" style="margin-right: 6px;">note_add</span> New Upload
                <input type="file" id="file-upload-top" accept=".html,.htm" multiple style="display:none;">
            </label>
        </div>
        <div class="card-grid" id="file-list">
            <!-- Loading state -->
            <div class="empty-text" style="grid-column: 1 / -1;">
                GitHub에서 파일을 동기화 중입니다...<br><br>
                <span class="material-icons-outlined" style="font-size:36px; margin-top: 12px; opacity: 0.5;">sync</span>
            </div>
        </div>
    </div>

    <script src="assets/app.js"></script>
    <script>
        const state = {
            files: []
        };

        const DOM = {
            list: document.getElementById('file-list'),
            ghToken: document.getElementById('gh-token'),
            ghStatus: document.getElementById('gh-status'),
            btnSaveToken: document.getElementById('btn-save-token'),
            uploadTop: document.getElementById('file-upload-top')
        };

        // Initialize GitHub Status
        function updateStatusUI(text, color) {
            DOM.ghStatus.innerText = text;
            if (color) DOM.ghStatus.style.color = color;
        }

        if (ghConfig.token) {
            DOM.ghToken.value = ghConfig.token;
            updateStatusUI('가동 중🟢', '#4ade80');
        }

        DOM.btnSaveToken.addEventListener('click', () => {
            const val = DOM.ghToken.value.trim();
            localStorage.setItem('gh_token', val);
            ghConfig.token = val;
            alert(val ? "GitHub 토큰이 저장되었습니다!" : "토큰이 삭제되었습니다.");
            updateStatusUI(val ? '가동 중🟢' : '', '#4ade80');
            if (val) refreshFileList();
        });

        // File List Rendering
        async function refreshFileList() {
            if (!ghConfig.token) {
                DOM.list.innerHTML = `
                    <div class="empty-text" style="grid-column: 1 / -1;">
                        GitHub 토큰을 입력하여 파일을 동기화하세요.
                    </div>`;
                return;
            }

            updateStatusUI('동기화 중... 🔄', '#facc15');
            const files = await syncFilesFromGitHub();
            state.files = files.map(item => ({
                id: item.sha,
                name: item.name,
                size: (item.size / 1024).toFixed(1) + ' KB',
                src: null // Thumbnails will be loaded on demand or if already in session
            }));
            
            renderList();
            updateStatusUI('가동 중🟢', '#4ade80');
        }

        async function renderList() {
            if (state.files.length === 0) {
                DOM.list.innerHTML = `<div class="empty-text" style="grid-column: 1 / -1;">파일이 없습니다.</div>`;
                return;
            }

            DOM.list.innerHTML = '';
            for (const f of state.files) {
                const card = document.createElement('a');
                card.className = 'file-card';
                card.href = `viewer.html?file=${encodeURIComponent(f.name)}`;
                
                card.innerHTML = `
                    <div class="delete-btn-card" data-filename="${f.name}" data-sha="${f.id}" title="Delete File">
                        <span class="material-icons-outlined">close</span>
                    </div>
                    <div class="thumbnail-wrapper">
                        <div class="icon-wrapper" style="width: 100%; height: 100%;">
                            <span class="material-icons-outlined" style="font-size: 36px; opacity: 0.4;">cloud_download</span>
                        </div>
                    </div>
                    <div class="card-info">
                        <div class="card-name" title="${f.name}">${f.name}</div>
                        <div class="card-meta">Cloud • ${f.size}</div>
                    </div>
                `;
                DOM.list.appendChild(card);
            }
        }

        // Deletion Logic (Event Delegation)
        document.addEventListener('click', async (e) => {
            const delBtn = e.target.closest('.delete-btn-card');
            if (delBtn) {
                e.preventDefault();
                e.stopPropagation();
                const filename = delBtn.dataset.filename;
                const sha = delBtn.dataset.sha;
                
                if (confirm(`'${filename}' 파일을 정말 삭제하시겠습니까?`)) {
                    const success = await deleteFileFromGitHub(filename, sha, updateStatusUI);
                    if (success) {
                        // Optimistic UI Update: 로컬 상태에서 즉시 제거
                        state.files = state.files.filter(f => f.name !== filename);
                        renderList();
                        // 잠시 후 실제 서버 상태와 동기화 (GitHub API 지연 고려)
                        setTimeout(() => refreshFileList(), 1500);
                    }
                }
            }
        });

        // Upload Logic
        DOM.uploadTop.addEventListener('change', async (e) => {
            const fileList = e.target.files;
            const newFiles = Array.from(fileList).filter(f => f.name.endsWith('.html') || f.name.endsWith('.htm'));
            
            for (const file of newFiles) {
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    const content = ev.target.result;
                    const success = await uploadToGitHub(file.name, content, updateStatusUI);
                    if (success) refreshFileList();
                };
                reader.readAsText(file);
            }
            e.target.value = '';
        });

        // Initial Load
        refreshFileList();
    </script>
</body>
</html>
