<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bychoi workspace - Dashboard</title>
    <!-- 폰트 및 아이콘 시스템 적용 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="assets/theme.css">
    <!-- Flatpickr (Date Picker) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
    <style>
        /* Premium Animated Background - Mega Boost */
        body {
            margin: 0; padding: 0;
            background: #090e17 !important; /* Soft dark navy base */
            background-image: none !important; /* Disable legacy style.css gradients */
            overflow-x: hidden;
            min-height: 100vh;
            animation: none !important;
        }
        #dashboard-view {
            background: transparent !important;
            position: relative;
            z-index: 10;
        }
        .bg-mesh-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; overflow: hidden;
            background: #0f172a; /* Slate 900 */
        }
        /* Top Left - Sky Blue */
        .bg-blob-1 {
            position: absolute; width: 1200px; height: 1200px;
            top: -400px; left: -300px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.25) 0%, rgba(56, 189, 248, 0) 70%);
            filter: blur(120px);
            border-radius: 50%;
            animation: moveBlob 40s infinite alternate ease-in-out;
            mix-blend-mode: screen;
        }
        /* Bottom Right - Violet */
        .bg-blob-2 {
            position: absolute; width: 1400px; height: 1400px;
            bottom: -500px; right: -400px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.2) 0%, rgba(139, 92, 246, 0) 70%);
            filter: blur(140px);
            border-radius: 50%;
            animation: moveBlob 50s infinite alternate-reverse ease-in-out;
            mix-blend-mode: screen;
        }
        /* Middle - Rose Flow */
        .bg-blob-3 {
            position: absolute; width: 900px; height: 900px;
            top: 40%; left: 30%;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.15) 0%, rgba(236, 72, 153, 0) 70%);
            filter: blur(110px);
            border-radius: 50%;
            animation: moveBlob 60s infinite alternate ease-in-out;
            opacity: 0.8;
        }
        @keyframes moveBlob {
            0% { transform: translate(-5%, -5%) scale(1); }
            50% { transform: translate(10%, 15%) scale(1.2); }
            100% { transform: translate(-10%, -15%) scale(0.9); }
        }
        .bg-noise {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5; opacity: 0.04; pointer-events: none;
            background-image: url('https://grainy-gradients.vercel.app/noise.svg');
            mix-blend-mode: overlay;
        }
        .toolbar { background: rgba(30, 41, 59, 0.6) !important; backdrop-filter: blur(20px) !important; border-bottom: 1px solid rgba(255,255,255,0.08) !important; }
        .card-grid { padding-bottom: 100px; display: grid !important; gap: 24px; }
        .file-card { 
            position: relative !important; 
            overflow: hidden; 
            background: rgba(30, 41, 59, 0.4) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            backdrop-filter: blur(12px);
            transition: all 0.3s ease;
        }
        .file-card:hover { transform: translateY(-5px); border-color: var(--accent) !important; background: rgba(30, 41, 59, 0.7) !important; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .edit-btn-card, .delete-btn-card {
            position: absolute !important;
            top: 12px;
            z-index: 20;
            width: 32px; height: 32px;
            border-radius: 50%;
            background: rgba(15, 17, 21, 0.8);
            display: flex; align-items: center; justify-content: center;
            opacity: 0;
            transition: all 0.2s ease;
        }
        .edit-btn-card { right: 52px; color: var(--accent); }
        .delete-btn-card { right: 12px; color: #f87171; }
        .file-card:hover .edit-btn-card, .file-card:hover .delete-btn-card { opacity: 1; }
        
        /* Ensure no ghost buttons at the top */
        .dashboard-header .edit-btn-card, .dashboard-header .delete-btn-card { display: none !important; }
        
        /* Search Bar Focus State */
        #project-search-input:focus {
            border-color: var(--accent) !important;
            background: rgba(30, 41, 59, 0.95) !important;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25), 0 8px 20px rgba(0,0,0,0.4) !important;
        }
        
        /* Auto-complete Dropdown */
        .search-dropdown {
            display: none; position: absolute; top: 100%; left: 0; width: 100%;
            background: rgba(15, 17, 21, 0.95); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; margin-top: 8px; z-index: 100; max-height: 300px;
            overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            backdrop-filter: blur(16px);
        }
        .search-dropdown.active { display: block; }
        .search-item {
            padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer; transition: background 0.2s;
            display: flex; align-items: center; gap: 12px;
        }
        .search-item:last-child { border-bottom: none; }
        .search-item:hover { background: rgba(255,255,255,0.08); }
        .search-item-icon { color: var(--accent); opacity: 0.8; font-size: 20px; }
        .search-item-title { font-size: 13px; font-weight: 600; color: #fff; }
        .search-item-sub { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
    </style>
</head>
<body>
    <!-- Premium Animated Background -->
    <div class="bg-mesh-container">
        <div class="bg-blob bg-blob-1"></div>
        <div class="bg-blob bg-blob-2"></div>
        <div class="bg-blob bg-blob-3"></div>
    </div>
    <div class="bg-noise"></div>

    <!-- Header Toolbar -->
    <header class="toolbar">
        <a href="index.html" class="brand">
            <img src="assets/logo.svg" class="brand-logo" alt="Logo">
            <span style="font-weight: 600; letter-spacing: 0.5px;">bychoi workspace</span>
        </a>
        
        <div class="actions">
             <div style="display:flex; align-items:center; gap:8px;">
                <span id="gh-status" style="font-size:10px; color:var(--text-secondary); margin-right:4px;"></span>
            </div>
        </div>
    </header>

    <!-- Dashboard View -->
    <div id="dashboard-view">
        <div class="dashboard-header" style="display: flex; align-items: center; justify-content: space-between; position: relative;">
            <h2 class="dashboard-title" style="margin: 0;">My Projects</h2>
            
            <!-- Search Bar (Centered & Highlighted) -->
            <div class="search-container" style="position: absolute; left: 50%; transform: translateX(-50%); width: 440px; z-index: 50;">
                <span class="material-icons-outlined" style="position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.8); font-size: 20px; pointer-events: none;">search</span>
                <input type="text" id="project-search-input" placeholder="프로젝트명 또는 제목으로 검색..." autocomplete="off" style="width: 100%; height: 46px; padding: 0 20px 0 48px; border-radius: 23px; border: 1px solid rgba(255,255,255,0.2); background: rgba(30, 41, 59, 0.7); color: #fff; font-size: 15px; font-weight: 500; outline: none; transition: all 0.2s ease; box-sizing: border-box; box-shadow: 0 6px 16px rgba(0,0,0,0.4); backdrop-filter: blur(12px);">
                <!-- Auto-complete dropdown -->
                <div id="search-dropdown" class="search-dropdown"></div>
            </div>

            <button class="tool-btn" id="btn-create-project" title="새 프로젝트 생성" style="width: auto; padding: 0 16px; background: var(--accent); color: #000; font-weight: 600;">
                <span class="material-icons-outlined" style="margin-right: 6px;">create_new_folder</span> New Project
            </button>
        </div>
        <div class="card-grid" id="file-list"></div>
    </div>


    <!-- Metadata Edit Modal -->
    <div id="metadata-modal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-main-title">파일 정보 수정</h3>
                <p id="modal-filename" style="font-size: 12px; color: var(--text-secondary); margin-top: 4px;"></p>
            </div>
            <div class="modal-body">
                <div id="group-project-id" style="display:none;">
                    <div class="form-group">
                        <label class="form-label">프로젝트 ID (영문 폴더명)</label>
                        <input type="text" id="meta-project-id" class="form-input" placeholder="예: event_promotion_2024">
                        <p style="font-size:10px; color:var(--accent); margin-top:4px;">* 한글 입력 시 자동으로 변환됩니다.</p>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">프로젝트명 / 제목 <span style="color: #f87171;">*</span></label>
                    <input type="text" id="meta-title" class="form-input" placeholder="예: 메인 페이지 개편안">
                </div>
                <div class="form-group">
                    <label class="form-label">기간</label>
                    <input type="text" id="meta-period" class="form-input" placeholder="예: 2024.04.10 ~ 2024.04.20">
                </div>
                <div class="form-group">
                    <label class="form-label">담당자</label>
                    <input type="text" id="meta-assignee" class="form-input" placeholder="예: 홍길동">
                </div>
            </div>
            <div class="modal-footer">
                <button id="btn-modal-close" class="btn-secondary">취소</button>
                <button id="btn-modal-save" class="btn-primary">저장하기</button>
            </div>
        </div>
    </div>

    <!-- Auth Modal -->
    <div id="auth-modal" class="modal-overlay">
        <div class="modal-card" style="max-width: 400px;">
            <div class="modal-header">
                <h3 class="modal-title">에디터 인증</h3>
                <p style="font-size: 13px; color: var(--text-secondary); margin-top: 4px;">관리 권한이 필요한 작업입니다.</p>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">GitHub Owner (계정명)</label>
                    <input type="text" id="modal-gh-owner" class="form-input" placeholder="계정명 입력">
                </div>
                <div class="form-group">
                    <label class="form-label">GitHub Repository (저장소명)</label>
                    <input type="text" id="modal-gh-repo" class="form-input" placeholder="저장소명 입력">
                </div>
                <div class="form-group">
                    <label class="form-label">GitHub Personal Access Token</label>
                    <input type="password" id="modal-gh-token" class="form-input" placeholder="ghp_ 또는 github_pat_ ...">
                    <p id="modal-auth-status" style="font-size: 11px; margin-top: 8px;"></p>
                </div>
            </div>
            <div class="modal-footer">
                <button id="btn-modal-auth-cancel" class="btn-secondary">닫기</button>
                <button id="btn-modal-auth-test" class="btn-secondary" style="margin-right: auto; color: var(--accent);">연결 테스트</button>
                <button id="btn-modal-auth-submit" class="btn-primary">설정 저장</button>
            </div>
        </div>
    </div>
    
    <!-- Global Loading Progress Overlay -->
    <div id="global-loader">
        <div class="loader-content">
            <div class="progress-container">
                <div id="progress-bar"></div>
            </div>
            <div class="loader-status" id="loader-status">Fetching project data...</div>
        </div>
    </div>

    <!-- Splash Screen (Intro) -->
    <div id="intro-overlay" class="intro-overlay">
        <div class="intro-content">
            <img src="assets/logo.svg" class="intro-logo-img" alt="Logo">
            <div class="intro-title">bychoi workspace</div>
            <div class="intro-loader"></div>
        </div>
    </div>

    <script src="assets/app.js?v=V7_CLEANUP"></script>
    <script src="assets/dashboard.js?v=V7_CLEANUP"></script>
</body>
</html>
