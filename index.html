<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bychoi workspace - Dashboard</title>
    <!-- 폰트 및 아이콘 시스템 적용 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="assets/theme.css">
    <!-- Flatpickr (Date Picker) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
    <style>
        /* Critical Splash Screen CSS (Inlined for reliability) */
        .intro-overlay {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            background: #0f1115 !important;
            z-index: 10000 !important;
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            justify-content: center !important;
            transition: opacity 0.4s ease, visibility 0.4s !important;
        }
        .intro-overlay.fade-out {
            opacity: 0 !important;
            visibility: hidden !important;
            pointer-events: none !important;
        }
        /* Fail-safe Modal CSS */
        .modal-overlay.active {
            display: flex !important;
        }
    </style>
</head>
<body>
    <!-- Header Toolbar -->
    <header class="toolbar">
        <a href="index.html" class="brand">
            <img src="assets/logo.svg" class="brand-logo" alt="Logo">
            <span style="font-weight: 600; letter-spacing: 0.5px;">bychoi workspace</span>
        </a>
        
        <div class="actions">
             <div style="display:flex; align-items:center; gap:8px;">
                <span id="gh-status" style="font-size:10px; color:var(--text-secondary); margin-right:4px;"></span>
            </div>
        </div>
    </header>

    <!-- Dashboard View -->
    <div id="dashboard-view">
        <div class="dashboard-header">
            <h2 class="dashboard-title">My Projects</h2>
            <button class="tool-btn" id="btn-create-project" title="새 프로젝트 생성" style="width: auto; padding: 0 16px; background: var(--accent); color: #000; font-weight: 600;">
                <span class="material-icons-outlined" style="margin-right: 6px;">create_new_folder</span> New Project
            </button>
        </div>
        <div class="card-grid" id="file-list"></div>
    </div>


    <!-- Metadata Edit Modal -->
    <div id="metadata-modal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-main-title">파일 정보 수정</h3>
                <p id="modal-filename" style="font-size: 12px; color: var(--text-secondary); margin-top: 4px;"></p>
            </div>
            <div class="modal-body">
                <div id="group-project-id" style="display:none;">
                    <div class="form-group">
                        <label class="form-label">프로젝트 ID (영문 폴더명)</label>
                        <input type="text" id="meta-project-id" class="form-input" placeholder="예: event_promotion_2024">
                        <p style="font-size:10px; color:var(--accent); margin-top:4px;">* 한글 입력 시 자동으로 변환됩니다.</p>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">프로젝트명 / 제목 <span style="color: #f87171;">*</span></label>
                    <input type="text" id="meta-title" class="form-input" placeholder="예: 메인 페이지 개편안">
                </div>
                <div class="form-group">
                    <label class="form-label">기간</label>
                    <input type="text" id="meta-period" class="form-input" placeholder="예: 2024.04.10 ~ 2024.04.20">
                </div>
                <div class="form-group">
                    <label class="form-label">담당자</label>
                    <input type="text" id="meta-assignee" class="form-input" placeholder="예: 홍길동">
                </div>
            </div>
            <div class="modal-footer">
                <button id="btn-modal-close" class="btn-secondary">취소</button>
                <button id="btn-modal-save" class="btn-primary">저장하기</button>
            </div>
        </div>
    </div>

    <!-- Auth Modal -->
    <div id="auth-modal" class="modal-overlay">
        <div class="modal-card" style="max-width: 400px;">
            <div class="modal-header">
                <h3 class="modal-title">에디터 인증</h3>
                <p style="font-size: 13px; color: var(--text-secondary); margin-top: 4px;">관리 권한이 필요한 작업입니다.</p>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">GitHub Owner (계정명)</label>
                    <input type="text" id="modal-gh-owner" class="form-input" placeholder="계정명 입력">
                </div>
                <div class="form-group">
                    <label class="form-label">GitHub Repository (저장소명)</label>
                    <input type="text" id="modal-gh-repo" class="form-input" placeholder="저장소명 입력">
                </div>
                <div class="form-group">
                    <label class="form-label">GitHub Personal Access Token</label>
                    <input type="password" id="modal-gh-token" class="form-input" placeholder="ghp_ 또는 github_pat_ ...">
                    <p id="modal-auth-status" style="font-size: 11px; margin-top: 8px;"></p>
                </div>
            </div>
            <div class="modal-footer">
                <button id="btn-modal-auth-cancel" class="btn-secondary">닫기</button>
                <button id="btn-modal-auth-test" class="btn-secondary" style="margin-right: auto; color: var(--accent);">연결 테스트</button>
                <button id="btn-modal-auth-submit" class="btn-primary">설정 저장</button>
            </div>
        </div>
    </div>
    
    <!-- Global Loading Progress Overlay -->
    <div id="global-loader">
        <div class="loader-content">
            <div class="progress-container">
                <div id="progress-bar"></div>
            </div>
            <div class="loader-status" id="loader-status">Fetching project data...</div>
        </div>
    </div>

    <!-- Splash Screen (Intro) -->
    <div id="intro-overlay" class="intro-overlay">
        <div class="intro-content">
            <img src="assets/logo.svg" class="intro-logo-img" alt="Logo">
            <div class="intro-title">bychoi workspace</div>
            <div class="intro-loader"></div>
        </div>
    </div>

    <script src="assets/app.js?v=V7_CLEANUP"></script>
    <script src="assets/dashboard.js?v=V7_CLEANUP"></script>
</body>
</html>
