<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bychoi workspace - Dashboard</title>
    <!-- 폰트 및 아이콘 시스템 적용 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
    <!-- Flatpickr (Date Picker) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
    <style>
        /* Critical Splash Screen CSS (Inlined for reliability) */
        .intro-overlay {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            background: #0f1115 !important;
            z-index: 10000 !important;
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            justify-content: center !important;
            transition: opacity 0.4s ease, visibility 0.4s !important;
        }
        .intro-overlay.fade-out {
            opacity: 0 !important;
            visibility: hidden !important;
            pointer-events: none !important;
        }
    </style>
</head>
<body>
    <!-- Header Toolbar -->
    <header class="toolbar">
        <a href="index.html" class="brand">
            <img src="assets/logo.svg" class="brand-logo" alt="Logo">
            <span style="font-weight: 600; letter-spacing: 0.5px;">bychoi workspace</span>
        </a>
        
        <!-- Right Actions (GitHub Token) -->
        <div class="actions">
             <div style="display:flex; align-items:center; gap:8px; background: rgba(0,0,0,0.2); padding: 4px 12px; border-radius: 8px; border: 1px solid var(--border-color);">
                <span id="gh-status" style="font-size:10px; color:var(--text-secondary); margin-right:4px;"></span>
                <input type="password" id="gh-token" placeholder="GitHub Token" style="background:transparent; border:none; color:#fff; font-size:12px; width: 120px;" />
                <button id="btn-save-token" class="tool-btn" style="width:auto; height:24px; font-size:11px; padding:0 8px;">Save</button>
            </div>
        </div>
    </header>

    <!-- Dashboard View -->
    <div id="dashboard-view">
        <div class="dashboard-header">
            <h2 class="dashboard-title">My Projects</h2>
            <button class="tool-btn" id="btn-create-project" title="새 프로젝트 생성" style="width: auto; padding: 0 16px; background: var(--accent); color: #000; font-weight: 600;">
                <span class="material-icons-outlined" style="margin-right: 6px;">create_new_folder</span> New Project
            </button>
        </div>
        <div class="card-grid" id="file-list">
            <!-- Loading state -->
            <div id="loading-state" class="empty-text" style="grid-column: 1 / -1; display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 60px 0;">
                <div class="intro-loader" style="width: 32px; height: 32px; border-width: 3px;"></div>
                <div style="opacity: 0.6;">GitHub에서 파일을 동기화 중입니다...</div>
            </div>
        </div>
    </div>


    <!-- Metadata Edit Modal -->
    <div id="metadata-modal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h3 class="modal-title">파일 정보 수정</h3>
                <p id="modal-filename" style="font-size: 12px; color: var(--text-secondary); margin-top: 4px;"></p>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">제목</label>
                    <input type="text" id="meta-title" class="form-input" placeholder="예: 메인 페이지 개편안">
                </div>
                <div class="form-group">
                    <label class="form-label">기간</label>
                    <input type="text" id="meta-period" class="form-input" placeholder="예: 2024.04.10 - 2024.04.20">
                </div>
                <div class="form-group">
                    <label class="form-label">담당자</label>
                    <input type="text" id="meta-assignee" class="form-input" placeholder="예: 홍길동">
                </div>
                <div class="form-group">
                    <label class="form-label">JIRA 번호</label>
                    <input type="text" id="meta-jira" class="form-input" placeholder="예: LFML-138562">
                </div>
                <div class="form-group">
                    <label class="form-label">FIGMA (디자인산출물)</label>
                    <input type="text" id="meta-figma" class="form-input" placeholder="피그마 링크 주소">
                </div>
                <div class="form-group">
                    <label class="form-label">퍼블리싱 산출물</label>
                    <input type="text" id="meta-pub" class="form-input" placeholder="퍼블리싱 링크 주소">
                </div>
            </div>
            <div class="modal-footer">
                <button id="btn-modal-close" class="btn-secondary">취소</button>
                <button id="btn-modal-save" class="btn-primary">저장하기</button>
            </div>
        </div>
    </div>

    <script src="assets/app.js"></script>
    <script>
        const state = {
            projects: []
        };

        const DOM = {
            list: document.getElementById('file-list'),
            ghToken: document.getElementById('gh-token'),
            ghStatus: document.getElementById('gh-status'),
            btnSaveToken: document.getElementById('btn-save-token'),
            uploadTop: document.getElementById('file-upload-top'),
            
            // Modal DOM
            modal: document.getElementById('metadata-modal'),
            modalFilenameDisplay: document.getElementById('modal-filename'),
            metaTitle: document.getElementById('meta-title'),
            metaPeriod: document.getElementById('meta-period'),
            metaAssignee: document.getElementById('meta-assignee'),
            metaJira: document.getElementById('meta-jira'),
            metaFigma: document.getElementById('meta-figma'),
            metaPub: document.getElementById('meta-pub'),
            btnModalClose: document.getElementById('btn-modal-close'),
            btnModalSave: document.getElementById('btn-modal-save')
        };

        const context = {
            currentEditingProject: null,
            projectsMetadata: {} // Map: project_name -> metadata_object
        };

        DOM.btnCreateProject = document.getElementById('btn-create-project');
        
        // Initialize GitHub Status
        function updateStatusUI(text, color) {
            DOM.ghStatus.innerText = text;
            if (color) DOM.ghStatus.style.color = color;
        }

        if (ghConfig.token) {
            DOM.ghToken.value = ghConfig.token;
            updateStatusUI('가동 중🟢', '#4ade80');
        }

        DOM.btnSaveToken.addEventListener('click', () => {
            const val = DOM.ghToken.value.trim();
            localStorage.setItem('gh_token', val);
            ghConfig.token = val;
            alert(val ? "GitHub 토큰이 저장되었습니다!" : "토큰이 삭제되었습니다.");
            updateStatusUI(val ? '가동 중🟢' : '', '#4ade80');
            if (val) refreshFileList();
        });

        // Project List Rendering
        async function refreshFileList() {
            if (!ghConfig.token) {
                DOM.list.innerHTML = `<div class="empty-text" style="grid-column: 1 / -1;">GitHub 토큰을 입력하세요.</div>`;
                return;
            }

            updateStatusUI('동기화 중... 🔄', '#facc15');
            
            try {
                // 1. Fetch Repository Root for Migration check
                const rootItems = await listRepoRoot();
                
                // 2. Identify Legacy Files (HTML files in root NOT being index.html or viewer.html)
                const systemFiles = ['index.html', 'viewer.html', 'stitch_ui_viewer.html'];
                const legacies = rootItems.filter(i => 
                    i.type === 'file' && 
                    (i.name.endsWith('.html') || i.name.endsWith('.htm')) &&
                    !systemFiles.includes(i.name.toLowerCase())
                );
                
                // 3. Fetch data/ directory for project listing
                const dataItems = await listContents('');
                const folders = dataItems.filter(i => i.type === 'dir' && i.name !== 'assets');

                // Update loading text if migration starts
                const loadingText = document.querySelector('#loading-state div:last-child');

                if (legacies.length > 0) {
                    console.log("[Migration] Found legacy files in root. Moving to Default_Project...");
                    updateStatusUI('기존 파일 마이그레이션 중... ⏳', '#facc15');
                    if (loadingText) loadingText.innerText = "기존 파일을 프로젝트로 옮기는 중입니다 (수 분 소요될 수 있음)...";
                    
                    const defaultMeta = await fetchProjectMetadata('Default_Project');
                    let count = 0;
                    for (const f of legacies) {
                        count++;
                        if (loadingText) loadingText.innerText = `마이그레이션 중... (${count}/${legacies.length})`;
                        try {
                            // isRoot = true
                            const content = await fetchFileContent(f.name, true);
                            if (content) {
                                defaultMeta.screens = defaultMeta.screens || {};
                                defaultMeta.screens[f.name] = { updatedAt: new Date().toISOString() };
                                await uploadToProject('Default_Project', f.name, content);
                                await deleteFileFromGitHub(f.name, f.sha, true);
                            }
                        } catch (e) { console.error("Migration failed for:", f.name, e); }
                    }
                    await saveProjectMetadata('Default_Project', defaultMeta);
                    
                    // Add Default_Project to folders if not already there
                    if (!folders.find(fol => fol.name === 'Default_Project')) {
                        folders.push({ name: 'Default_Project', type: 'dir' });
                    }
                }

                if (loadingText) loadingText.innerText = "프로젝트 정보를 불러오는 중...";

                // 4. Fetch metadata for each project in parallel
                const projectData = await Promise.all(folders.map(async (folder) => {
                    const meta = await fetchProjectMetadata(folder.name);
                    return {
                        name: folder.name,
                        meta: meta,
                        screens: Object.keys(meta.screens || {}).length
                    };
                }));
                state.projects = projectData;
                renderList();
                updateStatusUI('가동 중🟢', '#4ade80');
            } catch (err) {
                console.error("refreshFileList error:", err);
                updateStatusUI('동기화 오류 ❌', '#ef4444');
            }
        }

        async function renderList() {
            if (state.projects.length === 0) {
                DOM.list.innerHTML = `<div class="empty-text" style="grid-column: 1 / -1;">프로젝트가 없습니다.</div>`;
                return;
            }

            DOM.list.innerHTML = '';
            for (const p of state.projects) {
                const card = document.createElement('a');
                card.className = 'file-card';
                // Find first screen to open by default, or just open project
                const firstScreen = Object.keys(p.meta.screens || {})[0] || '';
                card.href = `viewer.html?project=${encodeURIComponent(p.name)}${firstScreen ? '&file='+encodeURIComponent(firstScreen) : ''}`;
                
                const m = p.meta;
                const mainTitle = m.title || p.name;
                const subInfo = `${p.screens} screens • ${p.name}`;

                card.innerHTML = `
                    <div class="edit-btn-card" data-project="${p.name}" title="Edit Project Metadata">
                        <span class="material-icons-outlined">edit</span>
                    </div>
                    <div class="thumbnail-wrapper" style="background: linear-gradient(135deg, #1e293b, #0f172a);">
                        <div class="icon-wrapper" style="width: 100%; height: 100%;">
                            <span class="material-icons-outlined" style="font-size: 48px; opacity: 0.6; color: var(--accent);">folder</span>
                        </div>
                    </div>
                    <div class="card-info">
                        <div class="card-name" title="${mainTitle}">${mainTitle}</div>
                        <div class="card-meta">${subInfo}</div>
                    </div>
                `;
                DOM.list.appendChild(card);
            }
        }

        // Deletion & Edition Logic (Event Delegation)
        document.addEventListener('click', async (e) => {
            const delBtn = e.target.closest('.delete-btn-card');
            const editBtn = e.target.closest('.edit-btn-card');

            if (editBtn) {
                e.preventDefault();
                e.stopPropagation();
                const filename = editBtn.dataset.filename;
                openEditModal(filename);
                return;
            }

            if (delBtn) {
                e.preventDefault();
                e.stopPropagation();
                const filename = delBtn.dataset.filename;
                const sha = delBtn.dataset.sha;
                
                if (confirm(`'${filename}' 파일을 정말 삭제하시겠습니까?`)) {
                    const success = await deleteFileFromGitHub(filename, sha, updateStatusUI);
                    if (success) {
                        state.files = state.files.filter(f => f.name !== filename);
                        renderList();
                        setTimeout(() => refreshFileList(), 1500);
                    }
                }
            }
        });

        // Helper for Date Formatting
        function formatKODateRange(selectedDates) {
            if (selectedDates.length !== 2) return '';
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            const format = (d) => {
                const year = d.getFullYear();
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const date = String(d.getDate()).padStart(2, '0');
                const day = days[d.getDay()];
                return `${year}.${month}.${date}(${day})`;
            };
            return `${format(selectedDates[0])} ~ ${format(selectedDates[1])}`;
        }

        // Project Modal & Events
        DOM.btnCreateProject.onclick = () => {
            const name = prompt("새 프로젝트 이름을 입력하세요 (폴더명이 됩니다):");
            if (name && name.trim()) {
                const projectName = name.trim().replace(/\s+/g, '_');
                updateStatusUI('프로젝트 생성 중... ⏳', '#facc15');
                // Create project by uploading initial metadata
                saveProjectMetadata(projectName, { 
                    title: name.trim(), 
                    screens: {}, 
                    createdAt: new Date().toISOString() 
                }, (msg, color) => {
                    if (color === '#4ade80') {
                        refreshFileList();
                    }
                });
            }
        };

        async function openEditProjectModal(projectName) {
            context.currentEditingProject = projectName;
            updateStatusUI('메타데이터 로딩 중... ⏳', '#facc15');
            const m = await fetchProjectMetadata(projectName);
            DOM.modalFilenameDisplay.innerText = `Project: ${projectName}`;
            DOM.metaTitle.value = m.title || '';
            DOM.metaPeriod.value = m.period || '';
            DOM.metaAssignee.value = m.assignee || '';
            DOM.metaJira.value = m.jira || '';
            DOM.metaFigma.value = m.figmaUrl || '';
            DOM.metaPub.value = m.pubUrl || '';
            
            DOM.modal.style.display = 'flex';
            updateStatusUI('가동 중🟢', '#4ade80');
            
            // Initialization of Period Picker (Flatpickr)
            flatpickr(DOM.metaPeriod, {
                mode: "range",
                locale: "ko",
                dateFormat: "Y.m.d",
                defaultDate: m.period ? m.period.split(' ~ ') : null,
                onChange: (selectedDates) => {
                    if (selectedDates.length === 2) {
                        DOM.metaPeriod.value = formatKODateRange(selectedDates);
                    }
                }
            });
        }

        document.addEventListener('click', async (e) => {
            const editBtn = e.target.closest('.edit-btn-card');
            if (editBtn) {
                e.preventDefault(); e.stopPropagation();
                const projectName = editBtn.dataset.project;
                openEditProjectModal(projectName);
                return;
            }
        });

        DOM.btnModalClose.onclick = () => DOM.modal.style.display = 'none';

        DOM.btnModalSave.onclick = async () => {
            if (!context.currentEditingProject) return;
            const projectName = context.currentEditingProject;
            const originalText = DOM.btnModalSave.innerText;
            DOM.btnModalSave.innerText = '저장 중...';
            
            const data = {
                projectMeta: {
                    title: DOM.metaTitle.value.trim(),
                    period: DOM.metaPeriod.value.trim(),
                    assignee: DOM.metaAssignee.value.trim(),
                    jira: DOM.metaJira.value.trim(),
                    figmaUrl: DOM.metaFigma.value.trim(),
                    pubUrl: DOM.metaPub.value.trim()
                }
            };

            const success = await updateScreenMetadata(projectName, null, data, (msg, color) => {
                DOM.btnModalSave.innerText = msg;
                DOM.btnModalSave.style.background = color;
                if (color === '#4ade80') {
                    setTimeout(() => {
                        DOM.modal.style.display = 'none';
                        DOM.btnModalSave.innerText = originalText;
                        DOM.btnModalSave.style.background = '';
                        refreshFileList();
                    }, 1000);
                }
            });
        };

        // Upload Logic (Refactored for Project Support)
        async function handleFiles(fileList) {
            const newFiles = Array.from(fileList).filter(f => f.name.endsWith('.html') || f.name.endsWith('.htm'));
            if (newFiles.length === 0) return;

            const targetProject = prompt("파일을 업로드할 프로젝트 이름을 입력하세요 (없으면 'Default_Project'에 저장):", "Default_Project") || "Default_Project";

            for (const file of newFiles) {
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    const content = ev.target.result;
                    const success = await uploadToProject(targetProject, file.name, content, updateStatusUI);
                    if (success) {
                        // Update project screens list in metadata
                        const meta = await fetchProjectMetadata(targetProject);
                        meta.screens = meta.screens || {};
                        meta.screens[file.name] = { updatedAt: new Date().toISOString() };
                        await saveProjectMetadata(targetProject, meta);
                        refreshFileList();
                    }
                };
                reader.readAsText(file);
            }
        }

        DOM.uploadTop.addEventListener('change', async (e) => {
            await handleFiles(e.target.files);
            e.target.value = '';
        });

        // Drag & Drop Handling
        window.addEventListener('dragover', (e) => {
            e.preventDefault();
            document.body.classList.add('drag-active');
        });

        window.addEventListener('dragleave', (e) => {
            // Check if leaving to outside the window
            if (e.relatedTarget === null) {
                document.body.classList.remove('drag-active');
            }
        });

        window.addEventListener('drop', async (e) => {
            e.preventDefault();
            document.body.classList.remove('drag-active');
            if (e.dataTransfer.files) {
                await handleFiles(e.dataTransfer.files);
            }
        });

        // 8. Intro (Splash) Handler
        // (Moved to separate script block above for reliability)

        // Initial Load
        refreshFileList();
    </script>
    <!-- Splash Screen (Intro) - Relocated to bottom for reliability -->
    <div id="intro-overlay" class="intro-overlay">
        <div class="intro-content">
            <img src="assets/logo.svg" class="intro-logo-img" alt="Logo">
            <div class="intro-title">bychoi workspace</div>
            <div class="intro-loader"></div>
        </div>
    </div>
    <script>
        // Extreme Reliability Intro Killer
        (function() {
            const intro = document.getElementById('intro-overlay');
            if (!intro) return;
            
            const dismiss = () => {
                intro.style.opacity = '0';
                intro.style.pointerEvents = 'none';
                setTimeout(() => {
                    if (intro.parentNode) intro.remove();
                    document.body.style.overflow = 'auto'; // Re-enable scroll if disabled
                }, 1000);
            };

            // Main Trigger (Accelerated for faster intro)
            setTimeout(dismiss, 800);

            // Emergency Fallback
            window.addEventListener('load', () => setTimeout(dismiss, 1200));
            
            // Allow clicking to skip
            intro.addEventListener('click', dismiss);
        })();
    </script>
</body>
</html>
